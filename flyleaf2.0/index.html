<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Building Version 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lexend', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
        }


        /* Screen Preview Styles */
        .worksheet-page {
            background: white;
            padding: 0.5in;
            margin: 2rem auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
            box-sizing: border-box;
            min-height: 297mm;
            width: 210mm;
        }


        /* Print Specific Styles */
        @media print {
            .no-print {
                display: none !important;
            }


            html, body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                display: block !important;
                width: 100% !important;
            }


            #grid-container {
                display: block !important;
                width: 100% !important;
            }


            .worksheet-page {
                margin: 0 !important;
                padding: 10mm !important;
                page-break-after: always !important;
                break-after: page !important;
                display: block !important;
                width: 100% !important;
                height: auto !important;
                min-height: 0 !important;
                box-shadow: none !important;
                border: none !important;
            }


            .worksheet-page:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }


            .sentence-row {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                margin-bottom: 1rem !important;
                display: flex !important;
                align-items: flex-start !important;
            }


            .cut-line {
                border-color: #9ca3af !important;
                border-width: 2px !important;
                border-style: dashed !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
    <style id="page-orientation-style">
        @media print { @page { size: A4 portrait; margin: 0; } }
    </style>
</head>
<body class="bg-blue-50 text-gray-800 font-sans">


    <!-- Control Panel -->
    <div class="no-print w-full flex justify-center pt-10 pb-6 px-4">
        <div class="w-full max-w-4xl bg-white p-6 rounded-xl shadow-lg border-l-4 border-blue-500">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
                <div>
                    <h1 class="text-3xl font-bold text-blue-800">Sentence Building Version 2.0</h1>
                    <p class="text-gray-600">Generates separate pages for "Paste Areas" and "Cut-Out Words".</p>
                </div>
                <div class="mt-4 md:mt-0 flex gap-2">
                     <button onclick="manualPrint()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow transition flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a2 2 0 002 2h6a2 2 0 002-2v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a2 2 0 00-2-2H7a2 2 0 00-2 2zm8 0H7v3h6V4zm0 8H7v4h6v-4z" clip-rule="evenodd"/></svg>
                        Print
                    </button>
                    <button onclick="downloadPage()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-lg shadow transition">
                        Save
                    </button>
                </div>
            </div>


            <div class="flex flex-col md:flex-row gap-6">
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-2">
                        <label for="input-text" class="block text-sm font-bold text-gray-700 uppercase tracking-wide">Sentences (One per line)</label>
                        <button onclick="document.getElementById('input-text').value = ''; generateWorksheet();" class="text-xs text-red-500 font-bold underline">Clear</button>
                    </div>
                    <textarea id="input-text" rows="6" oninput="generateWorksheet()" class="w-full p-4 border-2 border-blue-100 rounded-lg outline-none focus:border-blue-400 font-mono text-lg" placeholder="Type sentences here...">Dot naps on the mat.
Dot likes to dig and dig!
Dot likes socks.
Dot likes pigs.
She likes the mat.
I can't see the mat!
Dot sits on top.
Dan is not mad.</textarea>
                </div>
               
                <div class="w-full md:w-1/3 flex flex-col gap-3">
                    <button onclick="toggleOrientation()" class="w-full border-2 border-indigo-600 text-indigo-600 font-bold py-2 px-4 rounded-lg flex items-center justify-center gap-2">
                        <span id="orientation-text">Switch to Landscape</span>
                    </button>
                    <p class="text-xs text-gray-500 italic">Landscape is recommended for longer sentences to keep cut boxes on one line.</p>
                </div>
            </div>
        </div>
    </div>


    <!-- Worksheet Container -->
    <div id="grid-container"></div>


    <script>
        let isLandscape = false;


        function toggleOrientation() {
            isLandscape = !isLandscape;
            const styleEl = document.getElementById('page-orientation-style');
            const orientationText = document.getElementById('orientation-text');
            const pages = document.querySelectorAll('.worksheet-page');


            if (isLandscape) {
                styleEl.innerHTML = `@media print { @page { size: A4 landscape; margin: 0; } }`;
                pages.forEach(p => {
                    p.style.width = "297mm";
                    p.style.minHeight = "210mm";
                });
                orientationText.innerText = "Switch to Portrait";
            } else {
                styleEl.innerHTML = `@media print { @page { size: A4 portrait; margin: 0; } }`;
                pages.forEach(p => {
                    p.style.width = "210mm";
                    p.style.minHeight = "297mm";
                });
                orientationText.innerText = "Switch to Landscape";
            }
        }


        function manualPrint() {
            // Temporarily change document title so the saved PDF has a nice name
            const originalTitle = document.title;
            document.title = "Sentence_Building_Worksheet";
            
            // Focus the window first to ensure the print dialogue targets the iframe contents
            window.focus();
            setTimeout(function() {
                window.print();
                // Restore original title after print dialog opens
                setTimeout(() => document.title = originalTitle, 500);
            }, 100);
        }


        function downloadPage() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sentence-worksheet.html';
            a.click();
        }


        function generateWorksheet() {
            const input = document.getElementById('input-text').value;
            const container = document.getElementById('grid-container');
            container.innerHTML = '';


            const allLines = input.split('\n').filter(line => line.trim() !== '');
            if (allLines.length === 0) return;


            // --- PAGE 1: PASTE SHEET ---
            const page1 = createPage("Sentence Building - Paste Sheet", "Paste words here to build the sentence...");
            const p1Section = page1.querySelector('.content-section');
           
            allLines.forEach((line, idx) => {
                const row = document.createElement('div');
                row.className = "sentence-row flex items-center gap-4 w-full";
                row.innerHTML = `
                    <span class="font-bold text-xl w-8 text-gray-400">${idx + 1}.</span>
                    <div class="flex-1 border-2 border-gray-200 bg-gray-50 rounded-md h-16 flex items-center justify-center text-gray-300 text-sm italic">
                        Glue words here...
                    </div>
                `;
                p1Section.appendChild(row);
            });
            container.appendChild(page1);


            // --- PAGE 2: CUT SHEET ---
            const page2 = createPage("Sentence Building - Cut Sheet", "Use scissors to cut words");
            const p2Section = page2.querySelector('.content-section');


            allLines.forEach((line, idx) => {
                const row = document.createElement('div');
                row.className = "sentence-row flex items-start gap-4 w-full";
               
                const num = document.createElement('span');
                num.className = "font-bold text-xl w-8 text-gray-400 mt-4";
                num.innerText = `${idx + 1}.`;
                row.appendChild(num);


                const wordContainer = document.createElement('div');
                wordContainer.className = "flex flex-wrap gap-2 flex-1";


                let words = line.trim().split(/\s+/);
                if (words.length > 1) shuffleArray(words);


                words.forEach(word => {
                    const box = document.createElement('div');
                    box.className = "cut-line flex items-center justify-center text-2xl font-bold px-4 py-2 h-16 min-w-[3rem] border-2 border-dashed border-gray-400 bg-white rounded shadow-sm";
                    box.innerText = word;
                    wordContainer.appendChild(box);
                });


                row.appendChild(wordContainer);
                p2Section.appendChild(row);
            });
            container.appendChild(page2);
           
            // Sync orientation
            if(isLandscape) {
                document.querySelectorAll('.worksheet-page').forEach(p => {
                    p.style.width = "297mm";
                    p.style.minHeight = "210mm";
                });
            }
        }


        function createPage(title, sub) {
            const page = document.createElement('div');
            page.className = "worksheet-page";
            page.innerHTML = `
                <div class="flex justify-between items-end border-b-2 border-gray-800 pb-2 mb-6">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">${title}</h1>
                        <p class="text-sm text-gray-600">${sub}</p>
                    </div>
                    <div class="border border-gray-300 rounded px-4 py-2 w-48 bg-gray-50 text-gray-400 text-sm">Name:</div>
                </div>
                <div class="content-section flex-grow"></div>
            `;
            return page;
        }


        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }


        window.onload = generateWorksheet;
    </script>
</body>
</html>
