<!doctype html>
<html lang="fr" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Révision Mathématiques</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;family=Nunito:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    h1, h2, h3, .game-title { font-family: 'Fredoka', sans-serif; }
    
    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px rgba(99, 102, 241, 0.5); }
      50% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.8); }
    }
    
    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    @keyframes star-burst {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(2) rotate(180deg); opacity: 0; }
    }
    
    .bounce-in { animation: bounce-in 0.5s ease-out; }
    .shake { animation: shake 0.5s ease-in-out; }
    .float { animation: float 2s ease-in-out infinite; }
    .spin-slow { animation: spin-slow 8s linear infinite; }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      animation: confetti-fall 3s linear forwards;
    }
    
    .star-burst {
      position: absolute;
      font-size: 2rem;
      animation: star-burst 0.8s ease-out forwards;
    }
    
    .category-btn {
      transition: all 0.3s ease;
    }
    
    .category-btn:hover {
      transform: translateY(-3px);
    }
    
    .answer-btn {
      transition: all 0.2s ease;
    }
    
    .answer-btn:hover:not(:disabled) {
      transform: scale(1.02);
    }
    
    .correct-answer {
      background: linear-gradient(135deg, #10b981, #059669) !important;
      color: white !important;
    }
    
    .wrong-answer {
      background: linear-gradient(135deg, #ef4444, #dc2626) !important;
      color: white !important;
    }
    
    .mini-game-target {
      cursor: pointer;
      transition: transform 0.1s;
    }
    
    .mini-game-target:hover {
      transform: scale(1.1);
    }
    
    .progress-bar {
      transition: width 0.5s ease;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <div id="app" class="min-h-full bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 p-4"><!-- Welcome Screen -->
   <div id="welcome-screen" class="max-w-2xl mx-auto">
    <div class="bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 text-center bounce-in">
     <div class="text-6xl mb-4">
      🎮
     </div>
     <h1 id="main-title" class="game-title text-4xl font-bold text-indigo-600 mb-2">Révision Mathématiques</h1>
     <p id="welcome-text" class="text-gray-600 mb-6">Bienvenue au jeu de révision!</p>
     <div class="mb-6"><label class="block text-left text-gray-700 font-semibold mb-2">Ton prénom:</label> <input type="text" id="player-name-input" placeholder="Entre ton prénom..." class="w-full px-4 py-3 border-2 border-indigo-200 rounded-xl focus:border-indigo-500 focus:outline-none text-lg">
     </div><button id="start-btn" onclick="startGame()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-bold py-4 px-8 rounded-xl text-xl hover:from-indigo-600 hover:to-purple-600 transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"> Commencer! 🚀 </button>
     <div id="leaderboard" class="mt-8 hidden">
      <h3 class="text-lg font-bold text-gray-700 mb-3">🏆 Meilleurs scores</h3>
      <div id="leaderboard-list" class="space-y-2"></div>
     </div>
    </div>
   </div><!-- Main Game Screen -->
   <div id="game-screen" class="hidden max-w-4xl mx-auto"><!-- Header -->
    <div class="bg-white/95 backdrop-blur rounded-2xl shadow-xl p-4 mb-4">
     <div class="flex justify-between items-center flex-wrap gap-2">
      <div class="flex items-center gap-3"><span class="text-2xl">👋</span> <span id="greeting" class="text-xl font-bold text-indigo-600">Salut!</span>
      </div>
      <div class="flex items-center gap-4">
       <div class="bg-yellow-100 px-4 py-2 rounded-full"><span class="text-yellow-600 font-bold">⭐ Partie: <span id="session-points">0</span></span>
       </div>
       <div class="bg-purple-100 px-4 py-2 rounded-full"><span class="text-purple-600 font-bold">💫 Total: <span id="cumulative-points">0</span></span>
       </div>
       <div class="bg-indigo-100 px-4 py-2 rounded-full"><span class="text-indigo-600 font-bold">❓ Question: <span id="question-num">0</span></span>
       </div>
      </div>
     </div>
     <div class="mt-3 bg-gray-200 rounded-full h-3 overflow-hidden hidden">
      <div id="progress-bar" class="progress-bar bg-gradient-to-r from-indigo-500 to-purple-500 h-full" style="width: 0%"></div>
     </div>
    </div><!-- Category Selection -->
    <div id="category-screen" class="bg-white/95 backdrop-blur rounded-2xl shadow-xl p-6">
     <h2 class="game-title text-2xl font-bold text-center text-gray-800 mb-6">Choisis une catégorie! 📚</h2>
     <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="category-grid"><!-- Categories will be inserted here -->
     </div>
    </div><!-- Question Screen -->
    <div id="question-screen" class="hidden bg-white/95 backdrop-blur rounded-2xl shadow-xl p-6">
     <div class="flex justify-between items-center mb-4"><button onclick="returnToCategories()" class="bg-red-100 hover:bg-red-200 text-red-700 font-semibold py-2 px-4 rounded-lg transition-all text-sm">✕ Quitter</button>
      <div class="text-center flex-1"><span id="category-badge" class="inline-block bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-semibold"></span>
      </div>
      <div class="w-16"></div>
     </div>
     <h2 id="question-text" class="game-title text-xl md:text-2xl font-bold text-center text-gray-800 mb-6 min-h-[80px] flex items-center justify-center"></h2><button id="hint-btn" onclick="showHint()" class="mb-4 bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-semibold py-2 px-4 rounded-lg transition-all text-sm"> 💡 Besoin d'aide? </button>
     <div id="hint-box" class="hidden mb-4 bg-blue-50 border-2 border-blue-200 p-4 rounded-lg text-blue-700">
      <p id="hint-text" class="text-sm"></p>
     </div>
     <div id="answers-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"><!-- Answers will be inserted here -->
     </div>
     <div id="feedback" class="hidden mt-4 text-center">
      <p id="feedback-text" class="text-xl font-bold"></p><button id="next-btn" onclick="nextQuestion()" class="mt-4 bg-indigo-500 text-white font-bold py-3 px-8 rounded-xl hover:bg-indigo-600 transition-all"> Continuer ➡️ </button>
     </div>
    </div><!-- Mini Game Screen -->
    <div id="mini-game-screen" class="hidden bg-white/95 backdrop-blur rounded-2xl shadow-xl p-6">
     <h2 class="game-title text-2xl font-bold text-center text-gray-800 mb-2">🎯 Jeu Bonus!</h2>
     <p id="mini-game-instruction" class="text-center text-gray-600 mb-4"></p>
     <div id="mini-game-area" class="min-h-[300px] relative bg-gradient-to-br from-indigo-50 to-purple-50 rounded-xl flex items-center justify-center"><!-- Mini game content here -->
     </div>
     <div id="mini-game-result" class="hidden mt-4 text-center">
      <p id="mini-game-score" class="text-xl font-bold text-indigo-600"></p><button onclick="continueMiniGame()" class="mt-3 bg-indigo-500 text-white font-bold py-3 px-8 rounded-xl hover:bg-indigo-600 transition-all"> Continuer ➡️ </button>
     </div>
    </div>
   </div><!-- Game Over Screen -->
   <div id="gameover-screen" class="hidden max-w-2xl mx-auto">
    <div class="bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 text-center bounce-in">
     <div class="text-6xl mb-4">
      🎉
     </div>
     <h1 class="game-title text-3xl font-bold text-indigo-600 mb-2">Partie terminée!</h1>
     <p id="final-score" class="text-2xl text-gray-700 mb-4"></p>
     <p id="final-message" class="text-lg text-gray-600 mb-6"></p>
     <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="bg-green-100 p-4 rounded-xl">
       <div class="text-3xl mb-1">
        ✅
       </div>
       <div class="text-green-700 font-bold" id="correct-count">
        0
       </div>
       <div class="text-green-600 text-sm">
        Bonnes réponses
       </div>
      </div>
      <div class="bg-red-100 p-4 rounded-xl">
       <div class="text-3xl mb-1">
        ❌
       </div>
       <div class="text-red-700 font-bold" id="wrong-count">
        0
       </div>
       <div class="text-red-600 text-sm">
        Erreurs
       </div>
      </div>
     </div>
     <div class="bg-gray-100 p-4 rounded-xl mb-6">
      <div class="text-gray-700 text-sm mb-2">
       📊 Statistiques de cette partie
      </div>
      <div class="flex justify-between text-gray-600"><span>Ratio: <strong id="accuracy-ratio">0%</strong></span> <span>Accuracy: <strong id="accuracy">0%</strong></span>
      </div>
     </div><button onclick="playAgain()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-bold py-4 px-8 rounded-xl text-xl hover:from-indigo-600 hover:to-purple-600 transition-all transform hover:scale-105"> Rejouer! 🔄 </button>
    </div>
   </div>
  </div>
  <script>
    // Configuration
    const defaultConfig = {
      game_title: "Révision Mathématiques",
      welcome_message: "Bienvenue au jeu de révision!"
    };
    
    // Game State
    let playerName = "";
    let cumulativePoints = 0; // Total points across all sessions
    let currentSessionPoints = 0; // Points in current game session
    let questionNum = 0;
    let correctAnswers = 0;
    let wrongAnswers = 0;
    let currentCategory = null;
    let allPlayerData = [];
    let currentPlayerRecord = null;
    let currentQuestionData = null;
    let hintShown = false;
    
    // Categories with questions
    const categories = [
      { id: "integers", name: "Addition d'entiers", emoji: "➕", color: "from-blue-400 to-blue-600" },
      { id: "comparing", name: "Comparer et ordonner", emoji: "↔️", color: "from-green-400 to-green-600" },
      { id: "situations", name: "Situations avec entiers", emoji: "🌡️", color: "from-cyan-400 to-cyan-600" },
      { id: "factortree", name: "Arbre de facteurs", emoji: "🌳", color: "from-emerald-400 to-emerald-600" },
      { id: "exponents", name: "Exposants", emoji: "²", color: "from-purple-400 to-purple-600" },
      { id: "probability", name: "Probabilité", emoji: "🎲", color: "from-pink-400 to-pink-600" },
      { id: "simplify", name: "Simplifier fractions", emoji: "✂️", color: "from-orange-400 to-orange-600" },
      { id: "sharing", name: "Partage égal", emoji: "🍕", color: "from-red-400 to-red-600" },
      { id: "convert", name: "Fractions-Décimales-%", emoji: "🔄", color: "from-teal-400 to-teal-600" },
      { id: "percentdiv", name: "% par division longue", emoji: "➗", color: "from-amber-400 to-amber-600" },
      { id: "ratios", name: "Rapports équivalents", emoji: "⚖️", color: "from-indigo-400 to-indigo-600" },
      { id: "addsubfrac", name: "Addition/Soustraction fractions", emoji: "🧮", color: "from-rose-400 to-rose-600" },
      { id: "multfrac", name: "Multiplier fractions", emoji: "✖️", color: "from-violet-400 to-violet-600" },
      { id: "addsubdec", name: "Addition/Soustraction décimales", emoji: "🔢", color: "from-lime-400 to-lime-600" },
      { id: "multdec", name: "Multiplier décimales par entiers", emoji: "✖️", color: "from-sky-400 to-sky-600" },
      { id: "divdec", name: "Diviser décimales par entiers", emoji: "➗", color: "from-fuchsia-400 to-fuchsia-600" },
      { id: "repdec", name: "Représenter décimales", emoji: "📊", color: "from-cyan-400 to-cyan-600" },
      { id: "longdiv", name: "Division longue", emoji: "🔢", color: "from-slate-400 to-slate-600" },
      { id: "multmulti", name: "Multiplier nombres à 2-3 chiffres", emoji: "✖️", color: "from-orange-400 to-orange-600" },
      { id: "percentof", name: "Trouver le % d'un nombre", emoji: "%", color: "from-teal-400 to-teal-600" },
      { id: "compdec", name: "Comparer/Ordonner/Arrondir décimales", emoji: "🔢", color: "from-indigo-400 to-indigo-600" }
    ];
    
    // Question generators for each category
    function generateQuestion(categoryId) {
      switch(categoryId) {
        case "integers": return generateIntegerAddition();
        case "comparing": return generateComparing();
        case "situations": return generateSituations();
        case "factortree": return generateFactorTree();
        case "exponents": return generateExponents();
        case "probability": return generateProbability();
        case "simplify": return generateSimplify();
        case "sharing": return generateSharing();
        case "convert": return generateConvert();
        case "percentdiv": return generatePercentDiv();
        case "ratios": return generateRatios();
        case "addsubfrac": return generateAddSubFrac();
        case "multfrac": return generateMultFrac();
        case "addsubdec": return generateAddSubDec();
        case "multdec": return generateMultDec();
        case "divdec": return generateDivDec();
        case "repdec": return generateRepDec();
        case "longdiv": return generateLongDiv();
        case "multmulti": return generateMultMulti();
        case "percentof": return generatePercentOf();
        case "compdec": return generateCompareOrderRoundDec();
      }
    }
    
    function getHint(categoryId, questionText) {
      const hints = {
        "integers": {
          strategy: "💡 Utilise une droite numérique! Commence au premier nombre, puis déplace-toi vers la droite pour ajouter (ou vers la gauche pour soustraire).",
          example: "Exemple similaire: (-3) + 7 = ?\nSur une droite: commence à -3, puis monte de 7 → tu arrives à 4"
        },
        "comparing": {
          strategy: "💡 Compare chiffre par chiffre, en commençant par le plus à gauche. Si un nombre est plus grand, mets >. S'ils sont égaux, mets =.",
          example: "Exemple similaire: 2,8 vs 2,08\nCompare: 2 = 2 ✓, puis 8 > 0 ✓, donc 2,8 > 2,08"
        },
        "situations": {
          strategy: "💡 Lis le problème deux fois. Quels nombres as-tu? Augmente-t-il ou diminue-t-il? Fais un schéma ou une droite numérique.",
          example: "Exemple similaire: Un plongeur est à -20m. Il remonte de 30m. À quelle profondeur?\nRemonte = addition → (-20) + 30 = 10m"
        },
        "factortree": {
          strategy: "💡 Divise le nombre par les plus petits nombres premiers (2, 3, 5, 7...) jusqu'à ne plus pouvoir. Compte combien de fois chaque prime apparaît (c'est l'exposant).",
          example: "Exemple similaire: 18\n18 ÷ 2 = 9 → 9 ÷ 3 = 3 → 3 ÷ 3 = 1\nRésultat: 2 × 3²"
        },
        "exponents": {
          strategy: "💡 L'exposant te dit combien de fois tu multiplies le nombre par lui-même.",
          example: "Exemple similaire: 5² = ?\nCela signifie: 5 × 5 = 25"
        },
        "probability": {
          strategy: "💡 Probabilité = (ce que tu veux) ÷ (total de possibilités). Compte soigneusement!",
          example: "Exemple similaire: 2 bonbons rouges, 6 bleus. Probabilité de tirer un bleu?\nRéponse: 6 ÷ (2+6) = 6/8 = 3/4"
        },
        "simplify": {
          strategy: "💡 Trouve le plus grand nombre qui divise BOTH le haut et le bas. Divise les deux par ce nombre.",
          example: "Exemple similaire: Simplifie 8/12\n8 et 12 sont divisibles par 4 → 8÷4=2, 12÷4=3 → Réponse: 2/3"
        },
        "sharing": {
          strategy: "💡 Si tu partages des objets entre des gens, le nombre qu'on partage va en haut, le nombre de personnes en bas.",
          example: "Exemple similaire: 5 tarte partagée entre 8 personnes\nChacun reçoit: 5/8 de tarte"
        },
        "convert": {
          strategy: "💡 Fraction → Décimal: divise le haut par le bas. Décimal → %: multiplie par 100. % → Décimal: divise par 100.",
          example: "Exemple similaire: 3/4 = ?\n3 ÷ 4 = 0,75 = 75%"
        },
        "percentdiv": {
          strategy: "💡 Divise le numérateur par le dénominateur en utilisant la division longue. Puis multiplie par 100.",
          example: "Exemple similaire: 5/8 = ?\n5 ÷ 8 = 0,625 → 0,625 × 100 = 62,5%"
        },
        "ratios": {
          strategy: "💡 Si tu multiplies (ou divises) les DEUX nombres d'un rapport par le même nombre, tu obtiens un rapport équivalent.",
          example: "Exemple similaire: Trouve un rapport égal à 3:5\n3×2 : 5×2 = 6:10 ✓ ou 3×3 : 5×3 = 9:15 ✓"
        },
        "addsubfrac": {
          strategy: "💡 Les dénominateurs DOIVENT être pareils! Si ce n'est pas le cas, trouve un dénominateur commun d'abord.",
          example: "Exemple similaire: 2/3 + 1/6 = ?\nFais-les pareils: 4/6 + 1/6 = 5/6"
        },
        "multfrac": {
          strategy: "💡 Multiplie le haut par le haut, et le bas par le bas.",
          example: "Exemple similaire: 3/4 × 8 = ?\n(3×8)/(4×1) = 24/4 = 6"
        },
        "addsubdec": {
          strategy: "💡 Aligne les virgules verticalement! Puis additionne ou soustrait comme d'habitude.",
          example: "Exemple similaire: 3,2 + 1,7 = ?\n  3,2\n+ 1,7\n-----\n  4,9"
        },
        "multdec": {
          strategy: "💡 Multiplie comme si les virgules n'existaient pas. Puis place la virgule selon le nombre total de décimales.",
          example: "Exemple similaire: 3,5 × 2 = ?\n35 × 2 = 70, puis 1 décimale → 7,0"
        },
        "divdec": {
          strategy: "💡 Utilise la division longue. Déplace la virgule du diviseur à la fin, puis celle du dividende aussi.",
          example: "Exemple similaire: 8,4 ÷ 3 = ?\n3 va dans 8,4 combien de fois? 2,8 fois"
        },
        "repdec": {
          strategy: "💡 Décompose en parties. Lis chaque digit avec sa place (dixièmes, centièmes, millièmes).",
          example: "Exemple similaire: 0,527 = ?\n= 0,5 + 0,02 + 0,007 = cinq cent vingt-sept millièmes"
        },
        "longdiv": {
          strategy: "💡 Étapes: Divise, multiplie, soustrais, abaisse. Répète jusqu'à la fin!",
          example: "Exemple similaire: 56 ÷ 4 = ?\nDivise 5÷4=1 reste 1 → Abaisse 6 → 16÷4=4 → Réponse: 14"
        },
        "multmulti": {
          strategy: "💡 Multiplie d'abord par les unités, puis par les dizaines. Additionne les résultats.",
          example: "Exemple similaire: 15 × 12 = ?\n15×2=30 + 15×10=150 → 30+150=180"
        },
        "percentof": {
          strategy: "💡 'De' signifie multiplier. Convertis le % en décimal d'abord.",
          example: "Exemple similaire: 25% de 80 = ?\n25% = 0,25 → 0,25 × 80 = 20"
        },
        "compdec": {
          strategy: "💡 Comparer: regarde chiffre par chiffre. Arrondir: si le prochain chiffre est 5+, arrondir vers le haut!",
          example: "Exemple similaire: Arrondir 2,56 au dixième?\nLe centième est 6 (≥5), donc arrondir vers le haut → 2,6"
        }
      };
      const hint = hints[categoryId] || { strategy: "💡 Tu peux le faire! Réfléchis bien!", example: "" };
      return hint;
    }
    
    function showHint() {
      if(!currentQuestionData) return;
      
      hintShown = true;
      const hintBox = document.getElementById('hint-box');
      const hintText = document.getElementById('hint-text');
      const hintBtn = document.getElementById('hint-btn');
      
      const hint = getHint(currentCategory.id, currentQuestionData.question);
      hintText.innerHTML = `<strong>${hint.strategy}</strong><br><br><em style="font-style: italic; color: #1e40af;">${hint.example}</em>`;
      hintBox.classList.remove('hidden');
      hintBtn.disabled = true;
      hintBtn.className = 'mb-4 bg-gray-100 text-gray-400 font-semibold py-2 px-4 rounded-lg text-sm cursor-not-allowed';
    }
    
    function generateIntegerAddition() {
      const a = Math.floor(Math.random() * 41) - 20;
      const b = Math.floor(Math.random() * 41) - 20;
      const correct = a + b;
      const wrongs = [correct + Math.floor(Math.random() * 5) + 1, correct - Math.floor(Math.random() * 5) - 1, -correct];
      
      return {
        question: `Calcule: (${a}) + (${b}) = ?`,
        correct: correct.toString(),
        wrong: wrongs.map(w => w.toString())
      };
    }
    
    function generateComparing() {
      const nums = [];
      for(let i = 0; i < 4; i++) {
        nums.push(Math.floor(Math.random() * 41) - 20);
      }
      const sorted = [...nums].sort((a, b) => a - b);
      const type = Math.random() < 0.5 ? "croissant" : "décroissant";
      const correct = type === "croissant" ? sorted.join(" < ") : sorted.reverse().join(" > ");
      
      const shuffled1 = [...nums].sort(() => Math.random() - 0.5);
      const shuffled2 = [...nums].sort(() => Math.random() - 0.5);
      const shuffled3 = [...nums].sort(() => Math.random() - 0.5);
      
      return {
        question: `Place en ordre ${type}: ${nums.join(", ")}`,
        correct: correct,
        wrong: [
          shuffled1.join(type === "croissant" ? " < " : " > "),

      const correct = Math.pow(base, exp);
      
      const superscripts = { 2: "²", 3: "³", 4: "⁴" };
      
      // Generate wrong answers that are all unique
      const wrongCandidates = new Set();
      wrongCandidates.add(base * exp);
      wrongCandidates.add(Math.pow(base, exp - 1));
      wrongCandidates.add(base + exp);
      wrongCandidates.add(Math.pow(base, exp + 1));
      wrongCandidates.add(base * base);
      wrongCandidates.add(base + base);
      
      // Remove the correct answer from candidates
      wrongCandidates.delete(correct);
      
      // Convert to array and take first 3
      const wrongAnswers = Array.from(wrongCandidates)
        .map(w => w.toString())
        .slice(0, 3);
      
      return {
        question: `Calcule: ${base}${superscripts[exp]} = ?`,
        correct: correct.toString(),
        wrong: wrongAnswers
      };
    }

        { decimal: "2,009", decomposed: "2 + 0,0 + 0,00 + 0,009", grid: "2 entiers et 9 carrés sur 1000", written: "deux et neuf millièmes", answer: "2,009" }
      ];
      
      const rep = representations[Math.floor(Math.random() * representations.length)];
      const type = Math.floor(Math.random() * 4);
      
      let question, correct, wrongPool;
      
      if(type === 0) {
        // Decomposed to decimal
        question = `Quel décimal représente: ${rep.decomposed}?`;
        correct = rep.answer;
        wrongPool = representations.map(r => r.answer).filter(a => a !== correct);
      } else if(type === 1) {
        // Grid to decimal
        question = `Si la grille a ${rep.grid}, quel est le décimal?`;
        correct = rep.answer;
        wrongPool = representations.map(r => r.answer).filter(a => a !== correct);
      } else if(type === 2) {
        // Decimal to decomposed
        question = `Décompose ${rep.decimal}:`;
        correct = rep.decomposed;
        wrongPool = representations.map(r => r.decomposed).filter(d => d !== correct);
      } else {
        // Written form to decimal
        question = `Quel décimal correspond à: ${rep.written}?`;
        correct = rep.answer;
        wrongPool = representations.map(r => r.answer).filter(a => a !== correct);
      }
      
      return {
        question: question,
        correct: correct,
        wrong: wrongPool.sort(() => Math.random() - 0.5).slice(0, 3)
      };
    }

    // Shuffle array helper
    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

          mapToCapabilities: (config) => ({

        });

      if(window.dataSdk) {

        }
      }
      
      // Apply initial config
      onConfigChange(window.elementSdk?.config || defaultConfig);
    }
