<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Detective - Grade 3 Math</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animations */
        @keyframes bounce-slight {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10%); }
        }
        .animate-bounce-slight {
            animation: bounce-slight 2s infinite;
        }
        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body class="min-h-screen bg-blue-50 font-sans text-gray-800 flex items-center justify-center p-4">

    <div class="max-w-3xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-green-400">
        
        <!-- Header -->
        <header class="bg-green-400 text-white p-6 text-center relative">
            <button id="btn-back" onclick="showScreen('menu')" class="hidden absolute left-4 top-1/2 transform -translate-y-1/2 bg-white text-green-500 hover:bg-green-50 px-4 py-2 rounded-full font-bold shadow transition-colors">
                &larr; Menu
            </button>
            <h1 class="text-3xl font-extrabold tracking-wide">
                🕵️‍♂️ Pattern Detective
            </h1>
            <p class="text-green-50 font-medium mt-1">Grade 3 Math Adventure</p>
        </header>

        <!-- Dynamic Content Area -->
        <main class="p-8 min-h-[400px]">
            
            <!-- MAIN MENU -->
            <div id="screen-menu" class="screen active">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <button onclick="startMistakeGame()" class="p-6 rounded-2xl border-4 flex flex-col items-center text-center transition-transform transform hover:scale-105 active:scale-95 bg-purple-100 border-purple-300 text-purple-700 hover:bg-purple-200">
                        <span class="text-6xl mb-4">🔍</span>
                        <h2 class="text-xl font-bold mb-2">Spot the Mistake</h2>
                        <p class="text-sm opacity-90">Find the number that doesn't belong in the pattern sequence.</p>
                    </button>
                    <button onclick="startMailGame()" class="p-6 rounded-2xl border-4 flex flex-col items-center text-center transition-transform transform hover:scale-105 active:scale-95 bg-blue-100 border-blue-300 text-blue-700 hover:bg-blue-200">
                        <span class="text-6xl mb-4">✉️</span>
                        <h2 class="text-xl font-bold mb-2">Mail Carrier Sort</h2>
                        <p class="text-sm opacity-90">Sort the house numbers into the even north side and odd south side.</p>
                    </button>
                    <button onclick="startLeapfrogGame()" class="p-6 rounded-2xl border-4 flex flex-col items-center text-center transition-transform transform hover:scale-105 active:scale-95 bg-green-100 border-green-300 text-green-700 hover:bg-green-200">
                        <span class="text-6xl mb-4">🐸</span>
                        <h2 class="text-xl font-bold mb-2">Leapfrog Paths</h2>
                        <p class="text-sm opacity-90">Help Frog A and Frog B jump on the correct even or odd lily pads.</p>
                    </button>
                </div>
            </div>

            <!-- GAME 1: SPOT THE MISTAKE -->
            <div id="screen-mistake" class="screen text-center">
                <h2 class="text-2xl font-bold mb-6">Find the broken pattern!</h2>
                <div id="mistake-sequence" class="flex flex-wrap justify-center gap-4 mb-8">
                    <!-- Sequence buttons generated by JS -->
                </div>
                <div class="h-12">
                    <p id="mistake-message" class="text-xl font-bold transition-all"></p>
                </div>
                <div class="mt-4 text-gray-500 font-semibold">Score: <span id="mistake-score">0</span></div>
            </div>

            <!-- GAME 2: MAIL CARRIER -->
            <div id="screen-mail" class="screen text-center">
                <h2 class="text-2xl font-bold mb-2">Mail Carrier Sort</h2>
                <p class="text-gray-600 mb-8">Sort the house to the North (Even) or South (Odd) side.</p>
                
                <div class="flex justify-center mb-8">
                    <div class="bg-yellow-100 border-4 border-yellow-400 p-8 rounded-3xl shadow-lg relative transform animate-bounce-slight">
                        <span class="text-5xl absolute -top-6 left-1/2 transform -translate-x-1/2 bg-white rounded-full p-2 border-4 border-yellow-400">🏡</span>
                        <div id="mail-house" class="text-6xl font-black text-gray-800 mt-4">102</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleMailGuess(true)" class="bg-blue-100 border-4 border-blue-400 text-blue-800 py-4 px-6 rounded-2xl text-xl font-bold hover:bg-blue-200 transition-colors">
                        North Side<br/><span class="text-3xl">EVEN</span>
                    </button>
                    <button onclick="handleMailGuess(false)" class="bg-orange-100 border-4 border-orange-400 text-orange-800 py-4 px-6 rounded-2xl text-xl font-bold hover:bg-orange-200 transition-colors">
                        South Side<br/><span class="text-3xl">ODD</span>
                    </button>
                </div>

                <div class="h-10 mt-6">
                    <p id="mail-message" class="text-xl font-bold"></p>
                </div>
                <div class="text-gray-500 font-semibold">Deliveries: <span id="mail-score">0</span></div>
            </div>

            <!-- GAME 3: LEAPFROG -->
            <div id="screen-leapfrog" class="screen text-center">
                <h2 class="text-2xl font-bold mb-2">The Leapfrog Task</h2>
                <p id="leapfrog-instructions" class="text-lg text-gray-700 mb-6 font-medium bg-green-100 inline-block px-4 py-1 rounded-full">
                    Help Frog finish the path!
                </p>

                <!-- Pond sequence -->
                <div class="flex flex-wrap items-center justify-center gap-2 sm:gap-4 mb-10 bg-blue-100 p-6 rounded-3xl border-4 border-blue-300" id="leapfrog-pond">
                    <!-- Sequence generated by JS -->
                </div>

                <h3 class="text-lg font-bold mb-4 text-gray-600">Which lily pad comes next?</h3>
                
                <!-- Options -->
                <div id="leapfrog-options" class="flex justify-center gap-6">
                    <!-- Option buttons generated by JS -->
                </div>

                <div class="h-10 mt-8">
                    <p id="leapfrog-message" class="text-xl font-bold"></p>
                </div>
                <div class="text-gray-500 font-semibold mt-2">Jumps: <span id="leapfrog-score">0</span></div>
            </div>

        </main>
    </div>

    <script>
        // --- NAVIGATION STATE ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            
            const backBtn = document.getElementById('btn-back');
            if (screenId === 'menu') {
                backBtn.classList.add('hidden');
            } else {
                backBtn.classList.remove('hidden');
            }
        }

        // --- GAME 1: SPOT THE MISTAKE ---
        let mistakeState = { score: 0, sequence: [], mistakeIdx: -1 };

        function startMistakeGame() {
            showScreen('mistake');
            mistakeState.score = 0;
            document.getElementById('mistake-score').innerText = mistakeState.score;
            generateMistakeSequence();
        }

        function generateMistakeSequence() {
            const start = Math.floor(Math.random() * 5) + 2;
            const step = Math.floor(Math.random() * 3) + 2;
            let newSeq = Array.from({length: 6}, (_, i) => start + (i * step));
            
            mistakeState.mistakeIdx = Math.floor(Math.random() * 4) + 1; // 1 to 4
            const offset = Math.random() > 0.5 ? 1 : -1;
            newSeq[mistakeState.mistakeIdx] += offset;
            mistakeState.sequence = newSeq;

            const container = document.getElementById('mistake-sequence');
            container.innerHTML = '';
            document.getElementById('mistake-message').innerText = '';
            
            newSeq.forEach((num, i) => {
                const btn = document.createElement('button');
                btn.className = "w-16 h-16 sm:w-20 sm:h-20 text-2xl font-bold bg-white border-4 border-gray-300 rounded-xl shadow hover:bg-purple-50 hover:border-purple-400 hover:scale-110 transition-all";
                btn.innerText = num;
                btn.onclick = () => handleMistakeGuess(i);
                container.appendChild(btn);
            });
        }

        function handleMistakeGuess(index) {
            const msgEl = document.getElementById('mistake-message');
            if (index === mistakeState.mistakeIdx) {
                msgEl.innerText = '🎉 Correct! You spotted the mistake!';
                msgEl.className = 'text-xl font-bold text-green-500 animate-bounce';
                mistakeState.score++;
                document.getElementById('mistake-score').innerText = mistakeState.score;
                setTimeout(generateMistakeSequence, 2000);
            } else {
                msgEl.innerText = '❌ Oops! Look closer at the pattern gaps.';
                msgEl.className = 'text-xl font-bold text-red-500';
            }
        }

        // --- GAME 2: MAIL CARRIER ---
        let mailState = { score: 0, currentHouse: 0, isEven: true };

        function startMailGame() {
            showScreen('mail');
            mailState.score = 0;
            document.getElementById('mail-score').innerText = mailState.score;
            nextHouse();
        }

        function nextHouse() {
            const base = Math.random() > 0.5 ? 100 : Math.floor(Math.random() * 5) * 10;
            const num = base + Math.floor(Math.random() * 10) + 1;
            
            mailState.currentHouse = num;
            mailState.isEven = (num % 2 === 0);
            
            document.getElementById('mail-house').innerText = num;
            document.getElementById('mail-message').innerText = '';
        }

        function handleMailGuess(guessEven) {
            const msgEl = document.getElementById('mail-message');
            if (guessEven === mailState.isEven) {
                msgEl.innerText = '📬 Delivered correctly!';
                msgEl.className = 'text-xl font-bold text-green-500';
                mailState.score++;
                document.getElementById('mail-score').innerText = mailState.score;
                setTimeout(nextHouse, 1000);
            } else {
                msgEl.innerText = '🛑 Wrong side of the street!';
                msgEl.className = 'text-xl font-bold text-red-500';
            }
        }

        // --- GAME 3: LEAPFROG ---
        let leapfrogState = { score: 0, answer: 0 };

        function startLeapfrogGame() {
            showScreen('leapfrog');
            leapfrogState.score = 0;
            document.getElementById('leapfrog-score').innerText = leapfrogState.score;
            generateLeapfrogJump();
        }

        function generateLeapfrogJump() {
            const frogIsEven = Math.random() > 0.5;
            document.getElementById('leapfrog-instructions').innerText = `Help Frog ${frogIsEven ? 'A (Even Jumps)' : 'B (Odd Jumps)'} finish the path!`;
            
            const start = frogIsEven 
                ? Math.floor(Math.random() * 10) * 2 
                : Math.floor(Math.random() * 10) * 2 + 1;
                
            const seq = [start, start + 2, start + 4, start + 6];
            leapfrogState.answer = start + 8;
            
            let opts = [leapfrogState.answer];
            while(opts.length < 3) {
                const distractor = start + Math.floor(Math.random() * 15);
                if (!opts.includes(distractor) && distractor !== leapfrogState.answer) {
                    opts.push(distractor);
                }
            }
            opts.sort(() => Math.random() - 0.5); // Shuffle
            
            // Render Sequence
            const pond = document.getElementById('leapfrog-pond');
            pond.innerHTML = '<span class="text-5xl animate-bounce-slight">🐸</span>';
            seq.forEach(num => {
                pond.innerHTML += `
                    <div class="flex items-center">
                        <div class="w-12 h-12 sm:w-16 sm:h-16 bg-green-500 rounded-full flex items-center justify-center text-white font-bold text-xl sm:text-2xl border-b-4 border-green-700 shadow-lg">
                            ${num}
                        </div>
                        <span class="text-gray-400 font-bold mx-1 sm:mx-2 text-xl">→</span>
                    </div>`;
            });
            pond.innerHTML += `
                <div class="w-12 h-12 sm:w-16 sm:h-16 bg-white border-dashed border-4 border-gray-400 rounded-full flex items-center justify-center text-gray-400 font-bold text-2xl">
                    ?
                </div>`;

            // Render Options
            const optionsContainer = document.getElementById('leapfrog-options');
            optionsContainer.innerHTML = '';
            document.getElementById('leapfrog-message').innerText = '';
            
            opts.forEach(num => {
                const btn = document.createElement('button');
                btn.className = "w-20 h-20 bg-green-400 hover:bg-green-300 border-b-8 border-green-600 rounded-full text-white font-black text-3xl transition-transform transform hover:-translate-y-2 focus:outline-none";
                btn.innerText = num;
                btn.onclick = () => handleLeapfrogGuess(num);
                optionsContainer.appendChild(btn);
            });
        }

        function handleLeapfrogGuess(num) {
            const msgEl = document.getElementById('leapfrog-message');
            if (num === leapfrogState.answer) {
                msgEl.innerText = '🐸 Ribbit! Great jump!';
                msgEl.className = 'text-xl font-bold text-green-600';
                leapfrogState.score++;
                document.getElementById('leapfrog-score').innerText = leapfrogState.score;
                setTimeout(generateLeapfrogJump, 1500);
            } else {
                msgEl.innerText = '💦 Splash! That\'s the wrong pattern.';
                msgEl.className = 'text-xl font-bold text-blue-500';
            }
        }
    </script>
</body>
</html>
