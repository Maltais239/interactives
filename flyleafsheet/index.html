<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cut-Up Sentences Worksheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Screen Preview Styles */
        .worksheet-page {
            min-height: 297mm;
            width: 210mm;
            background: white;
            padding: 1.5in; /* Standard margins for screen preview */
            margin: 2rem auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
            box-sizing: border-box;
        }

        /* Print Specific Styles */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            .no-print {
                display: none !important;
            }

            html, body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                height: 100%;
                overflow: hidden;
            }

            .print-container {
                width: 100% !important;
                margin: 0 !important;
            }

            .worksheet-page {
                height: 100vh !important;
                width: 100vw !important;
                margin: 0 !important;
                padding: 12mm !important; /* Slightly smaller padding to maximize space */
                page-break-after: always !important;
                break-after: always !important;
                box-shadow: none !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important;
                box-sizing: border-box !important;
                overflow: hidden !important; /* Prevent content spill */
            }
            
            .worksheet-page:last-child {
                page-break-after: auto !important;
                break-after: auto !important;
            }

            .cut-line {
                border-color: #9ca3af !important;
                border-width: 2px !important;
                border-style: dashed !important;
            }
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen flex flex-col items-center py-10 text-gray-800">

    <!-- Control Panel -->
    <div class="no-print w-full max-w-4xl bg-white p-6 rounded-xl shadow-lg mb-8 mx-4 border-l-4 border-blue-500">
        <h1 class="text-3xl font-bold text-blue-800 mb-2">Split-Page Worksheet Builder</h1>
        <p class="text-gray-600 mb-6">Generates pages with a "Paste Area" on top and "Cut-Out Words" on the bottom.</p>

        <div class="flex flex-col md:flex-row gap-6">
            <div class="flex-1">
                <div class="flex justify-between items-center mb-2">
                    <label for="input-text" class="block text-sm font-bold text-gray-700 uppercase tracking-wide">
                        Paste Sentences (1 per line)
                    </label>
                    <button onclick="document.getElementById('input-text').value = ''; generateWorksheet();" class="text-xs text-red-500 hover:text-red-700 font-bold underline">
                        Clear Text
                    </button>
                </div>
                <textarea id="input-text" rows="8" class="w-full p-4 border-2 border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-400 focus:border-blue-400 outline-none transition text-lg font-medium font-mono" placeholder="Paste your list here...">Dot naps on the mat.
Dot likes to dig and dig!
Dot likes socks.
Dot likes pigs.
She likes the mat.
I can't see the mat!
Dot sits on top.
Dan is not mad.</textarea>
            </div>
            
            <div class="w-full md:w-1/3 flex flex-col gap-4">
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Sentences Per Page</label>
                    <select id="sentences-per-page" onchange="generateWorksheet()" class="w-full p-2 border border-gray-300 rounded bg-white font-bold text-gray-700">
                        <option value="3">3 per Page (Large text)</option>
                        <option value="4">4 per Page (Standard)</option>
                        <option value="5" selected>5 per Page (Compact)</option>
                    </select>
                </div>

                <button onclick="generateWorksheet()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow transition transform active:scale-95 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v3.25a1 1 0 01-2 0V12.895a7.002 7.002 0 01-11.969-1.208 1 1 0 01.611-1.276z" clip-rule="evenodd"/></svg>
                    Refresh Preview
                </button>
                
                <button onclick="manualPrint()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow transition transform active:scale-95 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a2 2 0 002 2h6a2 2 0 002-2v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a2 2 0 00-2-2H7a2 2 0 00-2 2zm8 0H7v3h6V4zm0 8H7v4h6v-4z" clip-rule="evenodd"/></svg>
                    Print Worksheet
                </button>

                <button onclick="downloadPage()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg shadow transition transform active:scale-95 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                    Save File
                </button>
            </div>
        </div>
    </div>

    <!-- Worksheet Container -->
    <div id="grid-container" class="print-container w-full"></div>

    <script>
        function manualPrint() {
            window.focus();
            window.print();
        }

        function downloadPage() {
            const textarea = document.getElementById('input-text');
            textarea.innerHTML = textarea.value;
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sentence-worksheet.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function generateWorksheet() {
            const input = document.getElementById('input-text').value;
            const container = document.getElementById('grid-container');
            const itemsPerPage = parseInt(document.getElementById('sentences-per-page').value);
            
            container.innerHTML = '';

            const allLines = input.split('\n').filter(line => line.trim() !== '');
            const totalPages = Math.ceil(allLines.length / itemsPerPage);

            for (let i = 0; i < totalPages; i++) {
                const start = i * itemsPerPage;
                const end = start + itemsPerPage;
                const pageLines = allLines.slice(start, end);

                const pageDiv = document.createElement('div');
                pageDiv.className = "worksheet-page";

                // --- HEADER ---
                const header = document.createElement('div');
                header.className = "flex justify-between items-end border-b-2 border-gray-800 pb-1 mb-4";
                header.innerHTML = `
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Sentence Building</h1>
                        <p class="text-[10px] text-gray-600">Page ${i + 1} of ${totalPages}</p>
                    </div>
                    <div class="border border-gray-300 rounded px-4 py-1 w-40 bg-gray-50 text-gray-400 text-xs">Name:</div>
                `;
                pageDiv.appendChild(header);

                // --- TOP SECTION: GLUE TARGETS ---
                const glueSection = document.createElement('div');
                glueSection.className = "flex-grow space-y-2";
                
                const glueTitle = document.createElement('h3');
                glueTitle.className = "font-bold text-gray-400 uppercase tracking-wider text-[10px] mb-2 text-center";
                glueTitle.innerHTML = "Glue Words Here";
                glueSection.appendChild(glueTitle);

                pageLines.forEach((line, idx) => {
                    const row = document.createElement('div');
                    row.className = "flex items-center gap-2";
                    
                    const num = document.createElement('span');
                    num.className = "font-bold text-md w-6";
                    num.innerText = `${start + idx + 1}.`;
                    row.appendChild(num);

                    const glueStrip = document.createElement('div');
                    // Height reduced from h-20 (80px) to h-16 (64px)
                    glueStrip.className = "flex-1 h-16 border-2 border-gray-200 bg-gray-50 rounded-md print:bg-transparent print:border-gray-300 print:border-solid relative";
                    glueStrip.innerHTML = '<span class="absolute inset-0 flex items-center justify-center text-gray-200 text-[10px] italic">Build sentence here...</span>';
                    row.appendChild(glueStrip);

                    glueSection.appendChild(row);
                });
                pageDiv.appendChild(glueSection);

                // --- MIDDLE: CUT GUIDE ---
                const cutGuide = document.createElement('div');
                cutGuide.className = "my-4 flex items-center gap-2 text-gray-400";
                cutGuide.innerHTML = `
                    <div class="h-px bg-gray-300 flex-1 border-t-2 border-dashed border-gray-300"></div>
                    <span class="text-lg">✂️</span>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Cut along this line</span>
                    <div class="h-px bg-gray-300 flex-1 border-t-2 border-dashed border-gray-300"></div>
                `;
                pageDiv.appendChild(cutGuide);

                // --- BOTTOM SECTION: CUT OUTS ---
                const cutSection = document.createElement('div');
                cutSection.className = "space-y-2 pt-1";

                const cutTitle = document.createElement('h3');
                cutTitle.className = "font-bold text-gray-400 uppercase tracking-wider text-[10px] mb-1 text-center";
                cutTitle.innerHTML = "Cut Out Words";
                cutSection.appendChild(cutTitle);

                pageLines.forEach((line, idx) => {
                    const row = document.createElement('div');
                    row.className = "flex items-center gap-2";

                    const num = document.createElement('span');
                    num.className = "text-[10px] text-gray-300 w-6 font-bold";
                    num.innerText = `${start + idx + 1}.`;
                    row.appendChild(num);

                    const wordRow = document.createElement('div');
                    wordRow.className = "flex flex-wrap gap-1";

                    let tokens = line.trim().split(/\s+/);
                    if (tokens.length > 1) {
                        let attempts = 0;
                        const original = JSON.stringify(tokens);
                        do {
                            tokens = shuffleArray([...tokens]);
                            attempts++;
                        } while (JSON.stringify(tokens) === original && attempts < 10);
                    }

                    tokens.forEach(token => {
                        const wordCard = document.createElement('div');
                        // Height reduced to h-16 to match glue strip
                        wordCard.className = "cut-line flex items-center justify-center text-xl font-bold px-3 h-16 min-w-[3rem] border-2 border-dashed border-gray-300 bg-white rounded print:text-black print:border-gray-400";
                        wordCard.innerText = token;
                        wordRow.appendChild(wordCard);
                    });

                    row.appendChild(wordRow);
                    cutSection.appendChild(row);
                });
                pageDiv.appendChild(cutSection);

                container.appendChild(pageDiv);
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        window.onload = generateWorksheet;
    </script>
</body>
</html>
