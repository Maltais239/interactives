<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science PAT Practice</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    * { font-family: 'Nunito', sans-serif; }
    h1, h2, h3, .bubbly { font-family: 'Fredoka', sans-serif; letter-spacing: -0.01em; }

    .bg-mesh {
      background-image:
        radial-gradient(at 20% 10%, rgba(167, 139, 250, 0.18) 0px, transparent 50%),
        radial-gradient(at 80% 0%, rgba(252, 165, 165, 0.18) 0px, transparent 50%),
        radial-gradient(at 0% 90%, rgba(125, 211, 252, 0.20) 0px, transparent 50%),
        radial-gradient(at 90% 80%, rgba(134, 239, 172, 0.18) 0px, transparent 50%);
    }

    .cat-card {
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .cat-card::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.45), rgba(255,255,255,0));
      opacity: 0; transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .cat-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 20px 40px -12px rgba(0,0,0,0.18); }
    .cat-card:hover::before { opacity: 1; }
    .cat-card:active { transform: translateY(-2px) scale(1.00); }

    .cat-emoji {
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: inline-block;
    }
    .cat-card:hover .cat-emoji { transform: scale(1.2) rotate(-8deg); }

    .option-btn { transition: all 0.18s ease; }
    .option-btn:hover:not(.selected):not(.correct-answer):not(.wrong-answer):not(:disabled) {
      transform: translateX(4px);
      border-color: #c4b5fd;
      background: #faf5ff;
    }
    .option-btn.selected {
      border-color: #8b5cf6;
      background: linear-gradient(135deg, #ede9fe, #f3e8ff);
      box-shadow: 0 4px 12px -2px rgba(139, 92, 246, 0.25);
    }
    .option-btn.correct-answer {
      border-color: #22c55e;
      background: linear-gradient(135deg, #dcfce7, #d1fae5);
      box-shadow: 0 4px 12px -2px rgba(34, 197, 94, 0.25);
    }
    .option-btn.wrong-answer {
      border-color: #ef4444;
      background: linear-gradient(135deg, #fee2e2, #fecaca);
    }
    .option-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: white;
      border: 2px solid currentColor;
      font-weight: 800;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .option-btn.correct-answer .option-letter { background: #22c55e; color: white; border-color: #22c55e; }
    .option-btn.wrong-answer .option-letter { background: #ef4444; color: white; border-color: #ef4444; }
    .option-btn.selected .option-letter { background: #8b5cf6; color: white; border-color: #8b5cf6; }

    .fade-in { animation: fadeIn 0.4s ease both; }
    .pop-in { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }

    .progress-bar-fill { transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .question-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px; height: 32px;
      padding: 0 8px;
      border-radius: 16px;
      background: linear-gradient(135deg, #c4b5fd, #ddd6fe);
      color: #5b21b6;
      font-weight: 800;
      font-size: 0.85rem;
      margin-right: 10px;
      box-shadow: 0 2px 4px rgba(139, 92, 246, 0.15);
    }

    .score-circle {
      background: conic-gradient(var(--score-color, #8b5cf6) calc(var(--score-pct, 0) * 1%), #e9d5ff 0);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .score-inner {
      background: white;
      border-radius: 50%;
      width: calc(100% - 16px);
      height: calc(100% - 16px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .feedback-text { animation: fadeIn 0.3s ease both; }

    .nav-btn {
      transition: all 0.2s ease;
    }
    .nav-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px -4px rgba(0,0,0,0.15);
    }
    .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .badge-streak {
      animation: bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes bounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd6fe; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #c4b5fd; }

    @media (max-width: 640px) {
      .question-num { min-width: 28px; height: 28px; font-size: 0.75rem; }
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

              <i data-lucide="refresh-cw" style="width:20px;height:20px;"></i> Try again
            </button>
            <button id="home-btn" class="hidden nav-btn bg-white border-2 border-purple-300 text-purple-600 font-bold px-8 py-3.5 rounded-full shadow-md bubbly text-lg flex items-center gap-2">
              <i data-lucide="home" style="width:20px;height:20px;"></i> All topics
            </button>
          </div>

          <!-- Results celebration -->
          <div id="results-celebration" class="hidden mt-8 text-center"></div>
        </div>
      </div>
    </div>
  </div>

        { q:"Which of the following is a gas giant planet?", opts:["Mercury","Venus","Jupiter","Mars"], ans:2 },
        { q:"What is a comet?", opts:["A small solid planet","A celestial body that develops a tail of gas and dust as it nears the Sun","An artificial satellite","A small rocky asteroid"], ans:1 },
        { q:"The Sun is classified as...", opts:["A rocky planet","A gravitational satellite","A star","A giant asteroid"], ans:2 },
        { q:"What is the largest object in our solar system?", opts:["Jupiter","Earth","Saturn","The Sun"], ans:3 },
        { q:"What is a natural satellite?", opts:["Something launched by humans","A celestial body, like a moon, that orbits a planet","A loose asteroid","A robotic spacecraft"], ans:1 },
        { q:"What is a space telescope?", opts:["A telescope on Earth","An instrument placed in orbit to observe space","A tool for the naked eye","A propelled rocket"], ans:1 },
        { q:"How do space probes send information back to Earth?", opts:["Through radio signals","By Earth-based fibre optic cable","By amplified voice","They cannot send information"], ans:0 },
        { q:"What is the closest natural celestial body to Earth?", opts:["Mercury","Venus","The Moon","Mars"], ans:2 },
        { q:"Why do humans study the solar system?", opts:["Just to be bored","To understand the universe and our place in it","Just to watch rockets","There is no good reason"], ans:1 }
      ],
      cs: [
        { q:"What is abstraction in computer science?", opts:["Making things more complicated","Adding all possible details","Simplifying by keeping the important parts and removing unnecessary details","Just changing colours"], ans:2 },
        { q:"Which is a real-world example of abstraction?", opts:["Showing every technical detail","Simple controls on appliances like a power button","Writing very complex code","Nothing in particular"], ans:1 },
        { q:"What is information?", opts:["Completely random data","Only numbers","Data that has been organized to be useful","Only written text"], ans:2 },
        { q:"Which code structure repeats a set of instructions?", opts:["A linear sequence","A conditional","A loop","A simple variable"], ans:2 },
        { q:"What is a sequence in programming?", opts:["Random instructions","Instructions that skip around","An ordered set of instructions executed one after another","Instructions that never run"], ans:2 },
        { q:"What does an if-then-else statement do?", opts:["Repeats forever","Executes different actions depending on conditions","Stops the program automatically","Saves data only"], ans:1 },
        { q:"Which is an example of using a computational artifact to address a societal need?", opts:["A toy that does nothing useful","Weather modelling apps that warn of severe storms","A broken calculator","A random pattern with no meaning"], ans:1 },
        { q:"Impacts of technology can be...", opts:["Always positive","Always negative","Personal, social, environmental, and economic","Never real"], ans:2 },
        { q:"Which is a possible UNINTENDED impact of technology?", opts:["Helping people directly","Creating medical devices","Reducing face-to-face communication","Improving public transit"], ans:2 },
        { q:"Why is it important to plan design and coding?", opts:["It is never important","To efficiently solve real needs and problems","To slow down the process","Just for fun"], ans:1 },
        { q:"A loop in programming is used to...", opts:["Do nothing in particular","Skip certain steps","Repeat an action multiple times","End the program completely"], ans:2 },
        { q:"A conditional in code allows you to...", opts:["Always do exactly the same thing","Make decisions based on different situations","Do nothing useful","Cause an error"], ans:1 },
        { q:"What is an algorithm?", opts:["A serious code error","A set of step-by-step instructions to solve a problem","A specific type of language","Nothing important"], ans:1 },
        { q:"Which is a POSITIVE impact of technology?", opts:["Isolating people completely","Instant global communication","Job losses everywhere","Increased pollution"], ans:1 },
        { q:"Which is a NEGATIVE environmental impact of technology?", opts:["No negative impact ever","Excessive energy consumption and electronic waste","Total improvement of the environment","Creation of new resources"], ans:1 },
        { q:"How can technology help people with disabilities?", opts:["It cannot","Through adaptive devices and specialized software","Just for occasional hobbies","It is too complicated to help"], ans:1 },
        { q:"What is computer code?", opts:["A major system error","Instructions written in a language that computers understand","Only a foreign spoken language","Nothing important"], ans:1 },
        { q:"Which of the following is a programming language?", opts:["Spoken French","Spoken Spanish","Python","Spoken English"], ans:2 },
        { q:"What is the goal of design in computer science?", opts:["No particular goal","To create an effective and usable solution","Just to add nice colours","To intentionally cause errors"], ans:1 },
        { q:"How do you test a computer program?", opts:["You never test it","You check whether it works correctly and fix any bugs","Ignore it completely","Hide it intentionally"], ans:1 }
      ],
      method: [
        { q:"What is a scientific explanation?", opts:["An imaginary story","An explanation based on investigation and evidence","A simple guess without data","Whatever the majority believes"], ans:1 },
        { q:"To be acceptable in science, an explanation must be...", opts:["Very complicated","Testable (falsifiable) by investigation","Accepted by leadership","Based on personal beliefs"], ans:1 },
        { q:"What is a hypothesis in research?", opts:["A proven fact","A proposed explanation developed before an investigation, based on prior knowledge","An observation with no plan","The final conclusion of an inquiry"], ans:1 },
        { q:"Strong hypotheses are based on...", opts:["Wishes and hopes","Prior knowledge and observations","Random guessing only","What is shown on TV"], ans:1 },
        { q:"What is scientific evidence?", opts:["A researcher's personal feeling","Data that supports or contradicts a hypothesis","Anyone's untested opinion","An untested guess"], ans:1 },
        { q:"Which can be explained scientifically?", opts:["Nothing at all","The phases of the Moon, based on the positions of Earth, Moon, and Sun","Only magic","Only ancient mysteries"], ans:1 },
        { q:"Why are accuracy and precision essential in experiments?", opts:["Just for fun","To produce trustworthy and reproducible evidence","To use up more time","They are completely useless"], ans:1 },
        { q:"How do First Nations, Métis, and Inuit share explanations of natural phenomena?", opts:["Only through published books","Through oral traditions, stories, visual forms, and written texts","Only through computer science","They never share knowledge"], ans:1 },
        { q:"How do scientists validate that evidence is reliable?", opts:["One scientist simply says it is true","Through accuracy, repeated investigation, and review by other scientists","By a simple majority vote","Without any verification"], ans:1 },
        { q:"What do scientists do when they encounter conflicting evidence?", opts:["They ignore the evidence completely","They investigate further and may refine the explanation","They never change their ideas","They wait 100 years before acting"], ans:1 },
        { q:"What is a variable in an experiment?", opts:["An opinion that constantly changes","Something that always stays constant","Something that can change and be measured","Something with no importance"], ans:2 },
        { q:"What is the role of a control group?", opts:["The group that gets the experimental treatment","The reference group used for comparison without the treatment","The group that runs the experiment","No real role"], ans:1 },
        { q:"How should you document scientific observations?", opts:["No documentation is needed","With precise notes, diagrams, charts, and tables","Only by taking photos and nothing else","Mentally without writing anything"], ans:1 },
        { q:"What is the role of skepticism in science?", opts:["To reject every idea completely","To question claims and ask for evidence","No particular role","No importance at all"], ans:1 },
        { q:"How does science correct its mistakes over time?", opts:["Science never admits mistakes","Through ongoing collection of new evidence and reinvestigation","With one single conflicting study","Extremely slowly, never really"], ans:1 },
        { q:"Which is a historically incorrect explanation that was later refined?", opts:["The Earth is roughly spherical","The Sun revolves around the Earth","Plants need sunlight","Water is made of molecules"], ans:1 },
        { q:"What does a scientific inquiry typically involve?", opts:["A random question with no plan","A structured process for answering a question with evidence","Nothing in particular","A horror story"], ans:1 },
        { q:"Why do scientists repeat experiments multiple times?", opts:["Because it is boring","To confirm the reliability of the results","For no particular reason","Repeating is forbidden in science"], ans:1 },
        { q:"How are scientific results typically communicated?", opts:["Never; they are kept secret","Through accurate graphs, tables, reports, and presentations","Only verbally in person","They are classified information"], ans:1 },
        { q:"What is a scientific theory?", opts:["An imaginary guess","A well-tested explanation supported by a large body of evidence","A lie made up by scientists","A personal opinion"], ans:1 }
      ]
    };

    // ============== STATE ==============
    let currentCategory = null;
    let userAnswers = {};
    let checked = false;

    // ============== BUILD CATEGORY CARDS ==============
    const grid = document.getElementById('cat-grid');
    categories.forEach((cat, i) => {
      const count = allQuestions[cat.id].length;
      const card = document.createElement('button');
      card.className = `cat-card bg-gradient-to-br ${cat.color} ${cat.border} border-2 rounded-3xl p-6 text-left fade-in shadow-md`;
      card.style.animationDelay = `${i * 0.06}s`;
      card.innerHTML = `
        <div class="flex items-start justify-between mb-3">
          <div class="text-5xl cat-emoji">${cat.emoji}</div>
          <div class="bg-white/60 backdrop-blur px-2.5 py-1 rounded-full text-xs font-extrabold ${cat.text}">
            ${count} Q
          </div>
        </div>
        <h3 class="bubbly text-xl font-bold ${cat.text} leading-tight">${cat.name}</h3>
        <p class="text-sm ${cat.text} opacity-75 mt-1.5 font-medium">${cat.desc}</p>
        <div class="mt-4 flex items-center gap-1.5 text-xs font-extrabold ${cat.text} opacity-80 bubbly">
          <span>START</span>
          <i data-lucide="arrow-right" style="width:14px;height:14px;"></i>
        </div>
      `;
      card.setAttribute('aria-label', `Start ${cat.name} quiz with ${count} questions`);
      card.onclick = () => openCategory(cat.id);
      grid.appendChild(card);
    });

    // ============== OPEN CATEGORY ==============
    function openCategory(catId) {
      currentCategory = catId;
      userAnswers = {};
      checked = false;
      const cat = categories.find(c => c.id === catId);
      const qs = allQuestions[catId];

      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'flex';
      const titleEl = document.getElementById('quiz-title');
      titleEl.textContent = `${cat.emoji} ${cat.name}`;
      titleEl.className = `text-2xl md:text-3xl font-extrabold bubbly ${cat.text}`;

      document.getElementById('score-badge').classList.add('hidden');
      document.getElementById('check-btn').style.display = '';
      document.getElementById('reset-btn').classList.add('hidden');
      document.getElementById('home-btn').classList.add('hidden');
      document.getElementById('results-celebration').classList.add('hidden');
      document.getElementById('progress-section').style.display = '';

      document.getElementById('progress-total').textContent = `Total: ${qs.length} questions`;
      updateProgress();

      const container = document.getElementById('questions-container');
      container.innerHTML = '';
      qs.forEach((question, qi) => {
        const div = document.createElement('div');
        div.className = 'mb-7 fade-in';
        div.style.animationDelay = `${qi * 0.025}s`;
        div.innerHTML = `
          <p class="font-bold text-gray-700 mb-3 text-base flex items-start">
            <span class="question-num bubbly">${qi+1}</span>
            <span class="flex-1 pt-1">${question.q}</span>
          </p>
          <div class="grid gap-2.5" id="opts-${qi}">
            ${question.opts.map((opt, oi) => `
              <button class="option-btn w-full text-left px-4 py-3 rounded-2xl border-2 border-gray-200 bg-white font-semibold text-gray-700 text-sm flex items-start gap-3" data-qi="${qi}" data-oi="${oi}">
                <span class="option-letter mt-0.5" style="color: ${cat.accent};">${String.fromCharCode(65+oi)}</span>
                <span class="flex-1">${opt}</span>
              </button>
            `).join('')}
          </div>
          <p class="feedback-text text-sm font-bold mt-2 hidden"></p>
        `;
        container.appendChild(div);
      });

      // Option click handlers
      container.querySelectorAll('.option-btn').forEach(btn => {
        btn.onclick = () => {
          if (checked) return;
          const qi = parseInt(btn.dataset.qi);
          const oi = parseInt(btn.dataset.oi);
          userAnswers[qi] = oi;
          document.querySelectorAll(`#opts-${qi} .option-btn`).forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          updateProgress();
        };
      });

      window.scrollTo(0, 0);
      lucide.createIcons();
    }

    // ============== UPDATE PROGRESS ==============
    function updateProgress() {
      const qs = allQuestions[currentCategory];
      const answered = Object.keys(userAnswers).length;
      const pct = (answered / qs.length) * 100;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('progress-text').textContent = `Answered: ${answered}`;
    }

    // ============== BUTTON HANDLERS ==============
    document.getElementById('back-btn').onclick = () => {
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('home-screen').style.display = 'flex';
    };

    document.getElementById('home-btn').onclick = () => {
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('home-screen').style.display = 'flex';
    };

    document.getElementById('check-btn').onclick = () => {
      if (checked) return;
      checked = true;
      const qs = allQuestions[currentCategory];
      const cat = categories.find(c => c.id === currentCategory);
      let score = 0;

      qs.forEach((question, qi) => {
        const optsDiv = document.getElementById(`opts-${qi}`);
        const buttons = optsDiv.querySelectorAll('.option-btn');
        const userAns = userAnswers[qi];
        const correctAns = question.ans;

        buttons.forEach((btn, oi) => {
          btn.disabled = true;
          btn.style.cursor = 'default';
          if (oi === correctAns) {
            btn.classList.add('correct-answer');
            btn.classList.remove('selected');
          } else if (oi === userAns && userAns !== correctAns) {
            btn.classList.add('wrong-answer');
            btn.classList.remove('selected');
          }
        });

        if (userAns === correctAns) score++;

        const fb = optsDiv.parentElement.querySelector('.feedback-text');
        fb.classList.remove('hidden');
        if (userAns === undefined) {
          fb.textContent = '⚠️ Not answered. The correct answer is highlighted in green.';
          fb.className = 'feedback-text text-sm font-bold mt-3 text-amber-600';
        } else if (userAns === correctAns) {
          fb.textContent = '✅ Correct! Nice work.';
          fb.className = 'feedback-text text-sm font-bold mt-3 text-green-600';
        } else {
          fb.textContent = `❌ Not quite. The correct answer is ${String.fromCharCode(65 + correctAns)}.`;
          fb.className = 'feedback-text text-sm font-bold mt-3 text-red-500';
        }
      });

      // Score display
      const pct = Math.round(score/qs.length*100);
      const badge = document.getElementById('score-badge');
      badge.textContent = `🏆 ${score} / ${qs.length}  •  ${pct}%`;
      badge.classList.remove('hidden');

      // Results celebration
      const celebration = document.getElementById('results-celebration');
      let message = '';
      let emoji = '';
      let colour = '#8b5cf6';
      if (pct >= 90) { message = 'Amazing! You really know your stuff!'; emoji = '🎉🌟'; colour = '#16a34a'; }
      else if (pct >= 75) { message = 'Great job! You\'re well prepared.'; emoji = '🎯'; colour = '#22c55e'; }
      else if (pct >= 60) { message = 'Good effort! A bit more practice and you\'ll ace it.'; emoji = '💪'; colour = '#f59e0b'; }
      else if (pct >= 40) { message = 'Keep practicing - you\'re building knowledge!'; emoji = '📚'; colour = '#f97316'; }
      else { message = 'Don\'t give up! Review the answers and try again.'; emoji = '🌱'; colour = '#ef4444'; }

      celebration.innerHTML = `
        <div class="pop-in">
          <div class="inline-block">
            <div class="score-circle w-32 h-32 mx-auto" style="--score-pct: ${pct}; --score-color: ${colour};">
              <div class="score-inner">
                <div class="text-3xl font-extrabold bubbly" style="color: ${colour};">${pct}%</div>
                <div class="text-xs font-bold text-gray-500">${score}/${qs.length}</div>
              </div>
            </div>
          </div>
          <div class="mt-4 text-2xl">${emoji}</div>
          <p class="bubbly text-xl font-bold mt-2" style="color: ${colour};">${message}</p>
        </div>
      `;
      celebration.classList.remove('hidden');

      document.getElementById('check-btn').style.display = 'none';
      document.getElementById('reset-btn').classList.remove('hidden');
      document.getElementById('home-btn').classList.remove('hidden');
      document.getElementById('progress-section').style.display = 'none';

      lucide.createIcons();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    document.getElementById('reset-btn').onclick = () => openCategory(currentCategory);

    // ============== ELEMENT SDK ==============
    const defaultConfig = {
      main_title: "🔬 Science PAT Practice",
      subtitle: "Get ready for your Provincial Achievement Test!",
      background_color: "#faf5ff",
      surface_color: "#ffffff",
      text_color: "#581c87",
      primary_action_color: "#a855f7",
      secondary_action_color: "#7dd3fc",
      font_family: "Nunito",
      font_size: 16
    };

    function applyConfig(config) {
      const t = (k) => config[k] || defaultConfig[k];
      document.getElementById('main-title').textContent = t('main_title');
      document.getElementById('subtitle').textContent = t('subtitle');
      document.body.style.fontFamily = `${t('font_family')}, Nunito, sans-serif`;
      document.querySelectorAll('.bubbly, h1, h2, h3').forEach(el => {
        el.style.fontFamily = `'Fredoka', ${t('font_family')}, sans-serif`;
      });
      const fs = t('font_size');
      document.body.style.fontSize = fs + 'px';
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => applyConfig(config),
        mapToCapabilities: (config) => {
          const c = (key) => ({
            get: () => config[key] || defaultConfig[key],
            set: (v) => { config[key] = v; window.elementSdk.setConfig({ [key]: v }); }
          });
          return {
            recolorables: [c('background_color'), c('surface_color'), c('text_color'), c('primary_action_color'), c('secondary_action_color')],
            borderables: [],
            fontEditable: c('font_family'),
            fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
          };
        },
        mapToEditPanelValues: (config) => new Map([
          ["main_title", config.main_title || defaultConfig.main_title],
          ["subtitle", config.subtitle || defaultConfig.subtitle]
        ])
      });
    }

    lucide.createIcons();
  </script>
