<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3 Minute Spanish Vocab Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --green:#58cc02;--gd:#46a302;--gs:#d7f5b1;--gxs:#f0fde4;
  --gold:#ffc800;--golds:#fff9e6;
  --red:#ff4b4b;--reds:#ffe8e8;
  --blue:#1cb0f6;--blues:#e8f7ff;
  --purple:#a560f8;--purples:#f3e8ff;
  --bg:#f2f6f0;--panel:#fff;--text:#1a2332;--muted:#64748b;
  --border:#e2e8f0;--border-b:#c8d5e0;
  --shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 8px 28px rgba(0,0,0,.10);
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:'Nunito',ui-sans-serif,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.topbar{background:linear-gradient(140deg,#3da800 0%,var(--green) 50%,#7ddd20 100%);color:#fff;padding:24px 20px 28px;position:relative;overflow:hidden}
.topbar::after{content:'🇲🇽';position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:3.5rem;opacity:.18;pointer-events:none}
.topbar-inner,.app{max-width:1100px;margin:0 auto}
.topbar h1{margin:0 0 5px;font-size:clamp(1.7rem,3vw,2.5rem);font-weight:900;line-height:1.1;letter-spacing:-.025em}
.topbar p{margin:0;color:rgba(255,255,255,.88);font-size:.93rem;font-weight:700;max-width:560px}
.app{margin-top:0;padding:12px 14px 36px}
.shell{background:var(--panel);border-radius:26px;box-shadow:var(--shadow-md);overflow:hidden}
.nav{display:flex;gap:4px;padding:10px;border-bottom:2px solid var(--border);background:#f8faf7}
.nav button{flex:1;border:none;background:transparent;color:var(--muted);border-radius:12px;padding:9px 4px 7px;font-weight:800;font-size:.75rem;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.01em;text-transform:uppercase}
.nav button .ni{font-size:1.4rem;line-height:1;transition:transform .2s}
.nav button.active{background:var(--gxs);color:var(--gd)}
.nav button.active .ni{transform:scale(1.15)}
.nav button:hover:not(.active){background:#eef2eb;color:var(--text)}
.content{padding:18px}
.section{display:none}.section.active{display:block}
.grid{display:grid;gap:14px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.card{background:var(--panel);border:2px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm)}
.card h2{margin:0 0 10px;font-weight:900;line-height:1.15;font-size:1.2rem}
.card h3{margin:0 0 8px;font-weight:800;font-size:1rem}
.muted{color:var(--muted)}.small{font-size:.9rem}.tiny{font-size:.78rem}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.btn{border:2px solid var(--border);border-bottom:4px solid var(--border-b);border-radius:14px;padding:10px 18px;background:#fff;cursor:pointer;font-weight:800;font-size:.93rem;color:var(--text);font-family:inherit;transition:transform .08s,border-bottom-width .08s,background .12s;display:inline-flex;align-items:center;gap:6px;user-select:none}
.btn:hover{background:#f4f8f2}
.btn:active{border-bottom-width:2px;transform:translateY(2px)}
.btn.primary{background:var(--green);border-color:var(--gd);border-bottom-color:#337800;color:#fff}
.btn.primary:hover{background:#52be02}
.btn.primary:active{background:var(--gd)}
.btn.soft{background:var(--gs);border-color:#a8e06b;border-bottom-color:#7dc23a;color:#2d7a00}
.btn.danger{background:var(--reds);border-color:var(--red);border-bottom-color:#cc2222;color:#aa0000}
.btn-icon{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);border-bottom:3px solid var(--border-b);background:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:transform .08s,border-bottom-width .08s;padding:0}
.btn-icon:active{border-bottom-width:1px;transform:translateY(1px)}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:5px 11px;font-size:.8rem;font-weight:800;width:fit-content}
.pill.green{background:var(--gs);color:#2d7a00}
.pill.blue{background:var(--blues);color:#0880bf}
.pill.yellow{background:var(--golds);color:#9a7200}
.pill.purple{background:var(--purples);color:#7030c8}
.pill.red{background:var(--reds);color:#bb1111}
.pill.gray{background:#f1f5f9;color:#475569}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:7px;margin-top:10px}
.lesson-tile{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px 8px;border:2px solid var(--border);border-bottom:3px solid var(--border-b);border-radius:14px;background:#fafcf9;cursor:pointer;text-align:center;font-family:inherit;transition:all .12s;position:relative;outline:none}
.lesson-tile:hover{border-color:#94a3b8;background:#f1f5ee}
.lesson-tile.sel{border-color:var(--green);border-bottom-color:var(--gd);background:var(--gxs);color:var(--gd)}
.lesson-tile.off{opacity:.35;cursor:not-allowed;pointer-events:none}
.lesson-tile .lt-num{font-size:1rem;font-weight:900}
.lesson-tile .lt-words{font-size:.65rem;color:var(--muted);font-weight:700}
.lesson-tile .lt-dot{width:7px;height:7px;border-radius:50%;background:#dde3e9;margin-top:2px;transition:background .15s}
.lesson-tile.sel .lt-dot{background:var(--green)}
.pack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:7px;margin-top:10px}
.pack-chip{display:flex;align-items:center;gap:7px;padding:9px 11px;border:2px solid var(--border);border-bottom:3px solid var(--border-b);border-radius:12px;background:#fafcf9;cursor:pointer;font-size:.85rem;font-weight:800;font-family:inherit;transition:all .12s;color:var(--text)}
.pack-chip:hover{border-color:#94a3b8}
.pack-chip.sel{border-color:var(--green);border-bottom-color:var(--gd);background:var(--gxs);color:var(--gd)}
.pack-chip input[type=checkbox]{width:15px;height:15px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.summary-box{border:2px solid var(--border);border-radius:14px;padding:14px 12px;background:#fafcf9;text-align:center}
.summary-box .value{font-size:1.9rem;font-weight:900;line-height:1;margin-bottom:3px}
.summary-box .label{font-size:.78rem;font-weight:700;color:var(--muted)}
.session-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:2px solid var(--border);background:#f8faf7}
.session-prog-wrap{flex:1;height:14px;background:#e2e8e0;border-radius:7px;overflow:hidden}
.session-bar{height:100%;background:linear-gradient(90deg,var(--green),#7ddd20);border-radius:7px;transition:width .5s cubic-bezier(.4,0,.2,1);min-width:4px}
.score-badge{background:var(--golds);color:#9a7200;border:2px solid #ffc800;border-radius:999px;padding:5px 12px;font-size:.85rem;font-weight:900;white-space:nowrap}
.review-card{max-width:720px;margin:14px auto;padding:26px 22px 22px;text-align:center}
.ex-label{margin-bottom:14px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.task-hint{font-size:.8rem;color:var(--muted);font-weight:700;margin-bottom:14px}
.prompt{font-size:clamp(1.5rem,4.5vw,2.6rem);font-weight:900;line-height:1.2;margin:0 0 6px;color:var(--text);letter-spacing:-.02em}
.prompt.long{font-size:clamp(1.1rem,2.8vw,1.7rem);font-weight:800}
.speak-row{display:flex;justify-content:center;margin:12px 0 4px}
.speak-btn{background:var(--blues);border:2px solid #8dd9f8;border-bottom:3px solid #0d90d9;border-radius:999px;color:#0880bf;font-weight:800;font-family:inherit;padding:9px 22px;cursor:pointer;font-size:.9rem;transition:transform .08s,border-bottom-width .08s;display:inline-flex;align-items:center;gap:7px}
.speak-btn:active{border-bottom-width:1px;transform:translateY(1px)}
.ans-wrap{max-width:460px;margin:16px auto 0}
.ans-wrap input{width:100%;border:2px solid var(--border);border-bottom:3px solid var(--border-b);border-radius:14px;padding:14px 16px;background:#fff;color:var(--text);font:800 1.05rem 'Nunito',sans-serif;outline:none;transition:border-color .15s,box-shadow .15s}
.ans-wrap input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(88,204,2,.14);border-bottom-color:var(--gd)}
.action-row{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:14px}
.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin:16px auto 0;max-width:540px}
.choice{background:#fff;border:2px solid var(--border);border-bottom:4px solid var(--border-b);border-radius:16px;padding:14px 14px;font-weight:800;font-size:.95rem;font-family:inherit;cursor:pointer;text-align:left;line-height:1.35;color:var(--text);transition:all .08s;position:relative}
.choice:hover{border-color:#94a3b8;background:#f8faf6;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.07)}
.choice:active{border-bottom-width:2px;transform:translateY(2px)}
.choice.correct{background:var(--gs)!important;border-color:var(--green)!important;border-bottom-color:var(--gd)!important;color:#2d7a00!important;transform:none}
.choice.wrong{background:var(--reds)!important;border-color:var(--red)!important;border-bottom-color:#cc2222!important;color:#aa0000!important;transform:none}
.feedback-bar{padding:13px 16px;border-radius:14px;margin-top:14px;font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:10px;animation:pop-in .2s ease-out}
.feedback-bar.correct-fb{background:var(--gs);border:2px solid #a8e06b;color:#2d7a00}
.feedback-bar.wrong-fb{background:var(--reds);border:2px solid #ffb3b3;color:#aa0000}
.answer-reveal{margin-top:10px;padding:14px 16px;border-radius:14px;background:var(--gxs);border:2px solid var(--gs);text-align:left;animation:pop-in .2s ease-out}
.reveal-label{font-size:.72rem;font-weight:900;color:var(--gd);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.reveal-text{font-size:1.2rem;font-weight:900;color:var(--text)}
.empty{padding:28px;border:2px dashed var(--border);border-radius:16px;color:var(--muted);background:#fafcf9;text-align:center;font-weight:700}
.praise-screen{padding:32px 16px;display:flex;flex-direction:column;align-items:center;gap:8px}
.praise-icon{font-size:3.5rem;animation:bounce .4s ease}
.praise-text{font-size:1.5rem;font-weight:900;color:var(--gd)}
.session-complete{padding:36px 24px;text-align:center}
.complete-icon{font-size:4rem;display:block;margin-bottom:6px;animation:bounce .5s ease}
.complete-title{font-size:1.9rem;font-weight:900;margin:0 0 18px;color:var(--text)}
.score-ring{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:110px;height:110px;border-radius:50%;border:5px solid var(--green);background:var(--gxs);margin:0 auto 20px}
.ring-pct{font-size:1.9rem;font-weight:900;color:var(--gd);line-height:1}
.ring-label{font-size:.72rem;font-weight:800;color:var(--muted)}
.stat-row{display:grid;grid-template-columns:1fr 64px 100px;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-name{font-size:.88rem;font-weight:700}
.stat-count{font-size:.82rem;color:var(--muted);font-weight:700;text-align:right}
.stat-bar-wrap{height:9px;background:var(--border);border-radius:5px;overflow:hidden}
.stat-bar{height:100%;border-radius:5px;background:var(--green);transition:width .7s cubic-bezier(.4,0,.2,1)}
.stat-bar.full{background:var(--gold)}
.status{font-weight:800;border-radius:999px;padding:4px 10px;display:inline-block;font-size:.74rem}
.status.new{background:#f1f5f9;color:#475569}
.status.learning{background:var(--golds);color:#9a7200}
.status.strong{background:var(--blues);color:#0880bf}
.status.mastered{background:var(--gs);color:#2d7a00}
.word-table{width:100%;border-collapse:collapse;font-size:.92rem}
.word-table th,.word-table td{border-bottom:1px solid var(--border);padding:9px 8px;text-align:left;vertical-align:top}
.word-table th{font-size:.76rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800}
.review-input{max-width:460px;margin:16px auto 0}
.review-input input{width:100%;border:2px solid var(--border);border-radius:12px;padding:12px 14px;background:#fff;color:var(--text);font:800 1rem 'Nunito',sans-serif;outline:none}
.review-input input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(88,204,2,.12)}
.choice-row{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:12px}
.footer-note{margin-top:8px;font-size:.84rem;color:var(--muted);font-weight:700;text-align:center}
.answer-reveal-old{margin-top:14px;padding:14px;border-radius:14px;background:var(--gxs);border:2px solid var(--gs)}
.checkbox-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:7px;margin-top:10px}
.checkbox-pill{display:flex;align-items:center;gap:7px;padding:9px 11px;border:2px solid var(--border);border-radius:12px;background:#fafcf9;cursor:pointer;font-size:.86rem;font-weight:700;font-family:inherit}
.checkbox-pill input{width:auto;margin:0;accent-color:var(--green)}
@keyframes pop-in{0%{transform:scale(.88);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-14px)}70%{transform:translateY(-6px)}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-7px)}35%{transform:translateX(7px)}55%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.cloze-prompt{font-size:clamp(1.1rem,3.5vw,1.8rem);font-weight:800;line-height:1.5;background:linear-gradient(135deg,#f0fde4,#e8f7ff);border:2px solid #b8e6a0;border-radius:14px;padding:16px 20px;margin:0 auto 4px;max-width:600px;text-align:center}
.cloze-blank{display:inline-block;min-width:80px;border-bottom:3px solid var(--green);padding:0 8px;color:var(--green);font-style:italic}
.cloze-hint{font-size:.82rem;color:var(--muted);font-weight:700;margin-top:6px;font-style:italic}
.anim-pop{animation:pop-in .22s ease-out both}
.anim-shake{animation:shake .4s ease both}
@media(max-width:680px){
  /* Layout */
  .grid.cols-2{grid-template-columns:1fr}
  .content{padding:10px}
  .shell{border-radius:18px}
  .app{padding:0 8px 24px}
  .topbar{padding:18px 16px 22px}

  /* Nav — compact icon-only on very small, label+icon on normal mobile */
  .nav{padding:6px;gap:2px}
  .nav button{font-size:.68rem;padding:8px 2px 6px;border-radius:10px}
  .nav button .ni{font-size:1.25rem}

  /* Review card */
  .review-card{padding:16px 12px;margin:10px auto}
  .prompt{font-size:clamp(1.3rem,6vw,2rem)}
  .prompt.long{font-size:clamp(1rem,4.5vw,1.4rem)}

  /* Choices — full width on mobile for easy tapping */
  .choices{grid-template-columns:1fr;max-width:100%}
  .choice{padding:16px 14px;font-size:1rem}

  /* Session header */
  .session-header{padding:10px 12px;gap:8px}
  .session-prog-wrap{height:12px}
  .score-badge{font-size:.78rem;padding:4px 10px}

  /* Answer input — bigger touch target */
  .ans-wrap input{padding:16px;font-size:1rem;border-radius:12px}

  /* Buttons — min height for touch */
  .btn{min-height:44px;padding:10px 14px}
  .btn.primary{min-height:48px}
  .action-row{gap:8px}
  .action-row .btn{flex:1;justify-content:center;font-size:.9rem}

  /* Speak button */
  .speak-btn{width:100%;justify-content:center;padding:13px 20px}

  /* Lesson grid */
  .lesson-grid{grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:6px}
  .lesson-tile{padding:8px 4px 7px;border-radius:12px}
  .lesson-tile .lt-num{font-size:.9rem}

  /* Pack chips */
  .pack-grid{grid-template-columns:1fr 1fr}
  .pack-chip{font-size:.8rem;padding:8px 9px}

  /* Builder */
  .builder-slots{flex-direction:column}
  .b-slot{min-width:auto;width:100%}
  .word-chips{gap:6px}
  .word-chip{font-size:.82rem;padding:7px 11px}

  /* Summary boxes */
  .summary-box .value{font-size:1.5rem}
  
  /* Session complete */
  .score-ring{width:90px;height:90px}
  .ring-pct{font-size:1.6rem}
  .complete-title{font-size:1.5rem}

  /* Stats bars */
  .stat-row{grid-template-columns:1fr 48px 80px;gap:6px}
  .stat-name{font-size:.82rem}
}

/* Extra-small screens */
@media(max-width:380px){
  .nav button{font-size:.62rem}
  .nav button .ni{font-size:1.1rem}
  .lesson-grid{grid-template-columns:repeat(auto-fill,minmax(56px,1fr))}
  .choices{font-size:.92rem}
  .prompt{font-size:clamp(1.15rem,7vw,1.8rem)}
}
/* ── Sentence Builder ── */
.builder-sentence{min-height:72px;background:linear-gradient(135deg,#f0fde4,#e8f7ff);border:2px solid #b8e6a0;border-radius:18px;padding:16px 20px;margin-bottom:18px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:8px;position:relative}
.builder-sentence .bs-placeholder{color:#a0b090;font-weight:800;font-size:1rem;font-style:italic}
.builder-token{display:inline-flex;align-items:center;gap:6px;background:#fff;border:2px solid var(--green);border-radius:999px;padding:7px 13px 7px 10px;font-weight:900;font-size:1rem;color:var(--gd);cursor:pointer;transition:all .12s;animation:pop-in .2s ease-out}
.builder-token:hover{background:var(--reds);border-color:var(--red);color:#aa0000}
.builder-token .bt-cat{font-size:.62rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;opacity:.65;margin-right:2px}
.builder-neg{display:inline-flex;align-items:center;gap:6px;background:#ffe8e8;border:2px solid var(--red);border-radius:999px;padding:7px 13px;font-weight:900;font-size:1rem;color:#aa0000}
.builder-slots{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.b-slot{flex:1;min-width:140px;border:2px dashed var(--border-b);border-radius:14px;padding:10px 12px;min-height:52px;display:flex;align-items:center;gap:6px;transition:all .15s;background:#fafcf9;cursor:pointer}
.b-slot.active{border-color:var(--blue);background:var(--blues);box-shadow:0 0 0 3px rgba(28,176,246,.15)}
.b-slot.filled{border-style:solid;border-color:var(--green);background:var(--gxs)}
.b-slot.optional{border-color:#cbd5e1}
.b-slot-label{font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);white-space:nowrap}
.b-slot-value{font-size:.95rem;font-weight:900;color:var(--gd)}
.b-slot-empty{font-size:.85rem;color:#b0b8c8;font-weight:700;font-style:italic}
.word-bank-section{margin-bottom:14px}
.word-bank-label{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:7px}
.word-chips{display:flex;flex-wrap:wrap;gap:7px}
.word-chip{border:2px solid var(--border);border-bottom:3px solid var(--border-b);border-radius:999px;padding:7px 14px;background:#fff;font-weight:800;font-size:.88rem;font-family:inherit;cursor:pointer;color:var(--text);transition:all .1s}
.word-chip:hover{border-color:#94a3b8;transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.07)}
.word-chip:active{border-bottom-width:1px;transform:translateY(1px)}
.word-chip.q{border-color:#c4b5fd;background:#f5f0ff;color:#6d28d9}
.word-chip.c{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}
.word-chip.i{border-color:#86efac;background:#f0fdf4;color:#166534}
.word-chip.e{border-color:#fcd34d;background:#fffbeb;color:#92400e}
.word-chip.sel{opacity:.4;pointer-events:none}
.builder-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:4px}
.neg-toggle{display:flex;align-items:center;gap:8px;padding:8px 14px;border:2px solid var(--border);border-radius:999px;font-weight:800;font-size:.88rem;cursor:pointer;background:#fff;font-family:inherit;transition:all .12s}
.neg-toggle.on{background:var(--reds);border-color:var(--red);color:#aa0000}
.example-sentence{padding:12px 16px;border-radius:14px;background:var(--gxs);border:2px solid var(--gs);margin-top:10px;font-size:.92rem;font-weight:700;color:var(--text);line-height:1.5}
.example-sentence strong{color:var(--gd)}

</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <h1>3 Minute Spanish</h1>
    <p>Vocab trainer · Spaced repetition · Typed recall · Listening · Multiple choice</p>
  </div>
</header>
<main class="app">

// ── Practice phrases ──────────────────────────────────────────────────────────
// Format: [spanish, english]  — SRS is applied just like vocab words

  ['Lo quiero en azul, por favor.','I want it in blue, please.'],
  ['Buenos días, ¿cómo está usted?','Good morning, how are you? (formal)'],
  ['Estoy un poco cansado, pero bien, gracias.','I\'m a little tired, but well, thank you.'],
  ['¿Qué tal? Todo el mundo es muy simpático aquí.','How\'s it going? Everyone is very pleasant here.'],
  ['La comida aquí es absolutamente fantástica.','The food here is absolutely fantastic.'],
  ['¿Dónde está el banco? Está todo recto.','Where is the bank? It\'s straight ahead.'],
  ['Quiero un billete de ida y vuelta, por favor.','I want a return ticket, please.'],
  ['Perdón, ¿cuánto es por noche?','Sorry, how much is it per night?'],
  ['Esta noche quiero ir al cine.','Tonight I want to go to the cinema.'],

const STORAGE_KEY = 'tmSpanish_v2';
const MAX_LESSON  = 43; // raise this as new lessons come out
const INTERVALS   = [0,1,3,7,14,30,60];

// ── Utilities ─────────────────────────────────────────────────────────────────
const uid      = () => Math.random().toString(36).slice(2,11);
const todayISO = () => new Date().toISOString();
const addDays  = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r.toISOString(); };
const norm     = t => String(t||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[¿?¡!.,;:()"']/g,'').replace(/\s+/g,' ').trim();
const splitAns = t => String(t||'').split(/\s*[;/]\s*/).map(s=>s.trim()).filter(Boolean);
const shuffle  = a => { for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}return a; };
const esc      = t => String(t??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');

// ── Word factory ──────────────────────────────────────────────────────────────
// pack=null means core lesson word; pack='Pack name' means expansion word
const makeWord = (lessonId,sp,en,pack=null) =>
  ({id:uid(),lessonId,spanish:sp,english:en,pack,attempts:0,correct:0,level:0,dueAt:todayISO(),lastReviewedAt:'',mastered:false});

// ── Build seeded lessons from RAW ─────────────────────────────────────────────
function buildSeeded() {
  const map = new Map(RAW.map(([id,core,packs={}]) => [id, {
    id, title:`Lesson ${id}`,
    vocab: [
      ...core.map(([sp,en]) => makeWord(id,sp,en,null)),
      ...Object.entries(packs).flatMap(([label,words]) => words.map(([sp,en]) => makeWord(id,sp,en,label)))
    ]
  }]));
  for(let i=1;i<=MAX_LESSON;i++) if(!map.has(i)) map.set(i,{id:i,title:`Lesson ${i}`,vocab:[]});
  return [...map.values()].sort((a,b)=>a.id-b.id);
}

// ── Merge seeded with saved progress ──────────────────────────────────────────
// Preserves SRS data for existing words; adds newly seeded words; migrates old notes-based words.
function mergeSeeded(seeded, saved) {
  if(!saved?.length) return seeded;
  const savedMap = new Map(saved.map(l=>[+l.id,l]));
  return seeded.map(sl => {
    const sv = savedMap.get(sl.id);
    if(!sv) return sl;
    const seedLookup = new Map(sl.vocab.map(w=>[`${norm(w.spanish)}|${norm(w.english)}`,w]));
    const merged = sv.vocab.map(w => {
      const seed = seedLookup.get(`${norm(w.spanish)}|${norm(w.english)}`);
      return {...w, pack: w.pack ?? seed?.pack ?? null}; // migrate old notes-based words
    });
    const seen = new Set(merged.map(w=>`${norm(w.spanish)}|${norm(w.english)}`));
    sl.vocab.filter(w=>!seen.has(`${norm(w.spanish)}|${norm(w.english)}`)).forEach(w=>merged.push(w));
    return {...sl,...sv,vocab:merged};
  });
}

// ── App state ─────────────────────────────────────────────────────────────────
const state = {
  tab:'practice', lessons:[], selLessons:[], selPacks:[],
  started:false,
  rev:{queue:[],idx:0,correct:0,total:0,reveal:false,typed:'',lastResult:'',showPraise:null},
  phraseProgress:[], // SRS progress per phrase, indexed parallel to PHRASES
  phraseRev:{queue:[],idx:0,correct:0,total:0,reveal:false,typed:'',lastResult:'',started:false},
  verbDrill:{queue:[],idx:0,reveal:false,correct:0,total:0} // simple drill, no SRS
};

function initPhraseProgress(saved=[]) {
  return PHRASES.map((_,i)=>saved[i]||{level:0,attempts:0,correct:0,dueAt:todayISO(),mastered:false});
}

function saveState() { localStorage.setItem(STORAGE_KEY,JSON.stringify({lessons:state.lessons,selLessons:state.selLessons,selPacks:state.selPacks,phraseProgress:state.phraseProgress})); }

function loadState() {
  const seeded = buildSeeded();
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){ state.lessons=seeded; state.selLessons=defaultLessonIds(seeded); state.selPacks=[]; state.phraseProgress=initPhraseProgress(); return; }
  try {
    const p = JSON.parse(raw);
    state.lessons       = mergeSeeded(seeded, p.lessons||[]);
    state.selLessons    = (p.selLessons||[]).map(Number);
    state.selPacks      = p.selPacks||[];
    state.phraseProgress= initPhraseProgress(p.phraseProgress||[]);
  } catch { state.lessons=seeded; state.selLessons=defaultLessonIds(seeded); state.selPacks=[]; state.phraseProgress=initPhraseProgress(); }
}

// ── Data helpers ──────────────────────────────────────────────────────────────
const getLesson       = id  => state.lessons.find(l=>l.id===+id);
const allWords        = ()  => state.lessons.flatMap(l=>l.vocab.map(w=>({...w,lessonTitle:l.title})));
const coreWords       = id  => getLesson(id)?.vocab.filter(w=>!w.pack)||[];
const defaultLessonIds= (lessons=state.lessons) => lessons.filter(l=>coreWords(l.id).length).map(l=>l.id);
const selLessons      = ()  => [...new Set(state.selLessons.map(Number))].sort((a,b)=>a-b);
const selPacks        = ()  => [...new Set(state.selPacks)];
const packKey         = s   => `${s.lessonId}::${s.label}`;
const parseKey        = k   => { const [id,...rest]=k.split('::'); return {lessonId:+id,label:rest.join('::')}; };
const packWords       = s   => getLesson(s.lessonId)?.vocab.filter(w=>w.pack===s.label)||[];
const getStatus       = w   => w.mastered||w.level>=6?'mastered':w.level>=3?'strong':w.level>=1?'learning':'new';
const isDue           = w   => !w.dueAt||new Date(w.dueAt)<=new Date();

// Derive available expansion packs from lesson data (no separate config array needed)
function allPacks() {
  const seen=new Set(), packs=[];
  for(const l of state.lessons)
    for(const w of l.vocab)
      if(w.pack){ const k=packKey({lessonId:l.id,label:w.pack}); if(!seen.has(k)){seen.add(k);packs.push({lessonId:l.id,label:w.pack});} }
  return packs;
}

function selectedWords() {
  const map = new Map();
  selLessons().forEach(id => coreWords(id).forEach(w=>map.set(w.id,{...w,lessonTitle:getLesson(id)?.title||''})));
  selPacks().forEach(k  => { const s=parseKey(k); packWords(s).forEach(w=>map.set(w.id,{...w,lessonTitle:getLesson(s.lessonId)?.title||''})); });
  return [...map.values()];
}

// ── SRS: update word after review ─────────────────────────────────────────────
function reviewWord(id,rating) {
  for(const l of state.lessons) {
    const i = l.vocab.findIndex(w=>w.id===id);
    if(i<0) continue;
    const w=l.vocab[i], now=todayISO(), n={...w,attempts:w.attempts+1,lastReviewedAt:now};
    if(rating==='again'){ n.level=Math.max(0,n.level-1); n.dueAt=todayISO(); }
    if(rating==='hard') { n.correct++; n.level=Math.min(6,n.level+1); n.dueAt=addDays(now,INTERVALS[Math.max(1,n.level)]||1); }
    if(rating==='good') { n.correct++; n.level=Math.min(6,n.level+2); n.dueAt=addDays(now,INTERVALS[Math.min(6,n.level)]||3); }
    if(rating==='easy') { n.correct++; n.level=Math.min(6,n.level+3); n.dueAt=addDays(now,(INTERVALS[Math.min(6,n.level)]||7)+7); }
    n.mastered=n.level>=6; l.vocab[i]=n; break;
  }
  saveState();
}

// ── Review card builder ───────────────────────────────────────────────────────
function sampleChoices(correct,pool,field,n=4) {
  const choices=[correct], seen=new Set([norm(correct)]);
  for(const w of shuffle([...pool])) { const v=field==='spanish'?w.spanish:w.english; if(v&&!seen.has(norm(v))){seen.add(norm(v));choices.push(v);if(choices.length>=n)break;} }
  return shuffle(choices);
}

function buildCard(word,i,pool) {
  const p   = pool.length>=4?pool:allWords();
  const dir = i%2===0?'es-en':'en-es';
  // cloze = gap-fill in a real sentence context (~1 in 5 cards when phrases available)
  const hasPhrases = typeof PHRASES !== 'undefined' && PHRASES.length > 0;
  const types = p.length>=4
    ? (hasPhrases ? ['typed','typed','mcq','listen','dictation','cloze'] : ['typed','typed','mcq','listen','dictation'])
    : ['typed','typed','listen','dictation'];
  const ex  = types[0|Math.random()*types.length];
  if(ex==='cloze'){
    // Find a phrase containing this Spanish word, blank it out
    const sp = word.spanish.toLowerCase().replace(/[¿?¡!]/g,'').trim();
    const matching = PHRASES.filter(([psp])=>psp.toLowerCase().includes(sp));
    if(matching.length){
      const [psp,pen] = matching[0|Math.random()*matching.length];
      // Find the word position and blank it (case-insensitive, preserving punctuation)
      const re = new RegExp('(' + sp.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'i');
      const blanked = psp.replace(re,'_____');
      if(blanked !== psp){ // only use if we could blank something
        return {...word,ex:'cloze',promptLabel:'Fill in the blank',
          taskText:'Type the missing Spanish word.',
          prompt:blanked, answer:sp, speak:psp, ph:'Type the missing word…',
          hint:`Sentence: "${pen}"`};
      }
    }
    // Fallback to typed if no phrase found
    return dir==='es-en'
      ? {...word,ex:'typed',promptLabel:'Typed recall: Spanish → English',taskText:'Type the English meaning. Include articles (the / a) if part of the answer.',prompt:word.spanish,answer:word.english,speak:word.spanish,ph:'Type the English meaning…'}
      : {...word,ex:'typed',promptLabel:'Typed recall: English → Spanish',taskText:'Type the Spanish answer. Include el / la / un / una if shown.',prompt:word.english,answer:word.spanish,speak:word.spanish,ph:'Type the Spanish answer…'};
  }
  if(ex==='listen')    return {...word,ex,promptLabel:'Listening recognition',taskText:'Tap Play Spanish, then choose the English meaning.',prompt:'Listen to the Spanish word.',answer:word.english,speak:word.spanish,choices:sampleChoices(word.english,p,'english')};
  if(ex==='dictation') return {...word,ex,promptLabel:'Dictation',taskText:'Tap Play Spanish, then type what you hear.',prompt:word.english,answer:word.spanish,speak:word.spanish,ph:'Type the Spanish you hear.'};
  if(ex==='mcq') return dir==='es-en'
    ? {...word,ex,promptLabel:'Multiple choice: Spanish → English',taskText:'Choose the correct English meaning.',prompt:word.spanish,answer:word.english,speak:word.spanish,choices:sampleChoices(word.english,p,'english')}
    : {...word,ex,promptLabel:'Multiple choice: English → Spanish',taskText:'Choose the correct Spanish word.',prompt:word.english,answer:word.spanish,speak:word.spanish,choices:sampleChoices(word.spanish,p,'spanish')};
  return dir==='es-en'
    ? {...word,ex:'typed',promptLabel:'Typed recall: Spanish → English',taskText:'Type the English meaning.',prompt:word.spanish,answer:word.english,speak:word.spanish,ph:'Type the English meaning.'}
    : {...word,ex:'typed',promptLabel:'Typed recall: English → Spanish',taskText:'Type the Spanish answer.',prompt:word.english,answer:word.spanish,speak:word.spanish,ph:'Type the Spanish answer.'};
}

function buildQueue() {
  const words = selectedWords();
  if(!words.length){ state.rev.queue=[]; state.rev.idx=0; return false; }
  const due = words.filter(isDue), src = due.length?due:words;
  state.rev = {queue:shuffle(src.map((w,i)=>buildCard(w,i,src))),idx:0,correct:0,total:0,reveal:false,typed:'',lastResult:''};
  return true;
}

const curCard  = () => state.rev.queue[state.rev.idx]||null;
const nextCard = () => { state.rev.idx++; state.rev.reveal=false; state.rev.typed=''; state.rev.lastResult=''; renderReview(); requestAnimationFrame(()=>{ const r=document.getElementById('reviewArea'); if(r&&window.innerWidth<680) r.scrollIntoView({behavior:'smooth',block:'start'}); }); };

function render() { renderNav(); switchSections(); renderPractice(); renderVerbs(); renderPhrases(); renderBuild(); renderStats(); }

function switchSections() {
  ['practice','verbs','phrases','build','stats'].forEach(id=>document.getElementById(id+'Section').classList.toggle('active',state.tab===id));
}

function renderPractice() {

  // ── Lesson tiles (game-style, not checkboxes) ─────────────────────────────
  const lessonTiles = state.lessons.map(l => {
    const core=coreWords(l.id), hasWords=core.length>0;
    const isSel=selLessons().includes(l.id);

    return `<button class="lesson-tile${isSel?' sel':''}${!hasWords?' off':''}" data-lid="${l.id}" title="${esc(l.title)} — ${core.length} words">

  const setup = `

        <div>

function renderReview() {
  const host=document.getElementById('reviewArea');
  if(!host) return;
  const rev=state.rev;

  if(!rev.queue.length){
    host.innerHTML='<div class="empty">Select lessons above and press <strong>Let\'s Go! 🚀</strong></div>';
    return;
  }

  // ── Praise flash screen (brief, shown after correct typed answer) ──────────
  if(rev.showPraise){
    host.innerHTML=`<div class="card review-card anim-pop">
      <div class="praise-screen">
        <span class="praise-icon">⭐</span>
        <div class="praise-text">${esc(rev.showPraise)}</div>
      </div>
    </div>`;
    return;
  }

  const card=curCard();

  // ── Session complete ───────────────────────────────────────────────────────
  if(!card){
    const accuracy=rev.total?Math.round(rev.correct/rev.total*100):0;
    const emoji=accuracy>=90?'🏆':accuracy>=70?'🎉':accuracy>=50?'💪':'📚';
    host.innerHTML=`<div class="card session-complete anim-pop">
      <span class="complete-icon">${emoji}</span>
      <div class="complete-title">${accuracy>=70?'Great work!':'Keep going!'}</div>
      <div class="score-ring">
        <span class="ring-pct">${accuracy}%</span>
        <span class="ring-label">correct</span>
      </div>
      <div class="toolbar" style="justify-content:center;margin-bottom:20px;">
        <span class="pill green">✓ ${rev.correct} correct</span>
        <span class="pill red">✗ ${rev.total-rev.correct} missed</span>
      </div>
      <button class="btn primary" id="restartBtn" style="font-size:1rem;padding:12px 28px;">Go again 🚀</button>
    </div>`;
    document.getElementById('restartBtn')?.addEventListener('click',()=>{ buildQueue(); renderReview(); });
    // Update session header score after completion
    const bar=document.querySelector('.session-bar'); if(bar) bar.style.width='100%';
    return;
  }

  const isInput=['typed','dictation','cloze'].includes(card.ex);
  const isChoice=['mcq','listen'].includes(card.ex);
  const exColors={typed:'blue',mcq:'purple',listen:'yellow',dictation:'blue',cloze:'green'};

  const speakHTML=card.speak?`<div class="speak-row"><button class="speak-btn" id="speakBtn">🔊 Play Spanish</button></div>`:'';
  const inputHTML=isInput?`<div class="ans-wrap"><input id="ans" placeholder="${esc(card.ph||'Type your answer…')}" value="${esc(rev.typed)}" autocomplete="off" autocorrect="off" spellcheck="false"/></div>`:'';
  const hintHTML=card.hint?`<div class="cloze-hint">💡 ${esc(card.hint)}</div>`:'';
  const choicesHTML=isChoice?`<div class="choices">${card.choices.map(c=>`<button class="choice" data-c="${esc(c)}">${esc(c)}</button>`).join('')}</div>`:'';
  const actionHTML=isInput
    ?`<div class="action-row"><button class="btn primary" id="checkBtn">Check ✓</button><button class="btn" id="revealBtn">Show answer</button><button class="btn" id="skipBtn">Skip</button></div>`
    :`<div class="action-row"><button class="btn" id="skipBtn">Skip</button></div>`;
  const feedbackHTML=rev.reveal
    ?`<div class="feedback-bar wrong-fb anim-pop">✗ ${esc(rev.lastResult)}</div>
       <div class="answer-reveal anim-pop"><div class="reveal-label">Correct answer</div><div class="reveal-text">${esc(card.answer)}</div></div>
       <div class="action-row"><button class="btn primary" id="nextBtn">Continue →</button></div>`
    :'';

  const isLong=card.prompt.length>35;
  // For cloze: render the blank visually
  const promptHTML = card.ex==='cloze'
    ? `<div class="cloze-prompt">${esc(card.prompt).replace('_____','<span class=\"cloze-blank\">_____</span>')}</div>`
    : `<div class="prompt${isLong?' long':''}">${esc(card.prompt)}</div>`;
  host.innerHTML=`<div class="card review-card anim-pop">
    <div class="ex-label">
      <span class="pill ${exColors[card.ex]||'blue'}">${esc(card.promptLabel)}</span>
      <span class="pill gray">${esc(card.lessonTitle)}</span>
    </div>
    <div class="task-hint">${esc(card.taskText)}</div>
    ${promptHTML}
    ${hintHTML||''}
    ${speakHTML}${inputHTML}${choicesHTML}${actionHTML}${feedbackHTML}
  </div>`;

  // Update session bar
  const pct=Math.round((rev.idx/rev.queue.length)*100);
  const bar=document.querySelector('.session-bar'); if(bar) bar.style.width=pct+'%';
  const badge=document.querySelector('.score-badge'); if(badge) badge.textContent='⭐ '+rev.correct;

  // Focus input
  const inp=document.getElementById('ans');
  if(inp){
    inp.focus();
    inp.addEventListener('input',e=>rev.typed=e.target.value);
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('checkBtn')?.click();}});
  }

  document.getElementById('speakBtn')?.addEventListener('click',()=>{
    if('speechSynthesis'in window){window.speechSynthesis.cancel();window.speechSynthesis.speak(Object.assign(new SpeechSynthesisUtterance(card.speak),{lang:'es-ES'}));}
  });

  document.getElementById('checkBtn')?.addEventListener('click',()=>{
    const t=(document.getElementById('ans')?.value||'').trim(); rev.typed=t; rev.total++;
    const ok=splitAns(card.answer).map(norm).includes(norm(t));
    if(ok){
      rev.correct++; reviewWord(card.id,'good');
      rev.showPraise=randPraise(); rev.typed=''; rev.reveal=false;
      renderReview();
      setTimeout(()=>{ rev.showPraise=null; nextCard(); },900);
    } else {
      rev.reveal=true; rev.lastResult=t?'Not an exact match — check the answer below.':'No answer entered.'; renderReview();
    }
  });

  document.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>{
    if(b.dataset.clicked) return; b.dataset.clicked='1';
    const ok=norm(b.dataset.c)===norm(card.answer); rev.total++;
    if(ok){
      b.classList.add('correct'); rev.correct++; reviewWord(card.id,'good');
      setTimeout(()=>nextCard(), 700);
    } else {
      b.classList.add('wrong');
      document.querySelectorAll('.choice').forEach(cb=>{ if(norm(cb.dataset.c)===norm(card.answer)) cb.classList.add('correct'); });
      rev.reveal=true; rev.lastResult='Not quite — see the correct answer above.';
      setTimeout(()=>renderReview(), 800);
    }
  }));

  document.getElementById('revealBtn')?.addEventListener('click',()=>{ rev.total++; reviewWord(card.id,'again'); rev.reveal=true; rev.lastResult='Answer revealed — review and continue.'; renderReview(); });
  document.getElementById('skipBtn')?.addEventListener('click',()=>{ rev.total++; reviewWord(card.id,'again'); nextCard(); });
  document.getElementById('nextBtn')?.addEventListener('click',nextCard);
}

// ── Conjugation Corner ────────────────────────────────────────────────────────
function renderVerbs() {

  // ── Drill card area ────────────────────────────────────────────────────────
  const drillArea = () => {
    if(!drill.queue.length) return '';
    const card = drill.queue[drill.idx];
    if(!card) return `<div class="card review-card"><h2>Drill complete 🎉</h2>
      <div class="toolbar" style="justify-content:center;margin-bottom:12px;">
        <span class="pill green">Correct ${drill.correct} / ${drill.total}</span>
      </div>
      <button class="btn primary" id="vDrillAgainBtn">Drill again</button></div>`;
    return `<div class="card review-card">
      <div class="toolbar" style="justify-content:center;margin-bottom:12px;">
        <span class="pill blue">Verb drill</span>
        <span class="pill yellow">${drill.idx+1} of ${drill.queue.length}</span>
        <span class="pill green">✓ ${drill.correct}</span>
      </div>
      <div class="tiny muted" style="margin-bottom:8px;">Type the Spanish form.</div>

        <button class="btn primary" id="vCheckBtn">Check</button>
        <button class="btn" id="vRevealBtn">Show</button>
        <button class="btn" id="vStopBtn">Stop drill</button>
      </div>
      ${drill.reveal?`<div class="answer-reveal"><div class="tiny muted">Answer</div><div style="font-size:1.3rem;font-weight:800;margin-top:4px;">${esc(card.sp)}</div></div>`:''}
      ${drill.lastResult?`<div class="choice-row"><button class="btn primary" id="vNextBtn">Next</button></div><div class="footer-note">${esc(drill.lastResult)}</div>`:''}

      </table>
    </div>`).join('');

  // ── ser vs estar callout ───────────────────────────────────────────────────
  const callout = `<div class="card" style="margin-top:12px;background:#fff8df;border-color:#f0d060;">
    <h3 style="margin-bottom:6px;">⚡ ser vs estar — when to use which</h3>
    <div class="small" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;">
      <div><strong>ser</strong> (permanent / identity)<br>
        • <em>Es</em> fantástico. — It's fantastic.<br>
        • <em>Son</em> las tres. — It's three o'clock.<br>
        • <em>Soy</em> de Canadá. — I'm from Canada.</div>
      <div><strong>estar</strong> (state / location / feeling)<br>
        • <em>Está</em> aquí. — It's here.<br>
        • <em>Estoy</em> ocupado. — I'm busy.<br>
        • <em>Están</em> en el hotel. — They're at the hotel.</div>
    </div>
  </div>`;

  d.innerHTML = `
    <div class="toolbar" style="justify-content:space-between;margin-bottom:4px;">
      <h2 style="margin:0;">Conjugation Corner</h2>
      <button class="btn primary" id="vDrillAllBtn">Drill all verbs</button>
    </div>
    <div class="muted small">Full conjugation tables for the verbs in the course. Use the drill buttons to practice forms as flash cards.</div>
    ${callout}
    <div id="vDrillArea" style="margin-top:12px;">${drillArea()}</div>
    ${tables}`;

  // ── Events ─────────────────────────────────────────────────────────────────
  const startDrill = forms => {
    state.verbDrill={queue:shuffle(forms.map(([sp,en])=>({sp,en}))),idx:0,reveal:false,correct:0,total:0,typed:'',lastResult:''};
    renderVerbs();

  document.getElementById('vDrillAllBtn')?.addEventListener('click',()=>startDrill(VERBS.flatMap(([,f])=>f)));
  document.querySelectorAll('.vDrillOneBtn').forEach(b=>b.addEventListener('click',()=>startDrill(VERBS[+b.dataset.gi][1])));
  document.getElementById('vDrillAgainBtn')?.addEventListener('click',()=>{ state.verbDrill.idx=0; state.verbDrill.correct=0; state.verbDrill.total=0; state.verbDrill.reveal=false; state.verbDrill.typed=''; state.verbDrill.lastResult=''; state.verbDrill.queue=shuffle(state.verbDrill.queue); renderVerbs(); });

  const vInp = document.getElementById('vAns');
  if(vInp){ vInp.focus(); vInp.addEventListener('input',e=>state.verbDrill.typed=e.target.value); vInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('vCheckBtn')?.click();}}); }

    if(ok){ state.verbDrill.correct++; state.verbDrill.idx++; state.verbDrill.reveal=false; state.verbDrill.typed=''; state.verbDrill.lastResult=''; }
    else { state.verbDrill.reveal=true; state.verbDrill.lastResult=t?'Not quite — see the answer below.':'No answer entered.'; }
    renderVerbs();
  });
  document.getElementById('vRevealBtn')?.addEventListener('click',()=>{ state.verbDrill.total++; state.verbDrill.reveal=true; state.verbDrill.lastResult='Answer shown.'; renderVerbs(); });
  document.getElementById('vNextBtn')?.addEventListener('click',()=>{ state.verbDrill.idx++; state.verbDrill.reveal=false; state.verbDrill.typed=''; state.verbDrill.lastResult=''; renderVerbs(); });
}

// ── Phrases ───────────────────────────────────────────────────────────────────
function reviewPhrase(idx,ok) {
  const p=state.phraseProgress[idx], now=todayISO(), n={...p,attempts:(p.attempts||0)+1};
  if(ok){ n.correct=(n.correct||0)+1; n.level=Math.min(6,n.level+2); n.dueAt=addDays(now,INTERVALS[Math.min(6,n.level)]||3); }
  else  { n.level=Math.max(0,n.level-1); n.dueAt=todayISO(); }
  n.mastered=n.level>=6; state.phraseProgress[idx]=n; saveState();
}

function buildPhraseQueue() {
  const due=PHRASES.map((_,i)=>i).filter(i=>isDue(state.phraseProgress[i]));
  const src=due.length?due:PHRASES.map((_,i)=>i);
  state.phraseRev={queue:shuffle([...src]),idx:0,correct:0,total:0,reveal:false,typed:'',lastResult:'',started:true};
}

function renderPhrases() {
  const d=document.getElementById('phrasesSection');
  const pr=state.phraseRev, mastered=state.phraseProgress.filter(p=>p.mastered).length;
  const due=state.phraseProgress.filter(p=>isDue(p)&&!p.mastered).length;

  // ── Phrase review card ─────────────────────────────────────────────────────
  const reviewArea = () => {
    if(!pr.started||!pr.queue.length) return '';
    const i=pr.queue[pr.idx];
    if(i===undefined) return `<div class="card review-card" style="margin-bottom:16px;">
      <h2>Phrases session complete 🎉</h2>
      <div class="toolbar" style="justify-content:center;margin-bottom:12px;">
        <span class="pill green">Reviewed ${pr.total}</span><span class="pill blue">Correct ${pr.correct}</span>
      </div>
      <button class="btn primary" id="pRestartBtn">Go again</button></div>`;
    const dir=pr.idx%2===0?'es-en':'en-es';
    const prompt=dir==='es-en'?PHRASES[i][0]:PHRASES[i][1];
    const answer=dir==='es-en'?PHRASES[i][1]:PHRASES[i][0];
    const ph=dir==='es-en'?'Type the English translation…':'Type the Spanish translation…';
    return `<div class="card review-card" style="margin-bottom:16px;">
      <div class="toolbar" style="justify-content:center;margin-bottom:12px;">
        <span class="pill blue">${dir==='es-en'?'Spanish → English':'English → Spanish'}</span>
        <span class="pill yellow">Phrase ${pr.idx+1} of ${pr.queue.length}</span>
      </div>
      <div class="prompt" style="font-size:clamp(1.1rem,2.5vw,1.6rem);">${esc(prompt)}</div>
      <div class="review-input"><input id="pAns" placeholder="${ph}" value="${esc(pr.typed)}"/></div>
      <div class="choice-row">
        <button class="btn primary" id="pCheckBtn">Check</button>
        <button class="btn" id="pRevealBtn">Show answer</button>
        <button class="btn" id="pSkipBtn">Skip</button>
      </div>
      ${pr.reveal?`<div class="choice-row"><button class="btn primary" id="pNextBtn">Next phrase</button></div>`:''}
      ${pr.lastResult?`<div class="footer-note">${esc(pr.lastResult)}</div>`:''}
      ${pr.reveal?`<div class="answer-reveal"><div class="tiny muted">Answer</div><div style="font-size:1.05rem;font-weight:700;margin-top:4px;">${esc(answer)}</div></div>`:''}
    </div>`;
  };

  // ── Phrase list ────────────────────────────────────────────────────────────
  const list=PHRASES.map(([sp,en],i)=>{
    const p=state.phraseProgress[i], st=getStatus(p);
    return `<tr><td style="font-style:italic;">${esc(sp)}</td><td class="muted small">${esc(en)}</td><td><span class="status ${st}">${st}</span></td></tr>`;
  }).join('');

  d.innerHTML=`
    <div class="toolbar" style="justify-content:space-between;margin-bottom:4px;">
      <h2 style="margin:0;">Phrases</h2>
      <button class="btn primary" id="pStartBtn">${pr.started?'New session':'Start practice'}</button>
    </div>
    <div class="summary-grid" style="margin-bottom:16px;">
      <div class="summary-box"><div class="value">${PHRASES.length}</div><div class="muted small">Total phrases</div></div>
      <div class="summary-box"><div class="value">${due}</div><div class="muted small">Due now</div></div>
      <div class="summary-box"><div class="value">${mastered}</div><div class="muted small">Mastered</div></div>
    </div>
    ${reviewArea()}
    <div class="card">
      <h3>All phrases</h3>
      <table class="word-table"><thead><tr><th>Spanish</th><th>English</th><th>Status</th></tr></thead>
      <tbody>${list}</tbody></table>
    </div>`;

  document.getElementById('pStartBtn')?.addEventListener('click',()=>{ buildPhraseQueue(); renderPhrases(); });
  document.getElementById('pRestartBtn')?.addEventListener('click',()=>{ buildPhraseQueue(); renderPhrases(); });

  const nextPhrase=()=>{ pr.idx++; pr.reveal=false; pr.typed=''; pr.lastResult=''; renderPhrases(); };
  const pInp=document.getElementById('pAns');
  if(pInp){ pInp.focus(); pInp.addEventListener('input',e=>pr.typed=e.target.value); pInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('pCheckBtn')?.click();}}); }

  document.getElementById('pCheckBtn')?.addEventListener('click',()=>{
    const t=(document.getElementById('pAns')?.value||'').trim(); pr.typed=t; pr.total++;
    const i=pr.queue[pr.idx]; const dir=pr.idx%2===0?'es-en':'en-es';
    const answer=dir==='es-en'?PHRASES[i][1]:PHRASES[i][0];
    const ok=norm(t)===norm(answer);
    if(ok){ pr.correct++; reviewPhrase(i,true); nextPhrase(); }
    else { pr.reveal=true; pr.lastResult=t?'Not an exact match — see the answer and continue.':'No answer entered.'; renderPhrases(); }
  });
  document.getElementById('pRevealBtn')?.addEventListener('click',()=>{ const i=pr.queue[pr.idx]; pr.total++; reviewPhrase(i,false); pr.reveal=true; pr.lastResult='Answer shown.'; renderPhrases(); });
  document.getElementById('pSkipBtn')?.addEventListener('click',()=>{ const i=pr.queue[pr.idx]; pr.total++; reviewPhrase(i,false); nextPhrase(); });
  document.getElementById('pNextBtn')?.addEventListener('click',nextPhrase);
}


// ── Sentence Builder ──────────────────────────────────────────────────────────
const buildState = {
  activeSlot: 'q',   // 'q' | 'c' | 'i' | 'e'
  q: null, c: null, i: null, e: null,
  neg: false,
};

function renderBuild() {
  const d = document.getElementById('buildSection');
  const bs = buildState;
  const slots = ['q','c','i','e'];
  const slotMeta = {
    q:{label:'Question word',hint:'¿Dónde? ¿Qué?…',color:'#6d28d9',cat:'questions'},
    c:{label:'Carrier verb',hint:'puedo, quiere…',color:'#1d4ed8',cat:'carriers'},
    i:{label:'Infinitive',hint:'comer, ir…',color:'#166534',cat:'infinitives'},
    e:{label:'Extra (optional)',hint:'hoy, aquí…',color:'#92400e',cat:'extras',optional:true},
  };

  // ── Build the assembled sentence string ───────────────────────────────────
  const parts = [];
  if(bs.q) parts.push(bs.q.sp.replace(/[¿?]/g,'').trim());
  if(bs.neg && bs.c) parts.push('no ' + bs.c.sp);
  else if(bs.c) parts.push(bs.c.sp);
  if(bs.i) parts.push(bs.i.sp);
  if(bs.e) parts.push(bs.e.sp);
  const sentence = parts.length ? (bs.q ? '¿' : '') + parts.join(' ') + (bs.q ? '?' : '.') : '';
  const engParts = [];
  if(bs.q) engParts.push(bs.q.en.replace(/[¿?]/g,'').trim());
  if(bs.neg) engParts.push('not');
  if(bs.c) engParts.push(bs.c.en);
  if(bs.i) engParts.push(bs.i.en);
  if(bs.e) engParts.push(bs.e.en);
  const translation = engParts.join(' ');

  // ── Example sentences for inspiration ─────────────────────────────────────
  const examples = [
    {sp:'¿Dónde puedo comer aquí?',en:'Where can I eat here?'},
    {sp:'¿Qué quiere beber esta noche?',en:'What do you want to drink tonight?'},
    {sp:'¿A qué hora va a pagar?',en:'At what time are you going to pay?'},
    {sp:'¿Cuándo debo ir al restaurante?',en:'When should I go to the restaurant?'},
    {sp:'¿Cómo puedo encontrar el hotel?',en:'How can I find the hotel?'},
    {sp:'¿Dónde voy a quedarse mañana?',en:'Where am I going to stay tomorrow?'},
    {sp:'¿Qué quiero pedir hoy?',en:'What do I want to order today?'},
    {sp:'¿Cuánto debo gastar aquí?',en:'How much should I spend here?'},
    {sp:'No quiero pagar más tarde.',en:'I don\'t want to pay later.'},
    {sp:'No puede comer en el hotel.',en:'You can\'t eat at the hotel.'},
  ];

  // ── Render HTML ───────────────────────────────────────────────────────────
  const slotHTML = slots.map(k => {
    const m = slotMeta[k];
    const filled = !!bs[k];
    const isActive = bs.activeSlot === k;
    return `<div class="b-slot${filled?' filled':''}${isActive?' active':''}${m.optional?' optional':''}" data-slot="${k}">
      <div>
        <div class="b-slot-label" style="color:${m.color}">${m.label}${m.optional?' <span style=\'opacity:.5\'>(opt)</span>':''}</div>
        ${filled
          ? `<div class="b-slot-value">${esc(bs[k].sp)}<span style="font-size:.7rem;opacity:.55;margin-left:6px">${esc(bs[k].en)}</span></div>`
          : `<div class="b-slot-empty">${m.hint}</div>`}
      </div>
      ${filled?`<button class="btn-icon" data-clear="${k}" title="Clear" style="margin-left:auto;font-size:.85rem;flex-shrink:0">✕</button>`:''}
    </div>`;
  }).join('');

  const bankHTML = ['q','c','i','e'].map(k => {
    const m = slotMeta[k];
    const chips = STRUCT[m.cat].map(w => {
      const used = bs[k] && norm(bs[k].sp) === norm(w.sp);
      return `<button class="word-chip ${k}${used?' sel':''}" data-slot="${k}" data-sp="${esc(w.sp)}" data-en="${esc(w.en)}">${esc(w.sp)} <span style="font-size:.72rem;opacity:.6">${esc(w.en)}</span></button>`;
    }).join('');
    return `<div class="word-bank-section">
      <div class="word-bank-label" style="color:${m.color}">${m.label}${m.optional?' (optional)':''}</div>
      <div class="word-chips">${chips}</div>
    </div>`;
  }).join('');

  const examplesHTML = examples.map(ex=>`<div class="example-sentence"><strong>${esc(ex.sp)}</strong><br><span style="opacity:.7">${esc(ex.en)}</span></div>`).join('');

  d.innerHTML = `
    <div class="card" style="margin-bottom:14px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <h2 style="margin:0;">Sentence Builder 🏗️</h2>
        <span class="pill purple">Lesson 32 · Structure 1</span>
      </div>
      <div class="muted small" style="margin-bottom:16px;">Tap a slot to select it, then tap a word from the bank below to fill it. Build: <strong>Question + Carrier + Infinitive</strong> (+ optional extra).</div>

      <div class="builder-sentence" id="builderSentence">
        ${sentence
          ? `<span style="font-size:1.3rem;font-weight:900;color:var(--text)">${esc(sentence)}</span>
             <span style="font-size:.9rem;font-weight:700;color:var(--muted);flex-basis:100%;text-align:center">${esc(translation)}</span>`
          : `<span class="bs-placeholder">Your sentence will appear here…</span>`}
      </div>

      <div class="builder-slots">${slotHTML}</div>

      <div class="builder-controls">
        <button class="neg-toggle${bs.neg?' on':''}" id="negToggle">${bs.neg?'✗ Negative ON':'± Make negative'}</button>
        ${sentence?`<button class="speak-btn" id="bSpeakBtn" style="font-size:.85rem;padding:7px 16px;">🔊 Speak</button>`:''}
        <button class="btn" id="shuffleBtn">🎲 Shuffle</button>
        <button class="btn" id="clearAllBtn">🗑 Clear all</button>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <h3>Word bank</h3>
      ${bankHTML}
    </div>

    <div class="card">
      <h3>Example sentences for inspiration</h3>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">${examplesHTML}</div>
    </div>`;

  // ── Events ────────────────────────────────────────────────────────────────
  // Slot click → make active
  d.querySelectorAll('.b-slot').forEach(el => {
    el.addEventListener('click', e => {
      if(e.target.closest('[data-clear]')) return;
      bs.activeSlot = el.dataset.slot;
      renderBuild();
    });
  });
  // Clear individual slot
  d.querySelectorAll('[data-clear]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      bs[btn.dataset.clear] = null;
      renderBuild();
    });
  });
  // Word chip click → fill active slot or the chip's own slot
  d.querySelectorAll('.word-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const targetSlot = chip.dataset.slot;
      bs[targetSlot] = {sp: chip.dataset.sp, en: chip.dataset.en};
      // Auto-advance active slot
      const order = ['q','c','i','e'];
      const next = order[order.indexOf(targetSlot)+1];
      if(next) bs.activeSlot = next;
      renderBuild();
    });
  });
  // Negative toggle
  d.querySelector('#negToggle')?.addEventListener('click', () => { bs.neg = !bs.neg; renderBuild(); });
  // Speak
  d.querySelector('#bSpeakBtn')?.addEventListener('click', () => {
    if('speechSynthesis' in window && sentence) {
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(Object.assign(new SpeechSynthesisUtterance(sentence), {lang:'es-ES'}));
    }
  });
  // Shuffle
  d.querySelector('#shuffleBtn')?.addEventListener('click', () => {
    bs.q = STRUCT.questions[0|Math.random()*STRUCT.questions.length];
    bs.c = STRUCT.carriers[0|Math.random()*STRUCT.carriers.length];
    bs.i = STRUCT.infinitives[0|Math.random()*STRUCT.infinitives.length];
    bs.e = Math.random()>.5 ? STRUCT.extras[0|Math.random()*STRUCT.extras.length] : null;
    bs.neg = Math.random()>.75;
    renderBuild();
  });
  // Clear all
  d.querySelector('#clearAllBtn')?.addEventListener('click', () => {
    bs.q=bs.c=bs.i=bs.e=null; bs.neg=false; bs.activeSlot='q';
    renderBuild();
  });
}

function renderStats() {
  const words=allWords(), attempts=words.reduce((s,w)=>s+w.attempts,0), correct=words.reduce((s,w)=>s+w.correct,0);
  const mastered=words.filter(w=>getStatus(w)==='mastered').length;
  const lRows=state.lessons.map(l=>{ const ws=coreWords(l.id),tot=ws.length,m=ws.filter(w=>getStatus(w)==='mastered').length; return tot?{t:l.title,tot,m,pct:Math.round(m/tot*100)}:null; }).filter(Boolean);
  const pRows=allPacks().map(s=>{ const ws=packWords(s),tot=ws.length,m=ws.filter(w=>getStatus(w)==='mastered').length; return {t:`${s.label} (L${s.lessonId})`,tot,m,pct:Math.round(m/tot*100)}; });
  const statRow=(t,m,tot,pct)=>`<div class="stat-row">
    <div class="stat-name">${esc(t)}</div>
    <div class="stat-count">${m}/${tot}</div>
    <div class="stat-bar-wrap"><div class="stat-bar${m===tot?' full':''}" style="width:${pct}%"></div></div>
  </div>`;
  document.getElementById('statsSection').innerHTML=`
    <div class="summary-grid" style="margin-bottom:16px;">
      <div class="summary-box"><div class="value">${words.length}</div><div class="label">Total words</div></div>
      <div class="summary-box"><div class="value" style="color:var(--gd)">${mastered}</div><div class="label">Mastered ⭐</div></div>
      <div class="summary-box"><div class="value" style="color:var(--blue)">${words.filter(isDue).length}</div><div class="label">Due now</div></div>
      <div class="summary-box"><div class="value" style="color:var(--gold)">${attempts?Math.round(correct/attempts*100):0}%</div><div class="label">Accuracy</div></div>
    </div>
    <div class="grid cols-2">
      <div class="card"><h2>Lesson mastery</h2>${lRows.map(r=>statRow(r.t,r.m,r.tot,r.pct)).join('')}</div>
      <div class="card"><h2>Expansion packs</h2>${pRows.length?pRows.map(r=>statRow(r.t,r.m,r.tot,r.pct)).join(''):'<div class="empty">No packs selected yet.</div>'}</div>
    </div>`;
}

loadState(); saveState(); render();
</script>
</body>
</html>
