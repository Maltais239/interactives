  // ── Render HTML ───────────────────────────────────────────────────────────
  const slotHTML = slots.map(k => {
    const m = slotMeta[k];
    const filled = !!bs[k];
    const isActive = bs.activeSlot === k;
    return `<div class="b-slot${filled?' filled':''}${isActive?' active':''}${m.optional?' optional':''}" data-slot="${k}">
      <div>
        <div class="b-slot-label" style="color:${m.color}">${m.label}${m.optional?' <span style=\'opacity:.5\'>(opt)</span>':''}</div>
        ${filled
          ? `<div class="b-slot-value">${esc(bs[k].sp)}<span style="font-size:.7rem;opacity:.55;margin-left:6px">${esc(bs[k].en)}</span></div>`
          : `<div class="b-slot-empty">${m.hint}</div>`}
      </div>
      ${filled?`<button class="btn-icon" data-clear="${k}" title="Clear" style="margin-left:auto;font-size:.85rem;flex-shrink:0">✕</button>`:''}
    </div>`;
  }).join('');

  const bankHTML = ['q','c','i','e'].map(k => {
    const m = slotMeta[k];
    const chips = STRUCT[m.cat].map(w => {
      const used = bs[k] && norm(bs[k].sp) === norm(w.sp);
      return `<button class="word-chip ${k}${used?' sel':''}" data-slot="${k}" data-sp="${esc(w.sp)}" data-en="${esc(w.en)}">${esc(w.sp)} <span style="font-size:.72rem;opacity:.6">${esc(w.en)}</span></button>`;
    }).join('');
    return `<div class="word-bank-section">
      <div class="word-bank-label" style="color:${m.color}">${m.label}${m.optional?' (optional)':''}</div>
      <div class="word-chips">${chips}</div>
    </div>`;
  }).join('');

  const examplesHTML = examples.map(ex=>`<div class="example-sentence"><strong>${esc(ex.sp)}</strong><br><span style="opacity:.7">${esc(ex.en)}</span></div>`).join('');

  // ── Translation Challenge mode ─────────────────────────────────────────────
  const bsC = buildState;
  const chipCatColors = {q:'#6d28d9',c:'#1d4ed8',i:'#166534',e:'#92400e',neg:'#aa0000',n:'#475569',x:'#64748b'};
  const chipCatBg     = {q:'#f5f0ff',c:'#eff6ff',i:'#f0fdf4',e:'#fffbeb',neg:'#ffe8e8',n:'#f1f5f9',x:'#f8fafc'};
  const chipCatBorder = {q:'#c4b5fd',c:'#93c5fd',i:'#86efac',e:'#fcd34d',neg:'#ff4b4b',n:'#94a3b8',x:'#cbd5e1'};
  const renderChallengeChip = (t, attrs='', extraStyle='') =>
    `<button class="word-chip" ${attrs}
       style="border-color:${chipCatBorder[t.cat]};background:${chipCatBg[t.cat]};color:${chipCatColors[t.cat]};${extraStyle}">${esc(t.sp)}</button>`;

  const curCh = bsC.challengeActive ? CHALLENGES[bsC.challengeOrder[bsC.challengePos]] : null;
  const chDone = bsC.challengeActive && !curCh;
  const chTotal = bsC.challengeOrder.length || CHALLENGES.length;

  let challengeHTML = '';
  if(!bsC.challengeActive){
    const starred = state.challengeProgress.filter(p=>(p?.correct||0)>=3).length;
    const touched = state.challengeProgress.filter(p=>(p?.attempts||0)>0).length;
    // Per-topic and per-level stats
    const topicStats = {};
    Object.keys(TOPIC_META).forEach(k => topicStats[k] = {total:0, starred:0, attempted:0});
    CHALLENGES.forEach((c,i) => {
      const p = state.challengeProgress[i] || {correct:0, attempts:0};
      if(!topicStats[c.topic]) topicStats[c.topic] = {total:0, starred:0, attempted:0};
      topicStats[c.topic].total++;
      if((p.correct||0) >= 3) topicStats[c.topic].starred++;
      if((p.attempts||0) > 0) topicStats[c.topic].attempted++;
    });

    const selTopic = bsC._filterTopic || null;
    const selLvl   = bsC._filterLvl   || null;

    // Topic filter chips
    const topicChips = `
      <button class="topic-chip${!selTopic?' active':''}" data-topic="">
        <span>🌐</span><span>All topics</span>
        <span class="topic-chip-count">${CHALLENGES.length}</span>
      </button>
      ${Object.entries(TOPIC_META).map(([k,m]) => {
        const ts = topicStats[k] || {total:0, starred:0};
        if(ts.total === 0) return '';
        return `<button class="topic-chip${selTopic===k?' active':''}" data-topic="${k}" title="${esc(m.desc)}">
          <span>${m.icon}</span><span>${esc(m.label)}</span>
          <span class="topic-chip-count">${ts.starred}/${ts.total}</span>
        </button>`;
      }).join('')}`;

    // Difficulty filter
    const lvlChips = `
      <button class="lvl-chip${!selLvl?' active':''}" data-lvl="">All levels</button>
      <button class="lvl-chip${selLvl===1?' active':''}" data-lvl="1">★ Easy</button>
      <button class="lvl-chip${selLvl===2?' active':''}" data-lvl="2">★★ Medium</button>
      <button class="lvl-chip${selLvl===3?' active':''}" data-lvl="3">★★★ Hard</button>
    `;

    // Filtered prompt count for "Start" button
    const filteredCount = CHALLENGES.filter(c =>
      (!selTopic || c.topic === selTopic) && (!selLvl || c.lvl === selLvl)
    ).length;

    // Prompt list (filtered by current selection)
    const promptList = CHALLENGES
      .map((c,i) => ({c, i}))
      .filter(({c}) => (!selTopic || c.topic === selTopic) && (!selLvl || c.lvl === selLvl))
      .map(({c,i}) => {
        const p = state.challengeProgress[i] || {correct:0, attempts:0};
        const stars = Math.min(3, p.correct||0);
        const starHTML = '⭐'.repeat(stars) + '<span style="opacity:.3">' + '☆'.repeat(3-stars) + '</span>';
        const lvlHTML = '★'.repeat(c.lvl) + '<span style="opacity:.3">' + '★'.repeat(3-c.lvl) + '</span>';
        const meta = TOPIC_META[c.topic] || {icon:'•'};
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:8px;background:${stars>=3?'var(--gxs)':'transparent'};font-size:.85rem;gap:10px;">
          <span style="flex:1;${stars>=3?'color:var(--gd);font-weight:800;':''}">${meta.icon} ${esc(c.en)}</span>
          <span style="font-size:.7rem;color:var(--muted);letter-spacing:.5px;">${lvlHTML}</span>
          <span style="font-size:.75rem;letter-spacing:1px;white-space:nowrap;">${starHTML}</span>
        </div>`;
      }).join('');

    challengeHTML = `
    <div class="card" style="margin-bottom:14px;background:linear-gradient(135deg,#f3e8ff,#fce7f3);border-color:#c4b5fd;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px;">
        <div style="flex:1;min-width:200px;">
          <h3 style="margin:0 0 6px;">🎯 Translation Challenge</h3>
          <div class="muted small">Read the English prompt, tap chips to build the Italian sentence. Earn a ⭐ for each prompt you nail 3 times.</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:1.5rem;font-weight:900;color:#7030c8;line-height:1;">⭐ ${starred}/${CHALLENGES.length}</div>
          <div class="muted tiny" style="font-weight:700;">total mastered</div>
        </div>
      </div>

      <div style="margin-bottom:10px;">
        <div class="muted tiny" style="font-weight:900;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Topic</div>
        <div class="topic-chip-row">${topicChips}</div>
      </div>

      <div style="margin-bottom:14px;">
        <div class="muted tiny" style="font-weight:900;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Difficulty</div>
        <div class="topic-chip-row">${lvlChips}</div>
      </div>

      <div class="action-row" style="margin:4px 0;">
        <button class="btn primary" id="chStartBtn" ${filteredCount===0?'disabled style="opacity:.5"':''}>
          ${filteredCount > 0 ? `Start (${filteredCount} prompt${filteredCount===1?'':'s'}) →` : 'No prompts match'}
        </button>
        <button class="btn" id="chTogglePromptsBtn">${bsC._showPrompts?'▲ Hide prompts':'▼ Show prompts'}</button>
        ${starred>0 ? `<button class="btn" id="chResetStarsBtn" title="Reset challenge stars">↺ Reset stars</button>` : ''}
      </div>
      ${bsC._showPrompts ? `<div style="margin-top:10px;padding:10px;background:rgba(255,255,255,.55);border-radius:12px;max-height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;">${promptList || '<div class="muted small" style="text-align:center;padding:14px;">No prompts match the current filters.</div>'}</div>` : ''}
    </div>`;
  } else if(chDone){
    const pct = bsC.challengeTotal ? Math.round(bsC.challengeCorrect/bsC.challengeTotal*100) : 0;
    challengeHTML = `
    <div class="card session-complete anim-pop" style="margin-bottom:14px;">
      <span class="complete-icon">${pct>=80?'🏆':pct>=60?'🎉':'📚'}</span>
      <div class="complete-title">Challenge complete!</div>
      <div class="score-ring"><span class="ring-pct">${pct}%</span><span class="ring-label">correct</span></div>
      <div class="toolbar" style="justify-content:center;margin-bottom:16px;">
        <span class="pill green">✓ ${bsC.challengeCorrect} correct</span>
        <span class="pill red">✗ ${bsC.challengeTotal-bsC.challengeCorrect} missed</span>
      </div>
      <div class="action-row" style="justify-content:center;">
        <button class="btn primary" id="chAgainBtn">Play again 🚀</button>
        <button class="btn" id="chExitBtn">✕ Exit</button>
      </div>
    </div>`;
  } else {
    const progPct = Math.round((bsC.challengePos/chTotal)*100);
    const isCorrect = bsC.challengeResult === 'correct';
    const isWrong   = bsC.challengeResult === 'wrong';
    const isGraded  = isCorrect || isWrong;
    const allPlaced = bsC.challengeSelected.length === bsC.challengeTokens.length;

    const selectedHTML = bsC.challengeSelected.length
      ? bsC.challengeSelected.map((t,i)=>renderChallengeChip(t,`data-chsel="${i}"`)).join('')
      : `<span style="color:#b0b8c8;font-weight:700;font-style:italic;">Tap chips below to build your answer…</span>`;

    const bankHTML = bsC.challengeBank.map((t,i)=>{
      const placed = bsC.challengeSelected.some(s=>s===t);
      return renderChallengeChip(t, `data-chbank="${i}"`, placed?'opacity:.25;pointer-events:none;':'');
    }).join('');

    const feedbackHTML = isCorrect
      ? `<div class="feedback-bar correct-fb anim-pop" style="justify-content:center;">✓ Perfetto! 🎉</div>`
      : isWrong
        ? `<div class="feedback-bar wrong-fb anim-pop" style="justify-content:center;">✗ Not quite — see the correct answer below.</div>
           <div style="margin-top:10px;padding:12px;border-radius:12px;background:var(--gxs);border:2px solid var(--gs);">
             <div style="font-size:.72rem;font-weight:900;color:var(--gd);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Correct answer</div>
             <div style="display:flex;flex-wrap:wrap;gap:6px;">
               ${bsC.challengeTokens.map(t=>renderChallengeChip(t,'','pointer-events:none;')).join('')}
             </div>
           </div>`
        : '';

    const actionHTML = isGraded
      ? `<div class="action-row" style="margin-top:14px;">
           <button class="speak-btn" id="chListenBtn" style="padding:9px 18px;">🔊 Listen</button>
           <button class="btn primary" id="chNextBtn">${bsC.challengePos+1<chTotal?'Next →':'Finish'}</button>
         </div>`
      : `<div class="action-row" style="margin-top:14px;">
           <button class="btn primary" id="chCheckBtn" ${!allPlaced?'disabled style="opacity:.5;cursor:not-allowed"':''}>Check ✓</button>
           <button class="btn" id="chClearBtn">Clear</button>
           <button class="btn" id="chSkipBtn">Skip</button>
         </div>`;

    challengeHTML = `
    <div class="card anim-pop" style="margin-bottom:14px;">
      <div class="session-header" style="margin:-18px -18px 14px;border-radius:14px 14px 0 0;">
        <button class="btn-icon" id="chExitBtn" title="Exit challenge">✕</button>
        <div class="session-prog-wrap"><div class="session-bar" style="width:${progPct}%"></div></div>
        <div class="score-badge">⭐ ${bsC.challengeCorrect}</div>
      </div>
      <div class="ex-label" style="justify-content:center;">
        <span class="pill purple">🎯 Translation Challenge</span>
        <span class="pill yellow">${bsC.challengePos+1} / ${chTotal}</span>
      </div>
      <div style="text-align:center;font-size:clamp(1.2rem,3.5vw,1.8rem);font-weight:900;margin:10px 0 18px;padding:16px 18px;background:linear-gradient(135deg,#fff9e6,#ffe8e8);border:2px solid #ffc800;border-radius:14px;color:var(--text);">
        "${esc(curCh.en)}"
        <div style="font-size:.82rem;font-weight:800;letter-spacing:2px;margin-top:8px;">
          ${(()=>{ const p=state.challengeProgress[bsC.challengeOrder[bsC.challengePos]]||{correct:0}; const s=Math.min(3,p.correct||0); return '⭐'.repeat(s)+'<span style="opacity:.3">'+'☆'.repeat(3-s)+'</span>'; })()}
        </div>
      </div>
      <div class="muted tiny" style="margin-bottom:6px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;">Your Italian ${curCh.q?'(question)':''}</div>
      <div id="chAnswer" style="min-height:62px;border:2px ${isCorrect?'solid var(--green)':isWrong?'solid var(--red)':'dashed var(--border-b)'};border-radius:14px;padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;margin-bottom:16px;background:${isCorrect?'var(--gxs)':isWrong?'var(--reds)':'#fafcf9'};transition:all .2s;">
        ${selectedHTML}
      </div>
      <div class="muted tiny" style="margin-bottom:6px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;">Tap chips to add</div>
      <div class="word-chips" style="justify-content:center;${isGraded?'opacity:.5;pointer-events:none':''}">${bankHTML}</div>
      ${feedbackHTML}
      ${actionHTML}
    </div>`;
  }

  // ── Generate & Read mode ───────────────────────────────────────────────────
  const bs2 = buildState;
  if(!bs2.genSentence) bs2.genSentence = generateSentence();
  const gs = bs2.genSentence;
  const catColors = {q:'#6d28d9',c:'#1d4ed8',i:'#166534',e:'#92400e'};

  const genHTML = bs2.genActive ? `
    <div class="card anim-pop" style="margin-bottom:14px;">
      <div class="toolbar" style="justify-content:space-between;margin-bottom:14px;">
        <h3 style="margin:0;">📖 Read &amp; Listen</h3>
        <button class="btn" id="gExitBtn">✕ Exit</button>
      </div>

      ${bs2.genRevealed ? `
        <div style="font-size:clamp(1.4rem,4vw,2rem);font-weight:900;line-height:1.5;text-align:center;margin-bottom:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:6px;">
          ${gs.parts.map(p=>`<span style="color:${catColors[p.cat]};background:${catColors[p.cat]}18;border-radius:8px;padding:2px 8px;">${esc(p.sp)}</span>`).join('')}<span style="color:var(--text)">?</span>
        </div>
        <div style="text-align:center;color:var(--muted);font-weight:700;font-size:.95rem;margin-bottom:16px;">${esc(gs.en)}</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px;font-size:.78rem;font-weight:800;">
          ${gs.parts.map(p=>`<span style="background:${catColors[p.cat]}22;color:${catColors[p.cat]};border-radius:999px;padding:3px 10px;">${p.cat==='q'?'question':p.cat==='c'?'carrier':p.cat==='i'?'infinitive':'extra'}: <em>${esc(p.sp)}</em></span>`).join('')}
        </div>
      ` : `
        <div style="min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fde4,#e8f7ff);border:2px dashed #b8e6a0;border-radius:14px;margin-bottom:16px;padding:22px 16px;text-align:center;">
          <div style="font-size:2.2rem;margin-bottom:6px;">👂</div>
          <div style="font-weight:800;color:var(--gd);font-size:1.05rem;">Listen to the sentence…</div>
          <div class="muted small" style="margin-top:6px;">Try to understand it before revealing.</div>
        </div>
      `}

      <div class="action-row" style="justify-content:center;">
        <button class="speak-btn" id="gSpeakBtn">🔊 Listen again</button>
        ${bs2.genRevealed
          ? `<button class="btn primary" id="gNextBtn">Next sentence →</button>
             <button class="btn" id="gNegBtn">${gs.parts[1]?.sp.startsWith('no ')?'➕ Positive':'➖ Negative'}</button>`
          : `<button class="btn primary" id="gRevealBtn">👁 Show me</button>`}
      </div>
    </div>
  ` : `
    <div class="card" style="margin-bottom:14px;background:linear-gradient(135deg,#f0fde4,#e8f7ff);border-color:#b8e6a0;">
      <h3 style="margin:0 0 6px;">📖 Read &amp; Listen</h3>
      <div class="muted small" style="margin-bottom:12px;">Hear an Italian sentence first, try to understand it, <em>then</em> reveal the text. Trains listening comprehension.</div>
      <button class="btn primary" id="gStartBtn">Start listening →</button>
    </div>
  `;

  // When challenge is active, hide other cards to keep the learner focused.
  // (Sentence Builder UI removed — focused on Translation Challenge + Read & Listen now.)
  const otherCards = bsC.challengeActive ? '' : `${genHTML}`;

  d.innerHTML = `${challengeHTML}${otherCards}`;

  // ── Events ────────────────────────────────────────────────────────────────
  // Slot click → make active
  d.querySelectorAll('.b-slot').forEach(el => {
    el.addEventListener('click', e => {
      if(e.target.closest('[data-clear]')) return;
      bs.activeSlot = el.dataset.slot;
      renderBuild();
    });
  });
  // Clear individual slot
  d.querySelectorAll('[data-clear]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      bs[btn.dataset.clear] = null;
      renderBuild();
    });
  });
  // Word chip click → fill active slot + speak the word
  d.querySelectorAll('.word-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const targetSlot = chip.dataset.slot;
      const sp = chip.dataset.sp;
      bs[targetSlot] = {sp, en: chip.dataset.en};
      // Speak the Spanish word so learners hear pronunciation
      if('speechSynthesis' in window && sp){
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(Object.assign(new SpeechSynthesisUtterance(sp),{lang:'it-IT'}));
      }
      // Auto-advance active slot
      const order = ['q','c','i','e'];
      const next = order[order.indexOf(targetSlot)+1];
      if(next) bs.activeSlot = next;
      renderBuild();
    });
  });
  // Negative toggle
  d.querySelector('#negToggle')?.addEventListener('click', () => { bs.neg = !bs.neg; renderBuild(); });
  // Speak
  d.querySelector('#bSpeakBtn')?.addEventListener('click', () => {
    if('speechSynthesis' in window && sentence) {
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(Object.assign(new SpeechSynthesisUtterance(sentence), {lang:'it-IT'}));
    }
  });
  // Shuffle
  d.querySelector('#shuffleBtn')?.addEventListener('click', () => {
    // Pick a random curated TEMPLATE — guarantees a valid combination.
    // (Old behaviour picked each slot independently, which produced nonsense like "¿Quién? debo comenzar".)
    const [qSp, qEn, cSp, cEn, iSp, iEn] = TEMPLATES[0|Math.random()*TEMPLATES.length];
    bs.q = {sp:qSp, en:qEn};
    bs.c = {sp:cSp, en:cEn};
    bs.i = {sp:iSp, en:iEn};
    bs.e = Math.random()>.5 ? STRUCT.extras[0|Math.random()*STRUCT.extras.length] : null;
    bs.neg = Math.random()>.8;
    renderBuild();
  });
  // Clear all
  d.querySelector('#clearAllBtn')?.addEventListener('click', () => {
    bs.q=bs.c=bs.i=bs.e=null; bs.neg=false; bs.activeSlot='q';
    renderBuild();
  });

  // ── Translation Challenge events ──────────────────────────────────────────
  d.querySelector('#chStartBtn')?.addEventListener('click', () => {
    startChallengeSession({topic: bsC._filterTopic||null, lvl: bsC._filterLvl||null});
    renderBuild();
  });
  d.querySelector('#chExitBtn')?.addEventListener('click', () => { bsC.challengeActive = false; renderBuild(); });
  d.querySelector('#chAgainBtn')?.addEventListener('click', () => {
    // Re-run with the same filter that was used for this session
    startChallengeSession(bsC.challengeFilter || {topic:null, lvl:null});
    renderBuild();
  });

  // Topic filter chips
  d.querySelectorAll('[data-topic]').forEach(btn => {
    btn.addEventListener('click', () => {
      bsC._filterTopic = btn.dataset.topic || null;
      renderBuild();
    });
  });
  // Difficulty filter chips
  d.querySelectorAll('[data-lvl]').forEach(btn => {
    btn.addEventListener('click', () => {
      bsC._filterLvl = btn.dataset.lvl ? +btn.dataset.lvl : null;
      renderBuild();
    });
  });
  d.querySelector('#chTogglePromptsBtn')?.addEventListener('click', () => {
    bsC._showPrompts = !bsC._showPrompts;
    renderBuild();
  });
  d.querySelector('#chResetStarsBtn')?.addEventListener('click', () => {
    if(confirm('Reset all Challenge stars? Your vocab progress will not be affected.')){
      state.challengeProgress = initChallengeProgress();
      saveState();
      renderBuild();
    }
  });

  // Tap bank chip → move to selected
  d.querySelectorAll('[data-chbank]').forEach(btn => {
    btn.addEventListener('click', () => {
      if(bsC.challengeResult) return; // locked after grading
      const chip = bsC.challengeBank[+btn.dataset.chbank];
      if(!chip || bsC.challengeSelected.includes(chip)) return;
      bsC.challengeSelected.push(chip);
      // Speak the chip so the learner hears how it sounds
      if('speechSynthesis' in window && chip.sp){
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(Object.assign(new SpeechSynthesisUtterance(chip.sp),{lang:'it-IT'}));
      }
      renderBuild();
    });
  });

  // Tap a selected chip → remove it (put back in bank visually)
  d.querySelectorAll('[data-chsel]').forEach(btn => {
    btn.addEventListener('click', () => {
      if(bsC.challengeResult) return;
      bsC.challengeSelected.splice(+btn.dataset.chsel, 1);
      renderBuild();
    });
  });

  d.querySelector('#chClearBtn')?.addEventListener('click', () => {
    if(bsC.challengeResult) return;
    bsC.challengeSelected = [];
    renderBuild();
  });

  // Shared helper — speaks the current challenge's correct sentence.
  const speakChallenge = () => {
    if(!('speechSynthesis' in window) || !bsC.challengeTokens?.length) return;
    const text = bsC.challengeTokens.map(t=>t.sp).join(' ');
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'it-IT';
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  };

  d.querySelector('#chCheckBtn')?.addEventListener('click', () => {
    checkChallenge();
    renderBuild();
    // Speak the correct sentence on EVERY grade — reinforces right answers, models wrong ones.
    speakChallenge();
  });

  d.querySelector('#chListenBtn')?.addEventListener('click', speakChallenge);

  d.querySelector('#chSkipBtn')?.addEventListener('click', () => {
    bsC.challengeTotal++;
    nextChallenge();
    renderBuild();
  });

  d.querySelector('#chNextBtn')?.addEventListener('click', () => {
    nextChallenge();
    renderBuild();
  });

  // ── Generate & Read events ────────────────────────────────────────────────
  const bs3=buildState;
  const speakGen = () => {
    if('speechSynthesis' in window && bs3.genSentence){
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(Object.assign(new SpeechSynthesisUtterance(bs3.genSentence.sp),{lang:'it-IT'}));
    }
  };
  // Autoplay when a new sentence is shown but not yet revealed.
  // Uses a short delay so the UI paints first, and guards against double-fire on re-renders.
  if(bs3.genActive && !bs3.genRevealed && !bs3._autoplayedFor){
    bs3._autoplayedFor = bs3.genSentence; // mark so we don't replay on every render
    setTimeout(speakGen, 250);
  }

  d.querySelector('#gStartBtn')?.addEventListener('click',()=>{
    bs3.genActive=true;
    bs3.genSentence=generateSentence();
    bs3.genRevealed=false;
    bs3._autoplayedFor=null;
    renderBuild();
  });
  d.querySelector('#gExitBtn')?.addEventListener('click',()=>{ bs3.genActive=false; renderBuild(); });
  d.querySelector('#gNextBtn')?.addEventListener('click',()=>{
    bs3.genSentence=generateSentence();
    bs3.genRevealed=false;
    bs3._autoplayedFor=null;
    renderBuild();
  });
  d.querySelector('#gRevealBtn')?.addEventListener('click',()=>{
    bs3.genRevealed=true;
    renderBuild();
  });
  d.querySelector('#gNegBtn')?.addEventListener('click',()=>{
    if(!bs3.genSentence) return;
    const gs2 = bs3.genSentence;
    const isNeg = gs2.parts[1]?.sp.startsWith('no ');
    // Flip the carrier part in place
    const newParts = gs2.parts.map(p => {
      if(p.cat !== 'c') return p;
      return isNeg
        ? {...p, sp: p.sp.replace(/^no\s+/,'')}   // remove "no "
        : {...p, sp: 'no ' + p.sp};               // add "no "
    });
    const sp = '¿' + newParts.map(p=>p.sp).join(' ') + '?';
    const en = newParts.map(p=>p.en).join(' ') + '?';
    bs3.genSentence = {...gs2, parts:newParts, sp, en, speak:sp};
    renderBuild();
  });
  d.querySelector('#gSpeakBtn')?.addEventListener('click', speakGen);
}

function renderStats() {
  const words=allWords(), attempts=words.reduce((s,w)=>s+w.attempts,0), correct=words.reduce((s,w)=>s+w.correct,0);
  const mastered=words.filter(w=>getStatus(w)==='mastered').length;
  const lRows=state.lessons.map(l=>{ const ws=coreWords(l.id),tot=ws.length,m=ws.filter(w=>getStatus(w)==='mastered').length; const prefix=l.course==='CBE'?'☕ ':''; return tot?{t:prefix+l.title,tot,m,pct:Math.round(m/tot*100)}:null; }).filter(Boolean);
  const pRows=allPacks().map(s=>{ const ws=packWords(s),tot=ws.length,m=ws.filter(w=>getStatus(w)==='mastered').length; return {t:`${s.label} (L${s.lessonId})`,tot,m,pct:Math.round(m/tot*100)}; });
  const statRow=(t,m,tot,pct)=>`<div class="stat-row">
    <div class="stat-name">${esc(t)}</div>
    <div class="stat-count">${m}/${tot}</div>
    <div class="stat-bar-wrap"><div class="stat-bar${m===tot?' full':''}" style="width:${pct}%"></div></div>
  </div>`;
  document.getElementById('statsSection').innerHTML=`
    <div class="summary-grid" style="margin-bottom:16px;">
      <div class="summary-box"><div class="value">${words.length}</div><div class="label">Total words</div></div>
      <div class="summary-box"><div class="value" style="color:var(--gd)">${mastered}</div><div class="label">Mastered ⭐</div></div>
      <div class="summary-box"><div class="value" style="color:var(--blue)">${words.filter(isDue).length}</div><div class="label">Due now</div></div>
      <div class="summary-box"><div class="value" style="color:var(--gold)">${attempts?Math.round(correct/attempts*100):0}%</div><div class="label">Accuracy</div></div>
    </div>
    <div class="grid cols-2">
      <div class="card"><h2>Lesson mastery</h2>${lRows.map(r=>statRow(r.t,r.m,r.tot,r.pct)).join('')}</div>
      <div class="card"><h2>Expansion packs</h2>${pRows.length?pRows.map(r=>statRow(r.t,r.m,r.tot,r.pct)).join(''):'<div class="empty">No packs selected yet.</div>'}</div>
    </div>`;
}

loadState(); saveState(); render();
</script>
</body>
</html>
