<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Sense</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&amp;family=Nunito:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; }
    h1, h2, h3, .game-title { font-family: 'Fredoka', sans-serif; }

    @keyframes bounce-in {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px rgba(99, 102, 241, 0.5); }
      50% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.8); }
    }

    @keyframes confetti-fall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @keyframes star-burst {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(2) rotate(180deg); opacity: 0; }
    }

    .bounce-in { animation: bounce-in 0.5s ease-out; }
    .shake { animation: shake 0.5s ease-in-out; }
    .float { animation: float 2s ease-in-out infinite; }
    .spin-slow { animation: spin-slow 8s linear infinite; }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      animation: confetti-fall 3s linear forwards;
    }

    .star-burst {
      position: absolute;
      font-size: 2rem;
      animation: star-burst 0.8s ease-out forwards;
    }

    .category-btn {
      transition: all 0.3s ease;
    }

    .category-btn:hover {
      transform: translateY(-3px);
    }

    .answer-btn {
      transition: all 0.2s ease;
    }

    .answer-btn:hover:not(:disabled) {
      transform: scale(1.02);
    }

    .correct-answer {
      background: linear-gradient(135deg, #10b981, #059669) !important;
      color: white !important;
    }

    .wrong-answer {
      background: linear-gradient(135deg, #ef4444, #dc2626) !important;
      color: white !important;
    }

    .mini-game-target {
      cursor: pointer;
      transition: transform 0.1s;
    }

    .mini-game-target:hover {
      transform: scale(1.1);
    }

    .progress-bar {
      transition: width 0.5s ease;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
 </head>
 <body class="h-full overflow-auto">
  <div id="app" class="min-h-full bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 p-4"><!-- Welcome Screen -->
   <div id="welcome-screen" class="max-w-2xl mx-auto">
    <div class="bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 text-center bounce-in">
     <div class="text-6xl mb-4">
      🎮
     </div>
     <h1 id="main-title" class="game-title text-4xl font-bold text-indigo-600 mb-2">Number Sense</h1>
     <p id="welcome-text" class="text-gray-600 mb-6">Welcome to the review game!</p>
     <div class="mb-6"><label class="block text-left text-gray-700 font-semibold mb-2">Your name:</label> <input type="text" id="player-name-input" placeholder="Enter your name..." class="w-full px-4 py-3 border-2 border-indigo-200 rounded-xl focus:border-indigo-500 focus:outline-none text-lg">
     </div><button id="start-btn" onclick="startGame()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-bold py-4 px-8 rounded-xl text-xl hover:from-indigo-600 hover:to-purple-600 transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"> Start! 🚀 </button>
     <div id="leaderboard" class="mt-8 hidden">
      <h3 class="text-lg font-bold text-gray-700 mb-3">🏆 Leaderboard</h3>
      <div id="leaderboard-list" class="space-y-2"></div>
     </div>
    </div>
   </div><!-- Main Game Screen -->
   <div id="game-screen" class="hidden max-w-4xl mx-auto"><!-- Header -->
    <div class="bg-white/95 backdrop-blur rounded-2xl shadow-xl p-4 mb-4">
     <div class="flex justify-between items-center flex-wrap gap-2">
      <div class="flex items-center gap-3"><span class="text-2xl">👋</span> <span id="greeting" class="text-xl font-bold text-indigo-600">Hi!</span>
      </div>
      <div class="flex items-center gap-4">
       <div class="bg-yellow-100 px-4 py-2 rounded-full"><span class="text-yellow-600 font-bold">⭐ Session: <span id="session-points">0</span></span>
       </div>
       <div class="bg-purple-100 px-4 py-2 rounded-full"><span class="text-purple-600 font-bold">💫 Total: <span id="cumulative-points">0</span></span>
       </div>
       <div class="bg-indigo-100 px-4 py-2 rounded-full"><span class="text-indigo-600 font-bold">❓ Question: <span id="question-num">0</span></span>
       </div>
      </div>
     </div>
     <div class="mt-3 bg-gray-200 rounded-full h-3 overflow-hidden hidden">
      <div id="progress-bar" class="progress-bar bg-gradient-to-r from-indigo-500 to-purple-500 h-full" style="width: 0%"></div>
     </div>
    </div><!-- Category Selection -->
    <div id="category-screen" class="bg-white/95 backdrop-blur rounded-2xl shadow-xl p-6">
     <h2 class="game-title text-2xl font-bold text-center text-gray-800 mb-6">Choose a category! 📚</h2>
     <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="category-grid"><!-- Categories will be inserted here -->
     </div>
    </div><!-- Question Screen -->
    <div id="question-screen" class="hidden bg-white/95 backdrop-blur rounded-2xl shadow-xl p-6">
     <div class="flex justify-between items-center mb-4"><button onclick="returnToCategories()" class="bg-red-100 hover:bg-red-200 text-red-700 font-semibold py-2 px-4 rounded-lg transition-all text-sm">✕ Quit</button>
      <div class="text-center flex-1"><span id="category-badge" class="inline-block bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-semibold"></span>
      </div>
      <div class="w-16"></div>
     </div>
     <h2 id="question-text" class="game-title text-xl md:text-2xl font-bold text-center text-gray-800 mb-6 min-h-[80px] flex items-center justify-center"></h2><button id="hint-btn" onclick="showHint()" class="mb-4 bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-semibold py-2 px-4 rounded-lg transition-all text-sm"> 💡 Need a hint? </button>
     <div id="hint-box" class="hidden mb-4 bg-blue-50 border-2 border-blue-200 p-4 rounded-lg text-blue-700">
      <p id="hint-text" class="text-sm"></p>
     </div>
     <div id="answers-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3"><!-- Answers will be inserted here -->
     </div>
     <div id="feedback" class="hidden mt-4 text-center">
      <p id="feedback-text" class="text-xl font-bold"></p><button id="next-btn" onclick="nextQuestion()" class="mt-4 bg-indigo-500 text-white font-bold py-3 px-8 rounded-xl hover:bg-indigo-600 transition-all"> Continue ➡️ </button>
     </div>
    </div><!-- Mini Game Screen -->
    <div id="mini-game-screen" class="hidden bg-white/95 backdrop-blur rounded-2xl shadow-xl p-6">
     <h2 class="game-title text-2xl font-bold text-center text-gray-800 mb-2">🎯 Bonus Game!</h2>
     <p id="mini-game-instruction" class="text-center text-gray-600 mb-4"></p>
     <div id="mini-game-area" class="min-h-[300px] relative bg-gradient-to-br from-indigo-50 to-purple-50 rounded-xl flex items-center justify-center"><!-- Mini game content here -->
     </div>
     <div id="mini-game-result" class="hidden mt-4 text-center">
      <p id="mini-game-score" class="text-xl font-bold text-indigo-600"></p><button onclick="continueMiniGame()" class="mt-3 bg-indigo-500 text-white font-bold py-3 px-8 rounded-xl hover:bg-indigo-600 transition-all"> Continue ➡️ </button>
     </div>
    </div>
   </div><!-- Game Over Screen -->
   <div id="gameover-screen" class="hidden max-w-2xl mx-auto">
    <div class="bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 text-center bounce-in">
     <div class="text-6xl mb-4">
      🎉
     </div>
     <h1 class="game-title text-3xl font-bold text-indigo-600 mb-2">Game Over!</h1>
     <p id="final-score" class="text-2xl text-gray-700 mb-4"></p>
     <p id="final-message" class="text-lg text-gray-600 mb-6"></p>
     <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="bg-green-100 p-4 rounded-xl">
       <div class="text-3xl mb-1">
        ✅
       </div>
       <div class="text-green-700 font-bold" id="correct-count">
        0
       </div>
       <div class="text-green-600 text-sm">
        Correct Answers
       </div>
      </div>
      <div class="bg-red-100 p-4 rounded-xl">
       <div class="text-3xl mb-1">
        ❌
       </div>
       <div class="text-red-700 font-bold" id="wrong-count">
        0
       </div>
       <div class="text-red-600 text-sm">
        Mistakes
       </div>
      </div>
     </div>
     <div class="bg-gray-100 p-4 rounded-xl mb-6">
      <div class="text-gray-700 text-sm mb-2">
       📊 Session Statistics
      </div>
      <div class="flex justify-between text-gray-600"><span>Ratio: <strong id="accuracy-ratio">0%</strong></span> <span>Accuracy: <strong id="accuracy">0%</strong></span>
      </div>
     </div><button onclick="playAgain()" class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-bold py-4 px-8 rounded-xl text-xl hover:from-indigo-600 hover:to-purple-600 transition-all transform hover:scale-105"> Play Again! 🔄 </button>
    </div>
   </div>
  </div>
  <script>
    // Configuration
    const defaultConfig = {
      game_title: "Number Sense",
      welcome_message: "Welcome to the review game!"
    };

    // Game State
    let playerName = "";
    let cumulativePoints = 0; // Total points across all sessions
    let currentSessionPoints = 0; // Points in current game session
    let questionNum = 0;
    let correctAnswers = 0;
    let wrongAnswers = 0;
    let currentCategory = null;
    let allPlayerData = [];
    let currentPlayerRecord = null;
    let currentQuestionData = null;
    let hintShown = false;

    // Categories with questions
    const categories = [
      { id: "integers", name: "Integer Addition", emoji: "➕", color: "from-blue-400 to-blue-600" },
      { id: "comparing", name: "Comparing & Ordering", emoji: "↔️", color: "from-green-400 to-green-600" },
      { id: "situations", name: "Integer Word Problems", emoji: "🌡️", color: "from-cyan-400 to-cyan-600" },
      { id: "factortree", name: "Factor Trees", emoji: "🌳", color: "from-emerald-400 to-emerald-600" },
      { id: "exponents", name: "Exponents", emoji: "²", color: "from-purple-400 to-purple-600" },
      { id: "probability", name: "Probability", emoji: "🎲", color: "from-pink-400 to-pink-600" },
      { id: "simplify", name: "Simplifying Fractions", emoji: "✂️", color: "from-orange-400 to-orange-600" },
      { id: "sharing", name: "Equal Sharing", emoji: "🍕", color: "from-red-400 to-red-600" },
      { id: "convert", name: "Fractions-Decimals-%", emoji: "🔄", color: "from-teal-400 to-teal-600" },
      { id: "percentdiv", name: "% by Long Division", emoji: "➗", color: "from-amber-400 to-amber-600" },
      { id: "ratios", name: "Equivalent Ratios", emoji: "⚖️", color: "from-indigo-400 to-indigo-600" },
      { id: "addsubfrac", name: "Add/Sub Fractions", emoji: "🧮", color: "from-rose-400 to-rose-600" },
      { id: "multfrac", name: "Multiply Fractions", emoji: "✖️", color: "from-violet-400 to-violet-600" },
      { id: "addsubdec", name: "Add/Sub Decimals", emoji: "🔢", color: "from-lime-400 to-lime-600" },
      { id: "multdec", name: "Multiply Decimals by Whole Nums", emoji: "✖️", color: "from-sky-400 to-sky-600" },
      { id: "divdec", name: "Divide Decimals by Whole Nums", emoji: "➗", color: "from-fuchsia-400 to-fuchsia-600" },
      { id: "repdec", name: "Representing Decimals", emoji: "📊", color: "from-cyan-400 to-cyan-600" },
      { id: "longdiv", name: "Long Division", emoji: "🔢", color: "from-slate-400 to-slate-600" },
      { id: "multmulti", name: "Multi-digit Multiplication", emoji: "✖️", color: "from-orange-400 to-orange-600" },
      { id: "percentof", name: "Find % of a Number", emoji: "%", color: "from-teal-400 to-teal-600" },
      { id: "compdec", name: "Compare/Order/Round Decimals", emoji: "🔢", color: "from-indigo-400 to-indigo-600" },
      { id: "bedmas", name: "Order of Operations", emoji: "🧮", color: "from-blue-500 to-cyan-500" },
      { id: "algebra", name: "Algebraic Equations", emoji: "x", color: "from-purple-500 to-pink-500" },
      { id: "coordinates", name: "Cartesian Plane", emoji: "📍", color: "from-green-500 to-teal-500" },
      { id: "transformations", name: "Transformations", emoji: "🔄", color: "from-orange-500 to-red-500" },
      { id: "area", name: "Area: Triangles & Parallelograms", emoji: "📐", color: "from-indigo-500 to-blue-500" },
      { id: "volume", name: "Volume of Prisms", emoji: "🧊", color: "from-cyan-500 to-blue-500" },
      { id: "unitrate", name: "Unit Rates", emoji: "🏷️", color: "from-rose-500 to-orange-500" },
      { id: "frequency", name: "Relative Frequency", emoji: "📊", color: "from-violet-500 to-purple-500" }
    ];

    // Question generators for each category
    function generateQuestion(categoryId) {
      switch(categoryId) {
        case "integers": return generateIntegerAddition();
        case "comparing": return generateComparing();
        case "situations": return generateSituations();
        case "factortree": return generateFactorTree();
        case "exponents": return generateExponents();
        case "probability": return generateProbability();
        case "simplify": return generateSimplify();
        case "sharing": return generateSharing();
        case "convert": return generateConvert();
        case "percentdiv": return generatePercentDiv();
        case "ratios": return generateRatios();
        case "addsubfrac": return generateAddSubFrac();
        case "multfrac": return generateMultFrac();
        case "addsubdec": return generateAddSubDec();
        case "multdec": return generateMultDec();
        case "divdec": return generateDivDec();
        case "repdec": return generateRepDec();
        case "longdiv": return generateLongDiv();
        case "multmulti": return generateMultMulti();
        case "percentof": return generatePercentOf();
        case "compdec": return generateCompareOrderRoundDec();
        case "bedmas": return generateBedmas();
        case "algebra": return generateAlgebra();
        case "coordinates": return generateCoordinates();
        case "transformations": return generateTransformations();
        case "area": return generateArea();
        case "volume": return generateVolume();
        case "unitrate": return generateUnitRate();
        case "frequency": return generateFrequency();
      }
    }

    function getHint(categoryId, questionText) {
      const hints = {
        "integers": {
          strategy: "💡 Use a number line! Start at the first number, then move right to add (or left to subtract).",
          example: "Similar example: (-3) + 7 = ?\nOn a line: start at -3, then move up 7 → you land on 4"
        },
        "comparing": {
          strategy: "💡 Compare digit by digit, starting from the far left. If one number is larger, use >. If they are equal, use =.",
          example: "Similar example: 2.8 vs 2.08\nCompare: 2 = 2 ✓, then 8 > 0 ✓, so 2.8 > 2.08"
        },
        "situations": {
          strategy: "💡 Read the problem twice. What numbers do you have? Is it increasing or decreasing? Draw a quick diagram or number line.",
          example: "Similar example: A diver is at -20m. They swim up 30m. What is their depth?\nSwim up = add → (-20) + 30 = 10m"
        },
        "factortree": {
          strategy: "💡 Divide the number by the smallest prime numbers (2, 3, 5, 7...) until you can't anymore. Count how many times each prime appears (that's the exponent).",
          example: "Similar example: 18\n18 ÷ 2 = 9 → 9 ÷ 3 = 3 → 3 ÷ 3 = 1\nResult: 2 × 3²"
        },
        "exponents": {
          strategy: "💡 The exponent tells you how many times to multiply the base by itself.",
          example: "Similar example: 5² = ?\nThis means: 5 × 5 = 25"
        },
        "probability": {
          strategy: "💡 Probability = (what you want) ÷ (total possibilities). Count carefully!",
          example: "Similar example: 2 red candies, 6 blue. Probability of drawing blue?\nAnswer: 6 ÷ (2+6) = 6/8 = 3/4"
        },
        "simplify": {
          strategy: "💡 Find the greatest number that divides BOTH the top and bottom. Divide them both by that number.",
          example: "Similar example: Simplify 8/12\n8 and 12 are divisible by 4 → 8÷4=2, 12÷4=3 → Answer: 2/3"
        },
        "sharing": {
          strategy: "💡 If you share items among people, the number of items goes on top, the number of people on the bottom.",
          example: "Similar example: 5 pies shared among 8 people\nEach gets: 5/8 of a pie"
        },
        "convert": {
          strategy: "💡 Fraction → Decimal: divide top by bottom. Decimal → %: multiply by 100. % → Decimal: divide by 100.",
          example: "Similar example: 3/4 = ?\n3 ÷ 4 = 0.75 = 75%"
        },
        "percentdiv": {
          strategy: "💡 Divide the numerator by the denominator using long division. Then multiply by 100.",
          example: "Similar example: 5/8 = ?\n5 ÷ 8 = 0.625 → 0.625 × 100 = 62.5%"
        },
        "ratios": {
          strategy: "💡 If you multiply (or divide) BOTH numbers in a ratio by the same number, you get an equivalent ratio.",
          example: "Similar example: Find a ratio equivalent to 3:5\n3×2 : 5×2 = 6:10 ✓ or 3×3 : 5×3 = 9:15 ✓"
        },
        "addsubfrac": {
          strategy: "💡 Denominators MUST be the same! If they aren't, find a common denominator first.",
          example: "Similar example: 2/3 + 1/6 = ?\nMake them the same: 4/6 + 1/6 = 5/6"
        },
        "multfrac": {
          strategy: "💡 Multiply the top by the top, and the bottom by the bottom.",
          example: "Similar example: 3/4 × 8 = ?\n(3×8)/(4×1) = 24/4 = 6"
        },
        "addsubdec": {
          strategy: "💡 Line up the decimal points vertically! Then add or subtract like normal.",
          example: "Similar example: 3.2 + 1.7 = ?\n  3.2\n+ 1.7\n-----\n  4.9"
        },
        "multdec": {
          strategy: "💡 Multiply as if the decimals weren't there. Then place the decimal based on the total number of decimal places.",
          example: "Similar example: 3.5 × 2 = ?\n35 × 2 = 70, then 1 decimal place → 7.0"
        },
        "divdec": {
          strategy: "💡 Use long division. Move the decimal point straight up from the dividend into your answer.",
          example: "Similar example: 8.4 ÷ 3 = ?\n3 goes into 8.4 how many times? 2.8 times"
        },
        "repdec": {
          strategy: "💡 Break it down into parts. Read each digit with its place value (tenths, hundredths, thousandths).",
          example: "Similar example: 0.527 = ?\n= 0.5 + 0.02 + 0.007 = five hundred twenty-seven thousandths"
        },
        "longdiv": {
          strategy: "💡 Steps: Divide, Multiply, Subtract, Bring down. Repeat until finished!",
          example: "Similar example: 56 ÷ 4 = ?\nDivide 5÷4=1 remainder 1 → Bring down 6 → 16÷4=4 → Answer: 14"
        },
        "multmulti": {
          strategy: "💡 Multiply by the ones first, then by the tens. Add the results together.",
          example: "Similar example: 15 × 12 = ?\n15×2=30 + 15×10=150 → 30+150=180"
        },
        "percentof": {
          strategy: "💡 'Of' means multiply. Convert the % to a decimal first.",
          example: "Similar example: 25% of 80 = ?\n25% = 0.25 → 0.25 × 80 = 20"
        },
        "compdec": {
          strategy: "💡 Compare: check digit by digit. Round: if the next digit is 5 or more, round up!",
          example: "Similar example: Round 2.56 to the nearest tenth?\nThe hundredths digit is 6 (≥5), so round up → 2.6"
        },
        "bedmas": {
          strategy: "💡 Remember the order: Parentheses, Exponents, Divide/Multiply (left to right), Add/Subtract (left to right).",
          example: "Example: 2³ + 4 × 2\n= 8 + 8\n= 16"
        },
        "algebra": {
          strategy: "💡 The goal is to isolate the variable (x). Do the opposite operation to both sides of the equation.",
          example: "Example: 2x + 3 = 11\nSubtract 3: 2x = 8\nDivide by 2: x = 4"
        },
        "coordinates": {
          strategy: "💡 The x-axis is horizontal (left/right) and the y-axis is vertical (up/down). (x, y).",
          example: "Example: (3, 5) means 3 units right, 5 units up."
        },
        "transformations": {
          strategy: "💡 Translation = slide. Reflection = flip. Rotation = turn. Pay attention to coordinates (x,y)!",
          example: "Example: (2,3) translated 1 unit right (+1 to x) → (3,3)"
        },
        "area": {
          strategy: "💡 Parallelogram = base × height. Triangle = (base × height) ÷ 2.",
          example: "Example: Triangle with base 4, height 5\n(4 × 5) ÷ 2 = 20 ÷ 2 = 10"
        },
        "volume": {
          strategy: "💡 Volume of a rectangular prism = length × width × height (or base area × height).",
          example: "Example: Prism 2×3×4 = 24 cubic units"
        },
        "unitrate": {
          strategy: "💡 Divide the total amount by the quantity to find how much ONE item costs or represents.",
          example: "Example: $10 for 5 pens\n10 ÷ 5 = $2 per pen"
        },
        "frequency": {
          strategy: "💡 Relative frequency = (number of successes) ÷ (total number of trials).",
          example: "Example: 15 heads out of 50 flips = 15/50 (or 30%)"
        }
      };
      const hint = hints[categoryId] || { strategy: "💡 You can do it! Think carefully!", example: "" };
      return hint;
    }

    function showHint() {
      if(!currentQuestionData) return;

      hintShown = true;
      const hintBox = document.getElementById('hint-box');
      const hintText = document.getElementById('hint-text');
      const hintBtn = document.getElementById('hint-btn');

      const hint = getHint(currentCategory.id, currentQuestionData.question);
      hintText.innerHTML = `<strong>${hint.strategy}</strong><br><br><em style="font-style: italic; color: #1e40af;">${hint.example}</em>`;
      hintBox.classList.remove('hidden');
      hintBtn.disabled = true;

    function generateIntegerAddition() {
      const a = Math.floor(Math.random() * 41) - 20;
      const b = Math.floor(Math.random() * 41) - 20;
      const correct = a + b;

      const wrongs = new Set();
      let safety = 0;
      while (wrongs.size < 3 && safety < 50) {
        const offset = Math.floor(Math.random() * 11) - 5; // -5..5
        if (offset !== 0) {
          wrongs.add(correct + offset);
        }
        safety++;
      }

      return {
        question: `Calculate: (${a}) + (${b}) = ?`,
        correct: correct.toString(),
        wrong: Array.from(wrongs).map(w => w.toString())
      };
    }

    // FIXED: ensure 4 distinct random numbers (avoid "-3 < -3 < ...")
    // and make sure the 3 wrong-order options are distinct from each other
    // and from the correct order.
    function generateComparing() {
      const uniqueNums = [];
      let safety = 0;
      while (uniqueNums.length < 4 && safety < 100) {
        const candidate = Math.floor(Math.random() * 41) - 20;
        if (!uniqueNums.includes(candidate)) {
          uniqueNums.push(candidate);
        }
        safety++;
      }
      const sorted = [...uniqueNums].sort((a, b) => a - b);
      const type = Math.random() < 0.5 ? "ascending" : "descending";
      const sep = type === "ascending" ? " < " : " > ";
      const correct = type === "ascending"
        ? sorted.join(sep)
        : [...sorted].reverse().join(sep);

      const wrongs = new Set();
      let attempts = 0;
      while (wrongs.size < 3 && attempts < 50) {
        const candidate = [...uniqueNums].sort(() => Math.random() - 0.5).join(sep);
        if (candidate !== correct) {
          wrongs.add(candidate);
        }
        attempts++;
      }

      return {
        question: `Place in ${type} order: ${uniqueNums.join(", ")}`,
        correct: correct,
        wrong: Array.from(wrongs).slice(0, 3)
      };
    }

      const situations = [

        { text: "A submarine is at -120m. It ascends 45m. What is its depth?", answer: -75, unit: "m" },
        { text: "You have $15 and owe $23. What is your balance?", answer: -8, unit: "$" },
        { text: "The elevator is at level -3. It goes up 7 floors. What level is it on?", answer: 4, unit: "" },
        { text: "The temperature was 12°C. It dropped by 18°C. What is the temperature?", answer: -6, unit: "°C" },
        { text: "A diver is at -30m. They descend another 15m. What is their depth?", answer: -45, unit: "m" },
        { text: "You have -$50 in your account. You receive $75. What is your balance?", answer: 25, unit: "$" },
        { text: "The thermometer shows -8°C in the morning. By noon, it is 15°C warmer. What is the temperature?", answer: 7, unit: "°C" }
      ];
      const s = situations[Math.floor(Math.random() * situations.length)];
      // Formatting unit properly (e.g. $15 instead of 15$)
      const formatCurrency = (val, unit) => unit === "$" ? `${unit}${val}` : `${val}${unit}`;
      const correct = formatCurrency(s.answer, s.unit);

      // Build wrong answers and dedupe against the correct one.
      const wrongValues = [s.answer + 5, s.answer - 5, -s.answer, s.answer + 10, s.answer - 10];
      const wrongs = [];
      for (const v of wrongValues) {
        const formatted = formatCurrency(v, s.unit);
        if (formatted !== correct && !wrongs.includes(formatted)) {
          wrongs.push(formatted);
        }
        if (wrongs.length === 3) break;
      }

      return {
        question: s.text,
        correct: correct,
        wrong: wrongs
      };
    }

    // FIXED: previously had `const bases =;` and `const exps =;` (syntax error
    // that broke the entire <script> block). Also expanded the wrong-answer
    // pool so we always get at least 3 distinct distractors.
    function generateExponents() {
      const bases = [2, 3, 4, 5, 6, 7, 8, 9, 10];
      const exps = [2, 3];
      const base = bases[Math.floor(Math.random() * bases.length)];
      const exp = exps[Math.floor(Math.random() * exps.length)];
      const correct = Math.pow(base, exp);

      const superscripts = { 2: "²", 3: "³", 4: "⁴" };

      // Plenty of plausible distractors so we always have 3 unique wrongs.
      const wrongCandidates = new Set();
      wrongCandidates.add(base * exp);          // multiplied instead of powered
      wrongCandidates.add(base + exp);          // added instead of powered
      wrongCandidates.add(Math.pow(base, exp - 1));
      wrongCandidates.add(Math.pow(base, exp + 1));
      wrongCandidates.add(base + base);
      wrongCandidates.add(exp * exp);
      wrongCandidates.add(correct + 1);
      wrongCandidates.add(correct - 1);

      wrongCandidates.delete(correct);

      const wrongAnswers = Array.from(wrongCandidates)
        .filter(n => n > 0)
        .slice(0, 3)
        .map(w => w.toString());

      return {
        question: `Calculate: ${base}${superscripts[exp]} = ?`,
        correct: correct.toString(),
        wrong: wrongAnswers
      };
    }

    function generateCompareOrderRoundDec() {
      const types = ["compare", "order", "round"];
      const type = types[Math.floor(Math.random() * types.length)];

      if(type === "compare") {
        const comparisons = [
          { q: "3.5 ___ 3.05", correct: ">", wrong: ["<", "="] },

        const c = comparisons[Math.floor(Math.random() * comparisons.length)];

        };
      } else if(type === "order") {

          { nums: [4.5, 4.05, 4.55, 4.15], order: "4.05 < 4.15 < 4.5 < 4.55" },
          { nums: [2.3, 2.03, 2.33, 2.13], order: "2.03 < 2.13 < 2.3 < 2.33" },
          { nums: [5.6, 5.06, 5.16, 5.61], order: "5.06 < 5.16 < 5.6 < 5.61" },
          { nums: [0.8, 0.08, 0.88, 0.18], order: "0.08 < 0.18 < 0.8 < 0.88" },
          { nums: [7.2, 7.02, 7.22, 7.12], order: "7.02 < 7.12 < 7.2 < 7.22" },
          { nums: [9.5, 9.05, 9.55, 9.15], order: "9.05 < 9.15 < 9.5 < 9.55" }
        ];

        const p = orderProblems[Math.floor(Math.random() * orderProblems.length)];
        // Display order in the question (random shuffle of the same numbers).
        const display = [...p.nums].sort(() => Math.random() - 0.5);

        // Build 3 unique wrong orderings. Start with the descending order
        // (a classic distractor) and then add random permutations.
        const reversed = [...p.nums].sort((a, b) => b - a).join(" < ");
        const wrongs = new Set();
        if (reversed !== p.order) wrongs.add(reversed);

        let attempts = 0;
        while (wrongs.size < 3 && attempts < 50) {
          const candidate = [...p.nums].sort(() => Math.random() - 0.5).join(" < ");
          if (candidate !== p.order) {
            wrongs.add(candidate);
          }
          attempts++;
        }

        return {
          question: `Place in ascending order: ${display.join(", ")}`,
          correct: p.order,
          wrong: Array.from(wrongs).slice(0, 3)
        };
      } else {

        return {

    function generateAlgebra() {
      const problems = [
        { q: "2x = 10", a: "5" },

        { q: "3x - 2 = 7", a: "3" },
        { q: "x / 2 = 6", a: "12" },

      ];
      const p = problems[Math.floor(Math.random() * problems.length)];
      const correctNum = parseInt(p.a);
      // Build deduped wrong answers.
      const candidates = [correctNum + 1, correctNum - 2, correctNum + 3, correctNum * 2, correctNum - 1];
      const seen = new Set([correctNum]);
      const wrongs = [];
      for (const v of candidates) {
        if (!seen.has(v)) {
          seen.add(v);
          wrongs.push(`x = ${v}`);
        }
        if (wrongs.length === 3) break;
      }
      return {
        question: `Find the value of x : ${p.q}`,
        correct: `x = ${p.a}`,
        wrong: wrongs
      };
    }

    function shuffleArray(array) {
      const shuffled = [...array];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

      const grid = document.getElementById('category-grid');
      grid.innerHTML = '';

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = `category-btn bg-gradient-to-br ${cat.color} text-white p-4 rounded-xl shadow-lg font-semibold text-sm hover:shadow-xl`;
        btn.innerHTML = `<span class="text-2xl block mb-1">${cat.emoji}</span>${cat.name}`;
        btn.onclick = () => selectCategory(cat);
        grid.appendChild(btn);
      });
    }

    function selectCategory(category) {
      currentCategory = category;
      showQuestion();
    }

    function returnToCategories() {
      document.getElementById('question-screen').classList.add('hidden');
      document.getElementById('category-screen').classList.remove('hidden');
    }

    function showQuestion() {
      document.getElementById('category-screen').classList.add('hidden');
      document.getElementById('question-screen').classList.remove('hidden');
      document.getElementById('feedback').classList.add('hidden');
      document.getElementById('hint-box').classList.add('hidden');

      hintShown = false;
      const hintBtn = document.getElementById('hint-btn');
      hintBtn.disabled = false;
      hintBtn.className = 'mb-4 bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-semibold py-2 px-4 rounded-lg transition-all text-sm';

      const q = generateQuestion(currentCategory.id);
      currentQuestionData = q;
      document.getElementById('category-badge').textContent = currentCategory.emoji + ' ' + currentCategory.name;
      document.getElementById('question-text').textContent = q.question;

      const answersGrid = document.getElementById('answers-grid');
      answersGrid.innerHTML = '';

      // Combine correct and wrong answers, then shuffle.
      // Also dedupe defensively in case any wrong answer happens to equal the correct one.
      const seen = new Set([q.correct]);
      const allAnswers = [{ text: q.correct, isCorrect: true }];
      for (const w of q.wrong.slice(0, 3)) {
        if (!seen.has(w)) {
          seen.add(w);
          allAnswers.push({ text: w, isCorrect: false });
        }
      }
      const shuffledAnswers = shuffleArray(allAnswers);

      shuffledAnswers.forEach(answer => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn bg-white border-2 border-gray-200 p-4 rounded-xl text-lg font-semibold text-gray-700 hover:border-indigo-400 hover:bg-indigo-50';
        btn.textContent = answer.text;
        btn.onclick = () => checkAnswer(btn, answer.isCorrect, q.correct);
        answersGrid.appendChild(btn);
      });
    }

    function checkAnswer(btn, isCorrect, correctAnswer) {
      const buttons = document.querySelectorAll('.answer-btn');
      buttons.forEach(b => b.disabled = true);

      if(isCorrect) {
        btn.classList.add('correct-answer');
        currentSessionPoints += 10;
        cumulativePoints += 10;
        correctAnswers++;
        document.getElementById('feedback-text').innerHTML = '✅ Excellent! +10 points';
        document.getElementById('feedback-text').className = 'text-xl font-bold text-green-600';
        createConfetti();
      } else {
        btn.classList.add('wrong-answer');
        wrongAnswers++;
        // Find and highlight correct answer
        buttons.forEach(b => {
          if(b.textContent === correctAnswer) {
            b.classList.add('correct-answer');
          }
        });
        document.getElementById('feedback-text').innerHTML = `❌ The correct answer was: ${correctAnswer}`;
        document.getElementById('feedback-text').className = 'text-xl font-bold text-red-600';
      }

      document.getElementById('session-points').textContent = currentSessionPoints;
      document.getElementById('cumulative-points').textContent = cumulativePoints;
      document.getElementById('feedback').classList.remove('hidden');
    }

    function nextQuestion() {
      questionNum++;
      document.getElementById('question-num').textContent = questionNum;

      // Every 3 questions, show a mini game
      if(questionNum % 3 === 0) {
        showMiniGame();
      } else {
        // Stay in the same category - show next question
        showQuestion();
      }
    }

    function showMiniGame() {
      document.getElementById('question-screen').classList.add('hidden');
      document.getElementById('mini-game-screen').classList.remove('hidden');
      document.getElementById('mini-game-result').classList.add('hidden');

      const game = miniGames[Math.floor(Math.random() * miniGames.length)];
      document.getElementById('mini-game-instruction').textContent = game.instruction;
      game.play();
    }

    function createConfetti() {
      const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96e6a1', '#dda0dd', '#f9d56e'];
      for(let i = 0; i < 20; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 3000);
      }
    }

    async function endGame() {
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('gameover-screen').classList.remove('hidden');

      const totalQuestions = correctAnswers + wrongAnswers;
      const accuracy = totalQuestions > 0 ? Math.round((correctAnswers / totalQuestions) * 100) : 0;

      document.getElementById('final-score').textContent = `Points this session: ${currentSessionPoints} | Total: ${cumulativePoints} points`;
      document.getElementById('correct-count').textContent = correctAnswers;
      document.getElementById('wrong-count').textContent = wrongAnswers;
      document.getElementById('accuracy-ratio').textContent = `${correctAnswers}/${totalQuestions}`;
      document.getElementById('accuracy').textContent = `${accuracy}%`;

      let message = "";
      if(accuracy >= 90) message = "Incredible! You're a math genius! 🏆";
      else if(accuracy >= 70) message = "Excellent work! Keep it up! 🌟";
      else if(accuracy >= 50) message = "Well played! You're improving! 💪";
      else message = "Keep practicing, you'll get there! 📚";

      document.getElementById('final-message').textContent = message;

      // Save score - update cumulative points
      if(window.dataSdk && playerName) {
        if(currentPlayerRecord) {
          const newBest = Math.max(currentPlayerRecord.best_game_score || 0, currentSessionPoints);
          const result = await window.dataSdk.update({
            ...currentPlayerRecord,
            cumulative_points: cumulativePoints,
            games_played: (currentPlayerRecord.games_played || 0) + 1,
            best_game_score: newBest,
            last_played: new Date().toISOString()
          });
          if(!result.isOk) {
            console.error('Failed to update score');
          }
        } else if(allPlayerData.length < 999) {
          const result = await window.dataSdk.create({
            player_name: playerName,
            cumulative_points: cumulativePoints,
            games_played: 1,
            best_game_score: currentSessionPoints,
            last_played: new Date().toISOString()
          });
          if(!result.isOk) {
            console.error('Failed to save score');
          }
        }
      }

      createConfetti();
    }

    function playAgain() {
      currentSessionPoints = 0;
      questionNum = 0;
      correctAnswers = 0;
      wrongAnswers = 0;

      document.getElementById('session-points').textContent = '0';
      document.getElementById('cumulative-points').textContent = cumulativePoints;
      document.getElementById('question-num').textContent = '0';
      document.getElementById('progress-bar').style.width = '0%';

      document.getElementById('gameover-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('question-screen').classList.add('hidden');
      document.getElementById('category-screen').classList.remove('hidden');
    }

    function startGame() {
      const nameInput = document.getElementById('player-name-input');
      playerName = nameInput.value.trim();

      if(!playerName) {
        nameInput.style.borderColor = '#ef4444';
        nameInput.placeholder = "Please enter your name!";
        return;
      }

      // Find existing player record
      currentPlayerRecord = allPlayerData.find(p => p.player_name.toLowerCase() === playerName.toLowerCase());

      // Load cumulative points from saved record if exists
      if(currentPlayerRecord) {
        cumulativePoints = currentPlayerRecord.cumulative_points || 0;
      }

      currentSessionPoints = 0; // Reset session points
      questionNum = 0;
      correctAnswers = 0;
      wrongAnswers = 0;

      document.getElementById('greeting').textContent = `Hi ${playerName}! 👋`;
      document.getElementById('welcome-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('session-points').textContent = '0';
      document.getElementById('cumulative-points').textContent = cumulativePoints;

      showCategories();
    }

    function updateLeaderboard() {
      const list = document.getElementById('leaderboard-list');
      const leaderboard = document.getElementById('leaderboard');

      if(allPlayerData.length === 0) {
        leaderboard.classList.add('hidden');
        return;
      }

      leaderboard.classList.remove('hidden');
      list.innerHTML = '';

      const sorted = [...allPlayerData].sort((a, b) => (b.cumulative_points || 0) - (a.cumulative_points || 0)).slice(0, 5);

      sorted.forEach((player, index) => {
        const div = document.createElement('div');
        div.className = 'flex justify-between items-center bg-indigo-50 px-4 py-2 rounded-lg';
        const medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
        div.innerHTML = `
          <span class="font-semibold">${medals[index]} ${player.player_name}</span>
          <span class="text-indigo-600 font-bold">${player.cumulative_points || 0} pts</span>
        `;
        list.appendChild(div);
      });
    }

    // Data handler
    const dataHandler = {
      onDataChanged(data) {
        allPlayerData = data;
        updateLeaderboard();

        // Update current player record if exists
        if(playerName) {
          currentPlayerRecord = data.find(p => p.player_name.toLowerCase() === playerName.toLowerCase());
        }
      }
    };

    // Element SDK
    function onConfigChange(config) {
      const title = document.getElementById('main-title');
      const welcome = document.getElementById('welcome-text');

      if(title) title.textContent = config.game_title || defaultConfig.game_title;
      if(welcome) welcome.textContent = config.welcome_message || defaultConfig.welcome_message;
    }

    // Initialize
    async function init() {
      // Init Element SDK
      if(window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange,
          mapToCapabilities: (config) => ({
            recolorables: [],
            borderables: [],
            fontEditable: undefined,
            fontSizeable: undefined
          }),
          mapToEditPanelValues: (config) => new Map([
            ["game_title", config.game_title || defaultConfig.game_title],
            ["welcome_message", config.welcome_message || defaultConfig.welcome_message]
          ])
        });
      }

      // Init Data SDK
      if(window.dataSdk) {
        const result = await window.dataSdk.init(dataHandler);
        if(!result.isOk) {
          console.error('Failed to initialize data SDK');
        }
      }

      // Apply initial config
      onConfigChange(window.elementSdk?.config || defaultConfig);
    }

    init();
  </script>
</body>
</html>
