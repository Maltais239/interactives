<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern Quest – Grade 3 Magic Meadow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --emerald-50:#ecfdf5; --emerald-100:#d1fae5; --emerald-200:#a7f3d0;
      --emerald-500:#10b981; --emerald-600:#059669; --emerald-700:#047857;
      --teal-50:#f0fdfa; --teal-100:#ccfbf1; --teal-200:#99f6e4;
      --teal-400:#2dd4bf; --teal-500:#14b8a6; --teal-700:#0f766e;
      --sky-50:#f0f9ff; --sky-100:#e0f2fe;
      --amber-50:#fffbeb; --amber-100:#fef3c7; --amber-200:#fde68a;
      --amber-500:#f59e0b; --amber-700:#b45309; --amber-800:#92400e; --amber-900:#78350f;
      --indigo-200:#c7d2fe; --indigo-500:#6366f1; --indigo-700:#4338ca;
      --indigo-800:#3730a3; --indigo-900:#312e81;
      --rose-50:#fff1f2; --rose-100:#ffe4e6; --rose-500:#f43f5e; --rose-600:#e11d48; --rose-700:#be123c;
      --slate-50:#f8fafc; --slate-100:#f1f5f9; --slate-200:#e2e8f0;
      --slate-300:#cbd5e1; --slate-400:#94a3b8; --slate-500:#64748b;
      --slate-600:#475569; --slate-700:#334155; --slate-800:#1e293b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(to bottom, #ecfdf5, #f0fdfa, #f0f9ff);
      min-height: 100vh;
      color: var(--slate-800);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--teal-100);
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 20;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      background: var(--emerald-500); color: white; padding: 8px;
      border-radius: 12px; box-shadow: 0 4px 10px rgba(16,185,129,0.35);
      transform: rotate(3deg); line-height: 0;
    }
    .logo-title {
      font-family: 'Fredoka One', cursive; font-size: 1.4rem;
      background: linear-gradient(to right, #059669, #0f766e);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-sub { font-size: 0.7rem; color: var(--emerald-600); font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    #level-badge {
      background: var(--teal-50); border: 1px solid var(--teal-200);
      padding: 6px 14px; border-radius: 999px;
      font-size: 0.75rem; font-weight: 800; color: var(--teal-700);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .stars-badge {
      background: var(--amber-50); border: 1px solid var(--amber-200);
      padding: 6px 14px; border-radius: 999px;
      display: flex; align-items: center; gap: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      animation: bounce 1.2s infinite;
    }
    #stars-display { font-weight: 900; font-size: 1.1rem; color: var(--amber-800); }

    /* ── Main ── */
    main {
      max-width: 860px; width: 100%;
      margin: 0 auto; padding: 24px 16px;
      flex-grow: 1; display: flex; flex-direction: column; justify-content: center;
    }

    /* ── Card ── */
    .card {
      background: white; border-radius: 28px; padding: 28px 28px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      border: 1px solid var(--teal-100);
      position: relative; overflow: hidden;
    }
    @media (max-width: 500px) { .card { padding: 20px 16px; } }

    /* ── Buttons ── */
    .btn {
      font-family: 'Nunito', sans-serif; font-weight: 800;
      cursor: pointer; border: none; border-radius: 14px;
      transition: all 0.15s ease;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: scale(0.95); }
    .btn-primary {
      background: linear-gradient(135deg, var(--emerald-500), var(--teal-500));
      color: white; padding: 14px 30px; font-size: 1.05rem;
      box-shadow: 0 5px 18px rgba(16,185,129,0.35);
      border-bottom: 4px solid var(--emerald-700) !important;
    }
    .btn-primary:hover { transform: scale(1.03); }
    .btn-secondary {
      background: var(--slate-100); color: var(--slate-600);
      padding: 12px 22px; font-size: 0.95rem;
    }
    .btn-secondary:hover { background: var(--slate-200); }
    .btn-speaker {
      background: white; border: 1px solid var(--emerald-200) !important;
      color: var(--emerald-600); padding: 8px; border-radius: 999px;
      cursor: pointer; transition: all 0.2s; line-height: 0; font-size: 0;
    }
    .btn-speaker:hover { background: var(--emerald-50); }
    .btn-speaker.speaking { background: var(--emerald-500); color: white; border-color: var(--emerald-600) !important; }

    /* ── Animations ── */
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.55} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
    @keyframes popIn { 0%{transform:scale(0.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1} }
    .anim-bounce { animation: bounce 1.2s infinite; }
    .anim-pulse  { animation: pulse 1.5s infinite; }
    .anim-fade   { animation: fadeIn 0.35s ease forwards; }
    .anim-pop    { animation: popIn 0.3s ease forwards; }

    /* ── Mascot ── */
    .pip-svg { width:100%; height:100%; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.12)); }
    .pip-label {
      font-weight:800; color:var(--emerald-700); background:var(--emerald-50);
      padding:4px 12px; border-radius:999px; font-size:0.7rem;
      margin-top:8px; border:1px solid var(--emerald-100);
    }

    /* ── Home Screen ── */
    .blob {
      position:absolute; border-radius:50%; filter:blur(45px); opacity:0.55; pointer-events:none;
    }
    .blob-tl { top:-50px;left:-50px;width:200px;height:200px;background:var(--emerald-100); }
    .blob-br { bottom:-60px;right:-60px;width:240px;height:240px;background:var(--teal-100); }
    .home-inner {
      position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;
    }
    .home-title {
      font-family:'Fredoka One',cursive;
      font-size:clamp(2rem,6vw,3.5rem);color:var(--slate-800);margin-bottom:8px;
    }
    .home-sub {
      color:var(--teal-700);font-size:clamp(0.95rem,2.5vw,1.15rem);
      font-weight:600;margin-bottom:32px;max-width:420px;
    }
    .curriculum-grid {
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
      max-width:420px;width:100%;margin-top:32px;
      padding-top:24px;border-top:1px solid var(--slate-100);
    }
    .ci { display:flex;align-items:center;gap:8px;font-size:0.75rem;color:var(--slate-500); }
    .ci-icon { padding:4px 6px;border-radius:6px;font-size:0.85rem; }

    /* ── Level Intro ── */
    .intro-row {
      display:flex;flex-direction:column;gap:20px;align-items:flex-start;
    }
    @media(min-width:560px){ .intro-row{flex-direction:row;align-items:flex-start;} }
    .pip-col { display:flex;flex-direction:column;align-items:center;flex-shrink:0; }
    .speech-bubble {
      flex-grow:1;background:rgba(236,253,245,0.65);
      border:2px solid var(--emerald-100);padding:22px;border-radius:20px;
    }
    .bubble-header {
      display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;
    }
    .level-tag {
      font-size:0.65rem;font-weight:900;text-transform:uppercase;
      letter-spacing:0.1em;color:var(--emerald-600);
    }
    .bubble-title { font-family:'Fredoka One',cursive;font-size:1.5rem;color:var(--slate-800);margin-bottom:6px; }
    .bubble-text  { color:var(--slate-600);font-size:0.97rem;line-height:1.65; }
    .card-footer  { display:flex;justify-content:flex-end;margin-top:24px; }
    .card-actions {
      display:flex;justify-content:space-between;align-items:center;
      margin-top:24px;padding-top:16px;border-top:1px solid var(--teal-50);gap:12px;
    }

    /* ── Tutorial ── */
    .tut-header {
      display:flex;align-items:flex-start;justify-content:space-between;
      margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--teal-100);gap:12px;
    }
    .tut-tag {
      background:var(--teal-50);color:var(--teal-700);border:1px solid var(--teal-200);
      font-weight:700;padding:4px 14px;border-radius:999px;font-size:0.75rem;
    }
    .tut-title { font-family:'Fredoka One',cursive;font-size:1.55rem;color:var(--slate-800);margin-top:8px; }
    .tut-body {
      background:rgba(240,253,250,0.5);border:1px solid rgba(204,251,241,0.7);
      padding:20px;border-radius:18px;color:var(--slate-700);
      font-size:1rem;line-height:1.65;margin-bottom:20px;
    }
    .example-box { background:var(--amber-50);border:1px solid var(--amber-100);border-radius:18px;padding:20px; }
    .example-label {
      font-weight:900;color:var(--amber-800);font-size:0.7rem;
      text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;
    }
    .example-text { color:var(--amber-900);font-weight:700;font-size:0.95rem; }

    /* ── Prompt Bar ── */
    .prompt-bar {
      display:flex;align-items:flex-start;gap:14px;
      background:rgba(236,253,245,0.5);border:1px solid var(--emerald-100);
      border-radius:18px;padding:14px;margin-bottom:22px;
    }
    .prompt-pip { width:48px;height:48px;flex-shrink:0; }
    .prompt-content { flex-grow:1; }
    .prompt-top {
      display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;
    }
    .prompt-label {
      font-size:0.65rem;font-weight:900;text-transform:uppercase;
      letter-spacing:0.1em;color:var(--emerald-600);
    }
    .prompt-text { font-weight:800;font-size:0.97rem;color:var(--slate-800); }

    /* ── Level 1: Stones ── */
    .hint-bar {
      background:var(--teal-50);border:1px solid var(--teal-100);
      border-radius:12px;padding:10px 16px;text-align:center;
      font-size:0.78rem;font-weight:700;color:#0f766e;margin-bottom:16px;
    }
    .stones-area {
      display:flex;flex-wrap:wrap;justify-content:center;gap:14px;
      padding:28px 16px;background:var(--sky-50);border-radius:28px;border:1px solid var(--sky-100);
    }
    .stone-btn {
      width:76px;height:90px;border-radius:18px;
      border:1px solid var(--slate-200) !important;border-bottom:7px solid var(--slate-200) !important;
      font-family:'Nunito',sans-serif;font-weight:900;
      display:flex;flex-direction:column;align-items:center;justify-content:space-between;
      padding:10px;cursor:pointer;transition:all 0.2s;background:white;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);
    }
    .stone-btn:hover:not([disabled]) { background:var(--teal-50);transform:scale(1.04); }
    .stone-btn[disabled] { cursor:default; }
    .stone-ord {
      font-size:0.62rem;text-transform:uppercase;color:var(--slate-400);
      background:var(--slate-100);padding:2px 6px;border-radius:4px;font-weight:800;
    }
    .stone-num { font-size:1.55rem;color:var(--slate-800); }
    .stone-dot { width:13px;height:13px;border-radius:50%;border:1px solid var(--slate-200);background:white; }
    .stone-correct {
      background:var(--emerald-500) !important;border-color:var(--emerald-600) !important;
      transform:scale(1.07) !important;
      box-shadow:0 0 0 4px rgba(16,185,129,0.22) !important;
    }
    .stone-correct .stone-ord { background:rgba(255,255,255,0.2);color:white; }
    .stone-correct .stone-num { color:white; }
    .stone-correct .stone-dot { background:rgba(255,255,255,0.35);border-color:white; }
    .stone-wrong {
      background:var(--rose-500) !important;border-color:var(--rose-600) !important;
      box-shadow:0 0 0 4px rgba(244,63,94,0.22) !important;
    }
    .stone-wrong .stone-ord { background:rgba(255,255,255,0.2);color:white; }
    .stone-wrong .stone-num { color:white; }
    .stone-wrong .stone-dot { background:rgba(255,255,255,0.35);border-color:white; }
    .stone-dim { opacity:0.38; }

    /* ── Level 2: Sorting ── */
    .sort-cols {
      display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:8px;
    }
    @media(min-width:540px){ .sort-cols{grid-template-columns:1fr 1fr;} }
    .sort-zone {
      border-radius:22px;padding:16px;display:flex;flex-direction:column;min-height:140px;
    }
    .sz-finite  { background:rgba(255,251,235,0.75);border:2px solid var(--amber-200); }
    .sz-infinite{ background:rgba(238,242,255,0.75);border:2px solid var(--indigo-200); }
    .sz-title {
      font-family:'Fredoka One',cursive;font-size:1rem;
      display:flex;align-items:center;gap:8px;
      padding-bottom:10px;margin-bottom:10px;
    }
    .sz-finite  .sz-title  { color:var(--amber-800);border-bottom:1px solid var(--amber-200); }
    .sz-infinite .sz-title { color:var(--indigo-800);border-bottom:1px solid var(--indigo-200); }
    .sz-hint { font-size:0.72rem;font-weight:600;margin-bottom:10px; }
    .sz-finite  .sz-hint  { color:var(--amber-700); }
    .sz-infinite .sz-hint { color:var(--indigo-800); }
    .sorted-card {
      background:white;border-radius:12px;padding:10px 14px;
      font-size:0.82rem;font-weight:800;
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:8px;animation:popIn 0.28s ease;
    }
    .sz-finite  .sorted-card { border:1px solid var(--amber-300);color:var(--amber-900); }
    .sz-infinite .sorted-card{ border:1px solid var(--indigo-200);color:var(--indigo-900); }
    .sorted-check { color:var(--emerald-600);font-weight:900; }
    .unsorted-section {
      margin-top:22px;padding-top:22px;border-top:1px solid var(--slate-100);
    }
    .unsorted-label {
      font-weight:800;color:var(--slate-700);text-align:center;
      margin-bottom:14px;font-size:0.88rem;
    }
    .unsorted-grid { display:grid;grid-template-columns:1fr;gap:12px; }
    @media(min-width:480px){ .unsorted-grid{grid-template-columns:1fr 1fr;} }
    .unsorted-card {
      background:var(--slate-50);border:1px solid var(--slate-200);
      border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:10px;
    }
    .unsorted-seq {
      font-weight:900;color:var(--slate-800);text-align:center;
      background:white;border:1px solid var(--slate-100);border-radius:12px;
      padding:10px;font-size:0.86rem;
    }
    .unsorted-btns { display:grid;grid-template-columns:1fr 1fr;gap:8px; }
    .btn-fin,.btn-inf {
      font-family:'Nunito',sans-serif;font-weight:800;font-size:0.75rem;
      padding:8px 4px;border-radius:12px;border:none;cursor:pointer;transition:all 0.15s;color:white;
    }
    .btn-fin { background:var(--amber-500);border-bottom:3px solid var(--amber-700); }
    .btn-fin:hover { background:#d97706; }
    .btn-fin:active { transform:scale(0.95); }
    .btn-inf { background:var(--indigo-500);border-bottom:3px solid var(--indigo-700); }
    .btn-inf:hover { background:#4f46e5; }
    .btn-inf:active { transform:scale(0.95); }
    .sort-feedback {
      margin-top:12px;background:var(--emerald-50);color:#065f46;
      border:1px solid var(--emerald-100);border-radius:12px;
      padding:10px 16px;text-align:center;font-weight:700;
      font-size:0.88rem;animation:pulse 1.5s infinite;
    }
    .sort-complete-box {
      margin-top:24px;text-align:center;
      background:rgba(16,185,129,0.07);border:1px solid var(--emerald-300);
      border-radius:28px;padding:28px;animation:popIn 0.3s ease;
    }
    .sort-complete-title {
      font-family:'Fredoka One',cursive;font-size:1.6rem;color:#065f46;margin-bottom:8px;
    }

    /* ── Level 3: Grid ── */
    .seq-strip {
      display:flex;flex-wrap:wrap;justify-content:center;gap:10px;
      padding:26px 16px;background:var(--amber-50);
      border-radius:28px;border:1px solid var(--amber-200);margin-bottom:22px;
    }
    .seq-tile {
      width:58px;height:58px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:1.2rem;
    }
    .seq-filled {
      background:white;border:1px solid var(--slate-200);
      border-bottom:4px solid var(--slate-300);color:var(--slate-800);
      box-shadow:0 2px 6px rgba(0,0,0,0.06);
    }
    .seq-blank {
      border:4px dashed var(--amber-400);background:white;
      color:var(--amber-500);transition:all 0.3s;
    }
    .seq-blank.correct { background:var(--emerald-100);border-color:var(--emerald-500);color:#065f46; }
    .seq-blank.wrong   { background:var(--rose-100);border-color:var(--rose-500);color:var(--rose-700);animation:pulse 0.5s; }
    .opts-label {
      font-size:0.7rem;font-weight:900;text-transform:uppercase;
      letter-spacing:0.08em;color:var(--slate-500);text-align:center;margin-bottom:12px;
    }
    .opts-grid {
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
      max-width:360px;margin:0 auto;
    }
    .opt-btn {
      padding:16px;border-radius:18px;
      font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;
      cursor:pointer;transition:all 0.15s;
      border:1px solid var(--slate-200) !important;border-bottom:4px solid var(--slate-200) !important;
      background:white;color:var(--slate-800);
    }
    .opt-btn:hover:not([disabled]) { background:var(--emerald-50); }
    .opt-btn.correct { background:var(--emerald-500) !important;color:white;border-color:var(--emerald-700) !important;transform:scale(1.04); }
    .opt-btn.wrong   { background:var(--rose-500)    !important;color:white;border-color:var(--rose-700) !important; }
    .opt-btn.dim     { opacity:0.35;pointer-events:none; }
    .opt-btn[disabled]{ pointer-events:none; }

    /* ── Level 4: Change ── */
    .seq-display {
      background:#1e1b4b;color:white;border-radius:28px;
      padding:28px 24px;text-align:center;margin-bottom:22px;
      box-shadow:0 10px 36px rgba(30,27,75,0.3);position:relative;overflow:hidden;
    }
    .seq-display::before {
      content:'';position:absolute;top:-20px;right:-20px;
      width:80px;height:80px;background:rgba(255,255,255,0.04);border-radius:50%;
    }
    .sdl { font-size:0.65rem;font-weight:900;text-transform:uppercase;letter-spacing:0.15em;color:#a5b4fc;margin-bottom:10px; }
    .sdt { font-family:'Fredoka One',cursive;font-size:clamp(1.2rem,4vw,2rem);color:#fcd34d;letter-spacing:0.04em; }
    .rules-grid { display:grid;grid-template-columns:1fr;gap:10px;max-width:420px;margin:0 auto; }
    @media(min-width:460px){ .rules-grid{grid-template-columns:1fr 1fr;} }
    .rule-btn {
      padding:14px 16px;border-radius:18px;
      font-family:'Nunito',sans-serif;font-weight:800;font-size:0.92rem;
      cursor:pointer;transition:all 0.15s;
      border:1px solid var(--slate-200) !important;border-bottom:4px solid var(--slate-200) !important;
      background:white;color:var(--slate-800);
      text-align:left;display:flex;align-items:center;gap:10px;
    }
    .rule-btn:hover:not([disabled]) { background:#eef2ff; }
    .rule-btn.correct { background:var(--emerald-500) !important;color:white;border-color:var(--emerald-700) !important; }
    .rule-btn.wrong   { background:var(--rose-500)    !important;color:white;border-color:var(--rose-700)    !important; }
    .rule-btn.dim     { opacity:0.35;pointer-events:none; }
    .rule-btn[disabled]{ pointer-events:none; }

    /* ── Explanation ── */
    .expl-box {
      margin-top:22px;padding:20px;border-radius:20px;border:2px solid;animation:fadeIn 0.3s ease;
    }
    .expl-box.correct { background:var(--emerald-50);border-color:var(--emerald-200);color:#065f46; }
    .expl-box.wrong   { background:var(--rose-50)   ;border-color:var(--rose-200)   ;color:#9f1239; }
    .expl-inner { display:flex;align-items:flex-start;gap:12px; }
    .expl-emoji { font-size:1.4rem;flex-shrink:0; }
    .expl-title { font-weight:900;font-size:0.92rem;margin-bottom:4px; }
    .expl-text  { font-size:0.86rem;line-height:1.55;font-weight:600; }

// =============================================

class SoundSynth {
  constructor(){ this.ctx=null; }
  init(){ if(!this.ctx) this.ctx=new(window.AudioContext||window.webkitAudioContext)(); }
  playClick(){
    this.init(); if(!this.ctx) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(400,this.ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(800,this.ctx.currentTime+0.1);
    g.gain.setValueAtTime(0.1,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+0.1);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(); o.stop(this.ctx.currentTime+0.12);
  }
  playCorrect(){
    this.init(); if(!this.ctx) return;
    const now=this.ctx.currentTime;
    [523.25,659.25,783.99,1046.50].forEach((f,i)=>{
      const o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type='triangle';
      o.frequency.setValueAtTime(f,now+i*0.08);
      g.gain.setValueAtTime(0.08,now+i*0.08);
      g.gain.exponentialRampToValueAtTime(0.001,now+i*0.08+0.25);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(now+i*0.08); o.stop(now+i*0.08+0.3);
    });
  }
  playIncorrect(){
    this.init(); if(!this.ctx) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(220,this.ctx.currentTime);
    o.frequency.linearRampToValueAtTime(110,this.ctx.currentTime+0.35);
    g.gain.setValueAtTime(0.12,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,this.ctx.currentTime+0.35);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(); o.stop(this.ctx.currentTime+0.36);
  }
  playWin(){
    this.init(); if(!this.ctx) return;
    const now=this.ctx.currentTime;
    [523.25,587.33,659.25,698.46,783.99,880,987.77,1046.50].forEach((f,i)=>{
      const o=this.ctx.createOscillator(), g=this.ctx.createGain();
      o.type='sine';
      o.frequency.setValueAtTime(f,now+i*0.1);
      g.gain.setValueAtTime(0.1,now+i*0.1);
      g.gain.exponentialRampToValueAtTime(0.01,now+i*0.1+0.35);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(now+i*0.1); o.stop(now+i*0.1+0.4);
    });
  }
}

// =============================================
// STATE
// =============================================
const S = {
  screen:'home',
  levelIdx:0, questionIdx:0, stars:0,
  stoneIdx:null, gridAns:null, changeAns:null,
  ansCorrect:null, showExpl:false,
  sorted:{}, sortFeedback:'', sortDone:false,
  speaking:false
};

// =============================================
// SPEECH
// =============================================
function speak(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.95; u.pitch=1.15;
  u.onstart=()=>{ S.speaking=true;  refreshSpeakers(); };
  u.onend  =()=>{ S.speaking=false; refreshSpeakers(); };
  u.onerror=()=>{ S.speaking=false; refreshSpeakers(); };
  window.speechSynthesis.speak(u);
}
function stopSpeak(){ if('speechSynthesis' in window) window.speechSynthesis.cancel(); S.speaking=false; }
function refreshSpeakers(){ document.querySelectorAll('.btn-speaker').forEach(b=>b.classList.toggle('speaking',S.speaking)); }

// Speak helpers called from inline onclick
function readIntro()   { speak(LEVELS[S.levelIdx].pipIntro); }
function readTutorial(){ speak(LEVELS[S.levelIdx].tutorial.text); }
function readPrompt()  {
  const lv=LEVELS[S.levelIdx];
  speak(lv.id===2 ? 'Sort all sequences to clear the magic portals!' : lv.questions[S.questionIdx].instruction);
}

// =============================================
// SHARED TEMPLATES
// =============================================
const SPEAKER_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>`;

const BIG_STAR  = `<svg width="40" height="40" viewBox="0 0 24 24" fill="#F59E0B"><path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.133 9.21l8.2-1.192z"/></svg>`;

function explBox(){
  const q=LEVELS[S.levelIdx].questions[S.questionIdx];

  return `<div class="expl-box ${ok?'correct':'wrong'} anim-fade">

      <button class="btn-next" onclick="nextAction()">Next Question ➔</button>

function progressDots(){
  const lv=LEVELS[S.levelIdx];
  const dots=lv.questions.map((_,i)=>{
    let c='pdot';
    if(i<S.questionIdx) c+=' done';
    else if(i===S.questionIdx) c+=' current';
    return `<div class="${c}"></div>`;
  }).join('');
  return `<div class="progress-row">
    <span>Progress: ${S.questionIdx+1} of ${lv.questions.length} Questions</span>
    <div class="progress-dots">${dots}</div>
  </div>`;
}

// =============================================
// NAVIGATION
// =============================================
function navigate(screen){
  stopSpeak(); sound.playClick(); S.screen=screen; render();
  if(screen==='levelIntro') setTimeout(readIntro,   400);
  if(screen==='tutorial')   setTimeout(readTutorial,400);
}
function startGame(){
  S.stars=0; S.levelIdx=0; S.questionIdx=0; resetLevel(); navigate('levelIntro');
}
function resetLevel(){
  S.stoneIdx=null; S.gridAns=null; S.changeAns=null;
  S.ansCorrect=null; S.showExpl=false;
  S.sorted={}; S.sortFeedback=''; S.sortDone=false;
}
function nextAction(){
  stopSpeak(); sound.playClick();
  const lv=LEVELS[S.levelIdx];
  if(lv.questions && S.questionIdx<lv.questions.length-1){
    S.questionIdx++; S.stoneIdx=null; S.gridAns=null; S.changeAns=null;
    S.ansCorrect=null; S.showExpl=false; render();
  } else { sound.playWin(); S.screen='levelClear'; render(); }
}
function nextLevel(){
  stopSpeak(); sound.playClick();
  if(S.levelIdx<LEVELS.length-1){ S.levelIdx++; S.questionIdx=0; resetLevel(); S.screen='levelIntro'; }
  else { S.screen='gameComplete'; }
  render();
}

// =============================================
// ANSWER HANDLERS
// =============================================
function selectStone(idx){
  if(S.showExpl) return;
  sound.playClick(); S.stoneIdx=idx;
  const q=LEVELS[S.levelIdx].questions[S.questionIdx];
  S.ansCorrect=(idx===q.targetIndex); S.showExpl=true;
  S.ansCorrect?(sound.playCorrect(),S.stars++):sound.playIncorrect();
  render();
}
function selectGrid(ans){
  if(S.showExpl) return;
  sound.playClick(); S.gridAns=ans;
  const q=LEVELS[S.levelIdx].questions[S.questionIdx];
  S.ansCorrect=(ans===q.correctAnswer); S.showExpl=true;
  S.ansCorrect?(sound.playCorrect(),S.stars++):sound.playIncorrect();
  render();
}
function selectChange(idx){
  if(S.showExpl) return;
  sound.playClick(); S.changeAns=idx;
  const q=LEVELS[S.levelIdx].questions[S.questionIdx];
  S.ansCorrect=(idx===q.correctIndex); S.showExpl=true;
  S.ansCorrect?(sound.playCorrect(),S.stars++):sound.playIncorrect();
  render();
}
function sortItem(id,cat){
  sound.playClick();
  const lv=LEVELS[S.levelIdx];
  const item=lv.sortingItems.find(i=>i.id===id);
  if(item.type===cat){
    S.sorted[id]=cat; S.sortFeedback='Awesome! Correctly sorted.'; sound.playCorrect();
    if(lv.sortingItems.every(i=>S.sorted[i.id]===i.type)){
      S.sortDone=true; S.sortFeedback=''; sound.playWin(); S.stars+=3;
    }
  } else {
    S.sortFeedback='Oops! Try sorting that one again.'; sound.playIncorrect();
    setTimeout(()=>{ S.sortFeedback=''; render(); },1500);
  }
  render();
}

// SCREEN RENDERERS

    <div class="blob blob-tl"></div><div class="blob blob-br"></div>
    <div class="home-inner">
      <div style="width:120px;height:120px;margin-bottom:20px" class="anim-bounce">${pipSVG()}</div>
      <h2 class="home-title">Pattern Quest!</h2>
      <p class="home-sub">Restore magic to the Meadow by solving numerical sequences and patterns!</p>
      <button class="btn btn-primary" onclick="startGame()" style="font-size:1.2rem;padding:18px 48px">
        Let&rsquo;s Play! &nbsp;&#9654;&#9654;
      </button>
      <div class="curriculum-grid">
        <div class="ci"><span class="ci-icon" style="background:#d1fae5;color:#065f46">🔢</span>Even, Odd &amp; Ordinals</div>
        <div class="ci"><span class="ci-icon" style="background:#ccfbf1;color:#0f766e">♾️</span>Finite vs. Infinite</div>
        <div class="ci"><span class="ci-icon" style="background:#e0f2fe;color:#0369a1">✖️</span>Skip-Counting Grids</div>
        <div class="ci"><span class="ci-icon" style="background:#fef3c7;color:#92400e">🧮</span>Change Operators (+ − × ÷)</div>
      </div>
    </div>
  </div>`;
}

function renderLevelIntro(){
  const lv=LEVELS[S.levelIdx];
  return `<div class="card anim-fade">
    <div class="intro-row">
      <div class="pip-col">
        <div style="width:106px;height:106px" class="${S.speaking?'anim-pulse':'anim-bounce'}">${pipSVG()}</div>
        <span class="pip-label">Pip the Pixie</span>
      </div>
      <div class="speech-bubble">
        <div class="bubble-header">
          <span class="level-tag">Quest Level ${lv.id}</span>
          <button class="btn-speaker" onclick="readIntro()" title="Read aloud">${SPEAKER_SVG}</button>
        </div>
        <h3 class="bubble-title">${lv.title}</h3>
        <p class="bubble-text">&ldquo;${lv.pipIntro}&rdquo;</p>
      </div>
    </div>
    <div class="card-footer">
      <button class="btn btn-primary" onclick="navigate('tutorial')">Learn How! 📖</button>
    </div>
  </div>`;
}

function renderTutorial(){
  const lv=LEVELS[S.levelIdx];
  return `<div class="card anim-fade">
    <div class="tut-header">
      <div>
        <span class="tut-tag">Tutorial Book</span>
        <h2 class="tut-title">${lv.tutorial.title}</h2>
      </div>
      <button class="btn-speaker" onclick="readTutorial()" title="Read aloud">${SPEAKER_SVG}</button>
    </div>
    <div class="tut-body">${lv.tutorial.text}</div>
    <div class="example-box">
      <div class="example-label">⭐ Tip &amp; Example</div>
      <div class="example-text">${lv.tutorial.example}</div>
    </div>
    <div class="card-actions">
      <button class="btn btn-secondary" onclick="navigate('levelIntro')">&#8592; Back</button>
      <button class="btn btn-primary"   onclick="navigate('play')">Start Challenge! 🚀</button>
    </div>
  </div>`;
}

function renderLevel1(){
  const q=LEVELS[S.levelIdx].questions[S.questionIdx];
  const SFX=["1st","2nd","3rd","4th","5th","6th","7th"];
  const stones=q.sequence.map((n,i)=>{
    let cls='stone-btn';
    if(S.stoneIdx!==null){
      if(i===q.targetIndex) cls+=' stone-correct';
      else if(i===S.stoneIdx) cls+=' stone-wrong';
      else cls+=' stone-dim';
    }
    const dis=S.showExpl?'disabled':'';
    return `<button class="${cls}" ${dis} onclick="selectStone(${i})">
      <span class="stone-ord">${SFX[i]}</span>
      <span class="stone-num">${n}</span>
      <div class="stone-dot"></div>
    </button>`;
  }).join('');
  return `
    ${promptBar(q.instruction)}
    <div class="hint-bar">💡 Ordinal numbers describe positions! <strong>(1st = First, 2nd = Second, 3rd = Third, 4th = Fourth, 5th = Fifth)</strong></div>
    <div class="stones-area">${stones}</div>
    ${S.showExpl?explBox():''}
    ${progressDots()}`;
}

function renderLevel2(){
  const lv=LEVELS[S.levelIdx];
  const finCards=lv.sortingItems.filter(i=>S.sorted[i.id]==='finite')
    .map(i=>`<div class="sorted-card"><span>${i.sequenceText}</span><span class="sorted-check">✓ Correct!</span></div>`).join('');
  const infCards=lv.sortingItems.filter(i=>S.sorted[i.id]==='infinite')
    .map(i=>`<div class="sorted-card"><span>${i.sequenceText}</span><span class="sorted-check">✓ Correct!</span></div>`).join('');
  const unsorted=lv.sortingItems.filter(i=>!S.sorted[i.id])
    .map(i=>`<div class="unsorted-card">
      <div class="unsorted-seq">${i.sequenceText}</div>
      <div class="unsorted-btns">
        <button class="btn-fin" onclick="sortItem('${i.id}','finite')">Stop (Finite) 🛑</button>
        <button class="btn-inf" onclick="sortItem('${i.id}','infinite')">Forever (Infinite) ♾️</button>
      </div>
    </div>`).join('');

  return `
    ${promptBar('Sort all sequences to clear the magic portals!')}
    <div class="sort-cols">
      <div class="sort-zone sz-finite">
        <div class="sz-title"><span style="font-size:1.4rem">🛑</span>Finite (Has an End)</div>
        <div class="sz-hint">Cards that stop or have a fixed limit go here.</div>
        ${finCards||'<p style="color:#b45309;font-size:0.8rem;font-weight:600">Nothing sorted yet...</p>'}
      </div>
      <div class="sort-zone sz-infinite">
        <div class="sz-title"><span style="font-size:1.4rem">♾️</span>Infinite (Goes Forever)</div>
        <div class="sz-hint">Look for the three dots (...) at the end.</div>
        ${infCards||'<p style="color:#4338ca;font-size:0.8rem;font-weight:600">Nothing sorted yet...</p>'}
      </div>
    </div>
    ${S.sortFeedback?`<div class="sort-feedback">${S.sortFeedback}</div>`:''}
    ${!S.sortDone?`<div class="unsorted-section">
      <div class="unsorted-label">Tap where each sequence belongs:</div>
      <div class="unsorted-grid">${unsorted||'<p style="color:#94a3b8;text-align:center;font-weight:600;grid-column:1/-1">All sorted!</p>'}</div>
    </div>`:''}
    ${S.sortDone?`<div class="sort-complete-box anim-pop">
      <div class="sort-complete-title">🎉 Portal Complete!</div>
      <p style="color:#065f46;font-weight:700;margin-bottom:16px">You sorted all patterns perfectly. Bonus stars added!</p>
      <button class="btn btn-primary" onclick="nextAction()">Awesome! Continue</button>
    </div>`:''}`;
}

function renderLevel3(){
  const q=LEVELS[S.levelIdx].questions[S.questionIdx];
  const tiles=q.sequence.map((n,i)=>{
    if(n===null){
      let bc='seq-tile seq-blank';
      if(S.ansCorrect===true)  bc+=' correct';
      if(S.ansCorrect===false) bc+=' wrong';
      return `<div class="${bc}">${S.gridAns!==null?S.gridAns:'?'}</div>`;
    }
    return `<div class="seq-tile seq-filled">${n}</div>`;
  }).join('');
  const opts=q.options.map(o=>{
    let c='opt-btn';
    if(S.gridAns!==null){
      if(o===q.correctAnswer) c+=' correct';
      else if(o===S.gridAns)  c+=' wrong';
      else c+=' dim';
    }
    const dis=S.gridAns!==null?'disabled':'';
    return `<button class="${c}" ${dis} onclick="selectGrid(${o})">${o}</button>`;
  }).join('');
  return `
    ${promptBar(q.instruction)}
    <div class="seq-strip">${tiles}</div>
    <div class="opts-label">Choose the missing term:</div>
    <div class="opts-grid">${opts}</div>
    ${S.showExpl?explBox():''}
    ${progressDots()}`;
}

function renderLevel4(){
  const q=LEVELS[S.levelIdx].questions[S.questionIdx];
  const opts=q.options.map((o,i)=>{
    let c='rule-btn';
    if(S.changeAns!==null){
      if(i===q.correctIndex) c+=' correct';
      else if(i===S.changeAns) c+=' wrong';
      else c+=' dim';
    }
    const dis=S.changeAns!==null?'disabled':'';
    return `<button class="${c}" ${dis} onclick="selectChange(${i})"><span>⚙️</span>${o}</button>`;
  }).join('');
  return `
    ${promptBar(q.instruction)}
    <div class="seq-display">
      <div class="sdl">Sequence Line</div>
      <div class="sdt">${q.sequenceText}</div>
    </div>
    <div class="opts-label">Select the correct change rule:</div>
    <div class="rules-grid">${opts}</div>
    ${S.showExpl?explBox():''}
    ${progressDots()}`;
}

function renderPlay(){
  const id=LEVELS[S.levelIdx].id;
  let body='';
  if(id===1) body=renderLevel1();
  if(id===2) body=renderLevel2();
  if(id===3) body=renderLevel3();
  if(id===4) body=renderLevel4();
  return `<div class="card anim-fade">${body}</div>`;
}

function renderLevelClear(){
  const lv=LEVELS[S.levelIdx];
  const last=S.levelIdx>=LEVELS.length-1;
  return `<div class="card anim-fade" style="overflow:hidden">
    <div style="position:absolute;top:-50px;right:-50px;width:210px;height:210px;background:#d1fae5;border-radius:50%;filter:blur(50px);opacity:0.5"></div>
    <div class="lc-content">
      <div class="trophy">🏆</div>
      <h2 class="lc-title">Level Complete!</h2>
      <p class="lc-sub">You cleared &ldquo;${lv.title}&rdquo;!</p>
      <div class="stars-recap">
        <div class="sr-label">Sparks Restored</div>
        <div class="sr-count">${STAR_SVG}<span>${S.stars} total stars</span></div>
      </div>
      <p class="pip-quote">&ldquo;Oh, look how bright the meadow is getting! Your logical pattern skills are truly magical. Let&rsquo;s tackle the next challenge!&rdquo;</p>
      <button class="btn btn-primary" onclick="nextLevel()" style="font-size:1.1rem;padding:16px 40px">
        ${last?'Claim Final Crown! 👑':'Next Level! ➔'}
      </button>
    </div>
  </div>`;
}

function renderGameComplete(){
  return `<div class="card anim-fade">
    <div class="gc-content">
      <div style="width:136px;height:136px;margin:0 auto 22px" class="anim-bounce">${pipSVG(true)}</div>
      <h2 class="gc-title">Meadow Restored!</h2>
      <p class="gc-sub">Amazing job! You analyzed all numerical sequence patterns to save the magical Sparks!</p>
      <div class="final-box">
        <div class="fb-label">Final Score</div>
        <div class="fb-count">${BIG_STAR}<span>${S.stars} Stars Collected</span></div>
      </div>
      <div class="gc-btns">
        <button class="btn btn-primary" onclick="startGame()">Play Again 🔄</button>
        <button class="btn btn-secondary" onclick="navigate('home')">Home</button>
      </div>
    </div>
  </div>`;
}

// =============================================
// MAIN RENDER
// =============================================
function render(){
  const badge=document.getElementById('level-badge');
  document.getElementById('stars-display').textContent=S.stars;
  if(S.screen==='home'){ badge.style.display='none'; }
  else { badge.style.display='inline-block'; badge.textContent=`Level ${S.levelIdx+1}`; }

  const main=document.getElementById('main-content');
  const screens={
    home:        renderHome,
    levelIntro:  renderLevelIntro,
    tutorial:    renderTutorial,
    play:        renderPlay,
    levelClear:  renderLevelClear,
    gameComplete:renderGameComplete
  };
  main.innerHTML=(screens[S.screen]||renderHome)();
}

render();
</script>
</body>
</html>
