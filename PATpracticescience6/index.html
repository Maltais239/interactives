let currentCategory = null;
let userAnswers = {};
let checked = false;

// Build category cards
const grid = document.getElementById('cat-grid');
categories.forEach((cat, i) => {
  const count = allQuestions[cat.id].length;
  const card = document.createElement('button');
  card.className = `cat-card bg-gradient-to-br ${cat.color} ${cat.border} border-2 rounded-3xl p-6 text-left fade-in`;
  card.style.animationDelay = `${i * 0.05}s`;
  card.innerHTML = `
    <div class="text-4xl mb-3">${cat.emoji}</div>
    <h3 class="bubbly text-xl font-extrabold ${cat.text}">${cat.name}</h3>
    <p class="text-sm ${cat.text} opacity-70 mt-1">${count} questions</p>
    <div class="mt-3 flex items-center gap-1 text-xs font-bold ${cat.text} opacity-50">
      <span>APPUYEZ POUR COMMENCER</span> <i data-lucide="chevron-right" style="width:14px;height:14px;"></i>
    </div>
  `;
  card.setAttribute('aria-label', `Commencer le quiz ${cat.name} avec ${count} questions`);
  card.onclick = () => openCategory(cat.id);
  grid.appendChild(card);
});

function openCategory(catId) {
  currentCategory = catId;
  userAnswers = {};
  checked = false;
  const cat = categories.find(c => c.id === catId);
  const qs = allQuestions[catId];

  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'flex';
  document.getElementById('quiz-title').textContent = `${cat.emoji} ${cat.name}`;
  document.getElementById('quiz-title').className = `text-2xl md:text-3xl font-extrabold bubbly ${cat.text}`;
  document.getElementById('score-badge').classList.add('hidden');
  document.getElementById('check-btn').style.display = '';
  document.getElementById('reset-btn').classList.add('hidden');

  const container = document.getElementById('questions-container');
  container.innerHTML = '';
  qs.forEach((question, qi) => {
    const div = document.createElement('div');
    div.className = 'mb-6 fade-in';
    div.style.animationDelay = `${qi * 0.03}s`;
    div.innerHTML = `
      <p class="font-bold text-gray-700 mb-3 text-base"><span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-purple-200 text-purple-700 font-extrabold text-sm mr-2 bubbly">${qi+1}</span>${question.q}</p>
      <div class="grid gap-2" id="opts-${qi}">
        ${question.opts.map((opt, oi) => `
          <button class="option-btn w-full text-left px-4 py-3 rounded-2xl border-2 border-gray-200 bg-white hover:bg-purple-50 font-semibold text-gray-600 text-sm" data-qi="${qi}" data-oi="${oi}">${String.fromCharCode(65+oi)}. ${opt}</button>
        `).join('')}
      </div>
      <p class="feedback-text text-sm font-bold mt-2 hidden"></p>
    `;
    container.appendChild(div);
  });

  // Option click handlers
  container.querySelectorAll('.option-btn').forEach(btn => {
    btn.onclick = () => {
      if (checked) return;
      const qi = parseInt(btn.dataset.qi);
      const oi = parseInt(btn.dataset.oi);
      userAnswers[qi] = oi;
      document.querySelectorAll(`#opts-${qi} .option-btn`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
  });

  window.scrollTo(0, 0);
  lucide.createIcons();
}

document.getElementById('back-btn').onclick = () => {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'flex';
};

document.getElementById('check-btn').onclick = () => {
  if (checked) return;
  checked = true;
  const qs = allQuestions[currentCategory];
  let score = 0;

  qs.forEach((question, qi) => {
    const optsDiv = document.getElementById(`opts-${qi}`);
    const buttons = optsDiv.querySelectorAll('.option-btn');
    const userAns = userAnswers[qi];
    const correctAns = question.ans;

    buttons.forEach((btn, oi) => {
      btn.style.pointerEvents = 'none';
      if (oi === correctAns) {
        btn.classList.add('correct-answer');
        btn.classList.remove('selected');
      } else if (oi === userAns && userAns !== correctAns) {
        btn.classList.add('wrong-answer');
        btn.classList.remove('selected');
      }
    });

    if (userAns === correctAns) score++;

    const fb = optsDiv.parentElement.querySelector('.feedback-text');
    if (userAns === undefined) {
      fb.textContent = '⚠️ Non répondu';
      fb.className = 'feedback-text text-sm font-bold mt-2 text-amber-500';
    } else if (userAns === correctAns) {
      fb.textContent = '✅ Correct!';
      fb.className = 'feedback-text text-sm font-bold mt-2 text-green-600';
    } else {
      fb.textContent = `❌ Bonne réponse: ${String.fromCharCode(65 + correctAns)}. ${question.opts[correctAns]}`;
      fb.className = 'feedback-text text-sm font-bold mt-2 text-red-500';
    }
  });

  const badge = document.getElementById('score-badge');
  badge.textContent = `${score} / ${qs.length} (${Math.round(score/qs.length*100)}%)`;
  badge.classList.remove('hidden');
  document.getElementById('check-btn').style.display = 'none';
  document.getElementById('reset-btn').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

document.getElementById('reset-btn').onclick = () => openCategory(currentCategory);

  document.body.style.fontSize = fs + 'px';
}

      ["subtitle", config.subtitle || defaultConfig.subtitle]
    ])
  });
}
